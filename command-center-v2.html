<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryeh's Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --navy: #1B365D; --gold: #C5A55A; --navy-light: #264a80; --gold-light: #d4ba7a; --gold-dark: #a88a3a;
            --glass-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08); --glass-hover: rgba(255,255,255,0.06);
            --glow-gold: rgba(197,165,90,0.4); --glow-blue: rgba(59,130,246,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: #06080f; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
        .ambient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .ambient-bg::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(197,165,90,0.08) 0%, transparent 70%);
            top: -200px; right: -100px; animation: shift 20s ease-in-out infinite; }
        .ambient-bg::after { content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
            bottom: -150px; left: -100px; animation: float2 25s ease-in-out infinite; }
        @keyframes shift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-80px,60px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,-80px)} }
        .particles { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(197,165,90,0.4); border-radius: 50%; animation: float linear infinite; }
        @keyframes float { 0% { opacity: 0; transform: translateY(100vh) translateX(0); } 10% { opacity: 1; } 90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100vh) translateX(100px); } }
        .glass { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); border-radius: 12px; }
        .glass-hover { transition: all 0.3s ease; }
        .glass-hover:hover { background: var(--glass-hover); border-color: var(--gold-dark); box-shadow: 0 0 20px var(--glow-gold); }
        .shine-card { position: relative; overflow: hidden; }
        .shine-card::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); animation: shine 3s ease-in-out infinite; }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }
        .gold-glow { box-shadow: 0 0 20px var(--glow-gold); }
        .gold-gradient { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-glass { background: var(--glass-bg); border: 1px solid var(--glass-border); color: #f0f0f0;
            padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; font-size: 0.875rem; font-weight: 500; }
        .btn-glass:hover { background: var(--glass-hover); border-color: var(--gold); box-shadow: 0 0 15px var(--glow-gold); }
        .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); border: none;
            color: var(--navy); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
            font-size: 0.875rem; font-weight: 600; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 25px var(--glow-gold); }
        .input-glass { background: var(--glass-bg); border: 1px solid var(--glass-border); color: #f0f0f0;
            padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.875rem; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .input-glass:focus { outline: none; border-color: var(--gold); background: var(--glass-hover);
            box-shadow: 0 0 15px var(--glow-gold), 0 0 30px rgba(197,165,90,0.08); }
        .input-glass::placeholder { color: rgba(240,240,240,0.5); }
        .progress-ring-circle { stroke: var(--gold); fill: transparent; stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .pulse-dot { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.75rem;
            font-weight: 600; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--gold); }
        .status-badge.active { background: rgba(197,165,90,0.2); border-color: var(--gold); }
        .stagger { animation: staggerIn 0.6s ease-out; }
        @keyframes staggerIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .custom-check { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid var(--gold);
            border-radius: 4px; background: var(--glass-bg); cursor: pointer; transition: all 0.3s ease; position: relative; }
        .custom-check:checked { background: var(--gold); border-color: var(--gold); }
        .custom-check:checked::after { content: '✓'; position: absolute; top: -2px; left: 3px; color: var(--navy); font-weight: bold; font-size: 14px; }
        .tab-btn { padding: 0.5rem 1rem; border: none; background: transparent; color: rgba(240,240,240,0.6);
            cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s ease; font-weight: 500; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .tab-btn:hover { color: var(--gold-light); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-glass { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px);
            border-radius: 16px; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .hero-number { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .kbd-hint { display: inline-block; background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; color: var(--gold); margin-left: 0.5rem; }
        .focus-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .time-gradient { background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy) 100%); }
        .divider { height: 1px; background: var(--glass-border); margin: 1rem 0; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; cursor: grab; }
        .app-grid.dragging { cursor: grabbing; }
        .draggable-card { cursor: move; transition: all 0.2s ease; border: 2px solid transparent; }
        .draggable-card.drag-over { border-color: var(--gold); transform: scale(1.02); background: var(--glass-hover); }
        .spotlight-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
            z-index: 150; display: flex; align-items: flex-start; justify-content: center; padding-top: 20vh; backdrop-filter: blur(5px); }
        .spotlight-container { width: 90%; max-width: 600px; background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .spotlight-input { width: 100%; padding: 1rem 1.5rem; background: transparent; border: none;
            border-bottom: 1px solid var(--glass-border); color: #f0f0f0; font-size: 1rem; outline: none; }
        .spotlight-input::placeholder { color: rgba(240,240,240,0.5); }
        .spotlight-results { max-height: 400px; overflow-y: auto; }
        .spotlight-item { padding: 1rem 1.5rem; border-bottom: 1px solid var(--glass-border); cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; gap: 1rem; }
        .spotlight-item:hover, .spotlight-item.selected { background: var(--glass-hover); color: var(--gold); }
        .spotlight-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .spotlight-text { flex: 1; }
        .spotlight-title { font-weight: 600; color: #f0f0f0; }
        .spotlight-desc { font-size: 0.85rem; color: rgba(240,240,240,0.6); margin-top: 0.25rem; }
        .sticky-reminder { position: fixed; padding: 1rem; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: move; user-select: none; z-index: 50; max-width: 250px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .sticky-reminder.dragging { box-shadow: 0 20px 40px rgba(197,165,90,0.3); opacity: 0.95; }
        .sticky-reminder-close { position: absolute; top: 0.5rem; right: 0.5rem; background: none; border: none;
            color: #f0f0f0; cursor: pointer; font-size: 1.2rem; opacity: 0.6; transition: opacity 0.2s; }
        .sticky-reminder-close:hover { opacity: 1; }
        .sticky-reminder-text { word-wrap: break-word; word-break: break-word; padding-right: 1.5rem; }
        .quick-actions-bar { position: fixed; bottom: 0; left: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 12px 12px 0 0; backdrop-filter: blur(20px); padding: 0.75rem 1rem; display: flex; gap: 0.5rem;
            z-index: 40; max-width: 400px; transition: all 0.3s ease; }
        .quick-action-btn { padding: 0.5rem 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 8px; color: var(--gold); cursor: pointer; transition: all 0.3s ease; font-size: 0.85rem; font-weight: 500; white-space: nowrap; }
        .quick-action-btn:hover { background: var(--glass-hover); border-color: var(--gold); box-shadow: 0 0 15px var(--glow-gold); }
        .notification-badge { position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .notification-dot { position: absolute; top: -5px; right: -5px; width: 16px; height: 16px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white; font-size: 0.7rem; font-weight: 700; }
        .notification-panel { position: absolute; top: 100%; right: 0; background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); border-radius: 12px; margin-top: 0.5rem; max-width: 350px; max-height: 400px; overflow-y: auto; z-index: 90; }
        .notification-item { padding: 1rem; border-bottom: 1px solid var(--glass-border); font-size: 0.875rem;
            display: flex; gap: 0.75rem; align-items: flex-start; }
        .notification-item:last-child { border-bottom: none; }
        .notification-icon { font-size: 1.2rem; flex-shrink: 0; }
        .habit-streak { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; }
        .habit-fire { animation: bounce 1s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .income-sparkline { width: 100%; height: 40px; display: block; }
        .pomodoro-ring { width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .pomodoro-time { font-size: 2rem; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
        .pomodoro-status { font-size: 0.875rem; color: rgba(240,240,240,0.7); margin-top: 0.5rem; }
        .health-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.5rem; }
        .health-indicator.healthy { background: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,0.5); }
        .health-indicator.neglected { background: #f87171; box-shadow: 0 0 10px rgba(248,113,113,0.5); }
        .calculator-display { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 1rem;
            border-radius: 8px; font-size: 1.5rem; text-align: right; color: var(--gold); word-break: break-all;
            word-wrap: break-word; margin-bottom: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
        .calculator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        .calculator-btn { padding: 0.75rem; background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: #f0f0f0; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-weight: 500; }
        .calculator-btn:hover { background: var(--glass-hover); border-color: var(--gold); }
        .calculator-btn.operator { color: var(--gold); }
        .layout-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem; z-index: 2; }
        @media (max-width: 1024px) { .layout-grid { grid-template-columns: 1fr; } }

        /* === CUSTOM SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--gold-grad-start), var(--gold-grad-end)); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-light); }
        * { scrollbar-width: thin; scrollbar-color: var(--gold) rgba(255,255,255,0.02); }

        /* === ENHANCED INPUT FOCUS WITH GLOW === */
        .input-glass:focus { outline: none; border-color: var(--gold); background: var(--glass-hover);
            box-shadow: 0 0 15px var(--glow-gold), 0 0 30px rgba(197,165,90,0.1), inset 0 1px 0 rgba(255,255,255,0.05); }

        /* === CHECKBOX BOUNCE ON CHECK === */
        .custom-check { transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .custom-check:checked { animation: checkBounce 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes checkBounce { 0% { transform: scale(1); } 40% { transform: scale(1.3); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }

        /* === FOCUS STATES FOR ACCESSIBILITY === */
        a:focus-visible, button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
            outline: 2px solid var(--gold); outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(197,165,90,0.15); }

        /* === LINK UNDERLINE ANIMATION === */
        a { position: relative; text-decoration: none; }
        a::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 0; height: 1px;
            background: linear-gradient(90deg, var(--gold-grad-start), var(--gold-grad-end));
            transition: width 0.3s ease; }
        a:hover::after { width: 100%; }

        /* === SKELETON SHIMMER LOADING === */
        .skeleton-shimmer { position: relative; overflow: hidden; background: rgba(255,255,255,0.03); border-radius: 8px; }
        .skeleton-shimmer::after { content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), rgba(255,255,255,0.06), rgba(255,255,255,0.04), transparent);
            animation: shimmer 2s ease-in-out infinite; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* === SCROLL REVEAL ANIMATIONS === */
        .scroll-reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .scroll-reveal.revealed { opacity: 1; transform: translateY(0); }

        /* === CHOREOGRAPHED PAGE LOAD === */
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeSlideRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes cascadeIn { from { opacity: 0; transform: translateY(15px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .load-header { animation: fadeSlideUp 0.6s ease-out 0.1s both; }
        .load-stats { animation: fadeSlideUp 0.6s ease-out 0.25s both; }
        .load-stat-pill:nth-child(1) { animation: cascadeIn 0.5s ease-out 0.3s both; }
        .load-stat-pill:nth-child(2) { animation: cascadeIn 0.5s ease-out 0.4s both; }
        .load-stat-pill:nth-child(3) { animation: cascadeIn 0.5s ease-out 0.5s both; }
        .load-stat-pill:nth-child(4) { animation: cascadeIn 0.5s ease-out 0.6s both; }
        .load-sidebar { animation: fadeSlideRight 0.7s ease-out 0.4s both; }
        .load-main { animation: fadeSlideUp 0.7s ease-out 0.5s both; }

        /* === TYPOGRAPHY POLISH === */
        .section-header { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text-primary); }
        .section-header-gradient { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em;
            background: linear-gradient(135deg, var(--gold-grad-start), var(--gold-grad-end));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero-greeting { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; color: var(--text-primary); }
        .body-text { font-size: 0.9rem; font-weight: 400; color: var(--text-secondary); line-height: 1.6; }
        .caption-text { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); }

        /* === STAT PILL ANIMATED BORDER === */
        .stat-pill-glow { position: relative; }
        .stat-pill-glow::before { content: ''; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
            background: conic-gradient(from var(--border-angle), transparent 30%, rgba(197,165,90,0.3) 50%, transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: rotateBorder 6s linear infinite; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .stat-pill-glow:hover::before { opacity: 1; }

        /* === STICKY HEADER BLUR INTENSIFICATION === */
        .sticky-header-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: backdrop-filter 0.3s, background 0.3s; }
        .sticky-header-blur.scrolled { backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            background: rgba(6,8,15,0.85) !important; border-bottom: 1px solid rgba(197,165,90,0.1) !important; }

        /* === MODAL GLASS ENHANCEMENT === */
        .modal-glass { background: rgba(12,15,25,0.9); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 16px; max-width: 500px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 40px rgba(197,165,90,0.05); }

        /* === TAB BUTTON ENHANCEMENT === */
        .tab-btn { transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .tab-btn:hover { color: var(--gold-light); text-shadow: 0 0 20px rgba(197,165,90,0.3); }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); text-shadow: 0 0 15px rgba(197,165,90,0.2); }

        /* === PROGRESS BAR GLOW === */
        .bg-gradient-to-r { box-shadow: 0 0 8px rgba(197,165,90,0.3); }

        /* === SPARKLINE GLOW === */
        .income-sparkline polyline { filter: drop-shadow(0 0 3px rgba(197,165,90,0.5)); }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const STORAGE_KEYS = { THEME: 'cc-theme', CHECKLIST: 'cc-checklist', NOTES: 'cc-notes', GOALS: 'cc-goals', BOOKMARKS: 'cc-bookmarks',
            SETTINGS: 'cc-settings', ACTIVITY: 'cc-activity', STATS: 'cc-stats', APP_TIMESTAMPS: 'cc-app-timestamps', MARKET_DATA: 'cc-market-data',
            HABITS: 'cc-habits', INCOME: 'cc-income', REMINDERS: 'cc-reminders', POMODORO: 'cc-pomodoro', LAYOUT: 'cc-layout', NOTIFICATIONS: 'cc-notifications', RATE_LOCKS: 'cc-rate-locks', };

        // === CROSS-DEVICE SYNC ENGINE ===
        const SyncEngine = {
            BLOB_API: 'https://jsonblob.com/api/jsonBlob',
            SYNC_KEY: 'cc-sync-id', SYNC_TS_KEY: 'cc-sync-timestamp', _dirty: false, _syncing: false, _lastSync: 0,
            getSyncId() { return localStorage.getItem(this.SYNC_KEY); },
            setSyncId(id) { localStorage.setItem(this.SYNC_KEY, id); },
            clearSync() { localStorage.removeItem(this.SYNC_KEY); localStorage.removeItem(this.SYNC_TS_KEY); },
            getAllData() {
                const data = {}; Object.values(STORAGE_KEYS).forEach(key => { try { const v = localStorage.getItem(key); if (v) data[key] = JSON.parse(v); } catch(e) {} });
                data._syncTimestamp = Date.now(); return data;
            },
            applyData(data) {
                if (!data) return false; let applied = false;
                Object.values(STORAGE_KEYS).forEach(key => { if (data[key] !== undefined) { try { localStorage.setItem(key, JSON.stringify(data[key])); applied = true; } catch(e) {} } });
                if (data._syncTimestamp) localStorage.setItem(this.SYNC_TS_KEY, String(data._syncTimestamp)); return applied;
            },
            async createSync() {
                try { const res = await fetch(this.BLOB_API, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify(this.getAllData()) });
                    if (!res.ok) throw new Error('Create failed'); const loc = res.headers.get('Location') || ''; const id = loc.split('/').pop();

            <SpotlightSearch isOpen={searchOpen} onClose={() => setSearchOpen(false)} apps={DEFAULT_APPS} bookmarks={bookmarks}
            notes={notes.ideas.concat(notes.todos)} goals={goals} />
            <QuickCalculator isOpen={showCalculator} onClose={() => setShowCalculator(false)} />
            <div style={{ position: 'relative', zIndex: 2 }} className="min-h-screen pb-32"><div className="glass glass-hover sticky top-0 z-30 sticky-header-blur border-b load-header">
            <div className="max-w-7xl mx-auto px-6 py-4"><div className="flex items-center justify-between">
            <div><h1 className="hero-greeting">{getGreeting()}, <span className="gold-gradient">{settings.name || 'Aryeh'}</span></h1>
            <div className="body-text" style={{fontSize:'0.85rem',marginTop:'0.25rem'}}>{time.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} · {settings.title || 'Loan Officer'} at {settings.company || 'FM Home Loans'}</div></div>
            <div className="flex items-center gap-4"><div className="text-3xl font-bold gold-gradient font-mono">{time.toLocaleTimeString()}</div>
            <div className="flex gap-2"><button onClick={() => setFocusMode(true)} className="btn-glass" title="Focus Mode (F)">
            🎯 Focus <span className="kbd-hint">F</span></button>
            <NotificationCenter notifications={notifications} isOpen={showNotifications} onToggle={() => setShowNotifications(!showNotifications)} />
            <SyncStatusBadge syncId={syncId} onOpenSync={() => setShowSync(true)} />
            <button onClick={() => setShowSettings(true)} className="btn-glass" title="Settings"><SettingsIcon /></button></div></div></div></div></div>
            <div className="glass glass-hover backdrop-blur-md border-b py-4 px-6 load-stats"><div className="max-w-7xl mx-auto">
            <div className="text-sm text-gray-400 mb-3 body-text" style={{fontStyle:'italic',opacity:0.7}}><TypeWriter text={getQuoteOfDay()} speed={30} /></div>
            <div className="grid grid-cols-4 gap-3"><div className="load-stat-pill"><StatPill label={stats.pipeline.label} value={stats.pipeline.value} /></div>
            <div className="load-stat-pill"><StatPill label={stats.followups.label} value={stats.followups.value} /></div>
            <div className="load-stat-pill"><StatPill label={stats.lastFunded.label} value={stats.lastFunded.value} /></div>
            <div className="load-stat-pill"><StatPill label={stats.deepWorkToday.label} value={stats.deepWorkToday.value} /></div></div></div></div>
            <div className="max-w-7xl mx-auto px-6 py-8"><div className="layout-grid"><div className="space-y-6 load-sidebar">
            <div className="glass glass-hover glass-primary p-6 rounded-lg shine-card animated-border"><h2 className="section-header-gradient mb-4">Apps</h2>
            <div className="app-grid">{DEFAULT_APPS.map((app) => {
              const lastOpened = appTimestamps[app.id]; const daysAgo = lastOpened ? Math.floor((new Date() - new Date(lastOpened)) / 86400000) : 999;
              return (<button key={app.id} onClick={() => {
              setAppTimestamps({ ...appTimestamps, [app.id]: new Date().toISOString() }); window.open(app.file, '_blank'); }}
              title={`${app.name} (${app.key})`} className="draggable-card glass glass-hover p-4 rounded-lg flex flex-col items-center justify-center gap-2 hover:scale-105 transition">
              <div className="text-3xl">{app.icon}</div><div className="text-xs font-bold text-center">{app.name}</div>
              <div className="text-xs text-gray-500">{app.desc}</div>
              <div className="flex items-center gap-2"><span className={`health-indicator ${daysAgo < 7 ? 'healthy' : 'neglected'}`}></span>
              <span className="kbd-hint">{app.key}</span></div>
              {lastOpened && <div className="text-xs text-gray-600">{timeAgo(lastOpened)}</div>}
              </button>);})}</div></div>
            <div className="glass glass-hover glass-primary p-6 rounded-lg animated-border"><div className="flex justify-between items-center mb-4">
            <h2 className="section-header-gradient">Goals</h2><button onClick={() => setEditingGoals(!editingGoals)} className="btn-glass text-sm">
            {editingGoals ? 'Done' : 'Edit'}</button></div><div className="flex gap-2 mb-4">
            {['monthly', 'quarterly', 'annual'].map((period) => (<button key={period} onClick={() => setGoalPeriod(period)} className={`tab-btn ${goalPeriod === period ? 'active' : ''}`}>
            {period.charAt(0).toUpperCase() + period.slice(1)}</button>))}</div>
            <div className="space-y-3">{goals.filter((g) => g.period === goalPeriod).map((goal) => (<div key={goal.id} className="p-3 rounded bg-white bg-opacity-5">
            <div className="flex justify-between items-start mb-2"><span className="text-sm font-medium">{goal.title}</span>
            <span className="text-xs text-gray-500">{goal.progress}/{goal.target}</span></div><div className="w-full bg-gray-700 rounded-full h-2">
            <div className="bg-gradient-to-r from-orange-600 to-yellow-500 h-2 rounded-full transition-all"
            style={{ width: `${(goal.progress / goal.target) * 100}%` }}></div></div></div>))}</div></div>
            <div className="glass glass-hover glass-primary p-6 rounded-lg"><div className="flex justify-between items-center mb-4">
            <h2 className="section-header-gradient">Market</h2><button onClick={() => setShowMarketEdit(!showMarketEdit)} className="btn-glass text-sm">Edit</button></div>
            {showMarketEdit ? (<div className="space-y-2">
            {[{k:'mortgage30',l:'30-Yr Fixed'},{k:'mortgage15',l:'15-Yr Fixed'},{k:'jumbo',l:'Jumbo'},{k:'fha',l:'FHA'}].map(r => (
              <input key={r.k} type="number" step="0.125" value={market.rates[r.k]}
                onChange={(e) => setMarket({ ...market, rates: { ...market.rates, [r.k]: parseFloat(e.target.value) }, lastUpdated: new Date().toLocaleDateString() })}
                placeholder={r.l} className="input-glass w-full text-xs" />))}
            <div className="flex gap-2 mt-2">{['bullish','cautious','bearish'].map(m => (
              <button key={m} onClick={() => setMarket({...market, mood:m})}
                className={market.mood===m ? 'btn-gold flex-1 text-xs' : 'btn-glass flex-1 text-xs'}>
                {m==='bullish'?'🟢':m==='cautious'?'🟡':'🔴'} {m}</button>))}</div></div>) : (<div>
            <div className="flex items-center gap-2 mb-3"><span className="text-xs text-gray-400">Market Mood:</span>
              <span className="status-badge active">{market.mood==='bullish'?'🟢':market.mood==='cautious'?'🟡':'🔴'} {(market.mood||'cautious').charAt(0).toUpperCase()+(market.mood||'cautious').slice(1)}</span>
              <span className="text-xs text-gray-600 ml-auto">{market.lastUpdated}</span></div>
            <div className="grid grid-cols-4 gap-2 mb-3">
              <StatPill label="30-Yr" value={`${market.rates.mortgage30}%`} />
              <StatPill label="15-Yr" value={`${market.rates.mortgage15}%`} />
              <StatPill label="Jumbo" value={`${market.rates.jumbo}%`} />
              <StatPill label="FHA" value={`${market.rates.fha}%`} /></div>
            <div className="grid grid-cols-3 gap-2">
              {[{k:'sp500',l:'S&P 500'},{k:'nasdaq',l:'NASDAQ'},{k:'dow',l:'DOW'}].map(idx => {
                const val = market.indices[idx.k] || '0'; const isPos = String(val).startsWith('+');
                return (<div key={idx.k} className="text-center p-2 rounded" style={{background:'rgba(255,255,255,0.02)'}}>
                  <div className="text-xs text-gray-500 mb-1">{idx.l}</div>
                  <div className="text-sm font-bold" style={{color: isPos ? '#22c55e' : '#ef4444'}}>{val}</div></div>);
              })}</div></div>)}</div>
            <PomodoroTimer stats={stats} onUpdate={setStats} /><RateLockCountdown locks={rateLocks} onUpdate={setRateLocks} /><AppHealthMonitor apps={DEFAULT_APPS} appTimestamps={appTimestamps} /></div>
            <div className="space-y-6 load-main"><div className="glass glass-hover glass-primary p-6 rounded-lg shine-card animated-border">
            <div className="flex justify-between items-center mb-4"><h2 className="section-header-gradient">Daily Checklist</h2>
            <div className="w-24 h-24 flex items-center justify-center relative"><ProgressRing radius={40} circumference={2 * Math.PI * 40} percent={checklistProgress} />
            <div className="absolute text-center"><div className="text-xl font-bold text-gray-200">
            <AnimatedCounter value={Math.round(checklistProgress)} duration={1} />%</div></div></div></div>
            <div className="space-y-2 mb-4">{checklist.map((item) => (<div key={item.id} className="flex items-center gap-3 p-2 rounded hover:bg-white hover:bg-opacity-5 transition">
            <input type="checkbox" checked={item.done} onChange={() => handleChecklistToggle(item.id)} className="custom-check" />
            <span className={`flex-1 text-sm ${item.done ? 'line-through text-gray-500' : 'text-gray-200'}`}>{item.text}</span>
            <button onClick={() => handleChecklistDelete(item.id)} className="text-gray-500 hover:text-gray-300 transition">×</button></div>))}</div>
            <div className="flex gap-2"><input type="text" value={newCheckItem} onChange={(e) => setNewCheckItem(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && handleChecklistAdd()} placeholder="Add item..." className="input-glass flex-1 text-sm" />
            <button onClick={handleChecklistAdd} className="btn-gold text-sm">Add</button></div></div>
            <DailyHabitTracker habits={habits} onUpdate={setHabits} /><IncomeTracker income={income} onUpdate={setIncome} />
            <div className="glass glass-hover glass-secondary p-6 rounded-lg"><h2 className="section-header mb-4">Quick Notes</h2>
            <div className="flex gap-2 mb-4"><button onClick={() => setNoteTab('ideas')} className={`tab-btn ${noteTab === 'ideas' ? 'active' : ''}`}>💡 Ideas</button>
            <button onClick={() => setNoteTab('todos')} className={`tab-btn ${noteTab === 'todos' ? 'active' : ''}`}>✅ Todos</button></div>
            <div className="space-y-2 mb-4 max-h-48 overflow-y-auto">{notes[noteTab].map((note) => (
            <div key={note.id} className="p-3 rounded bg-white bg-opacity-5 text-sm text-gray-300 line-clamp-2">{note.text}</div>))}</div>
            <div className="flex gap-2"><input type="text" placeholder={noteTab === 'ideas' ? 'New idea...' : 'New todo...'}
            onKeyPress={(e) => { if (e.key === 'Enter' && e.target.value) { const newNote = { id: Date.now(), text: e.target.value };
            setNotes({ ...notes, [noteTab]: [...notes[noteTab], newNote] }); e.target.value = ''; } }} className="input-glass flex-1 text-sm" />
            <button onClick={() => { if (reminders.length < 5) { setReminders([...reminders, { id: Date.now(), text: 'New reminder',
            left: Math.random() * (window.innerWidth - 250), top: Math.random() * (window.innerHeight - 150) }]); } }} className="btn-glass text-sm" title="Create sticky reminder">📌</button></div></div>
            <div className="glass glass-hover glass-secondary p-6 rounded-lg"><h2 className="section-header mb-4">Recent Activity</h2>
            <div className="space-y-2 max-h-64 overflow-y-auto">{activity.length > 0 ? (activity.map((item) => (
            <div key={item.id} className="flex items-start gap-3 p-2 rounded hover:bg-white hover:bg-opacity-5 transition text-sm">
            <span className="text-lg flex-shrink-0">{item.icon}</span><div className="flex-1">
            <div className="text-gray-300">{item.action}</div><div className="text-xs text-gray-500">{timeAgo(item.time)}</div></div></div>))) : (
            <div className="text-gray-500 text-sm text-center py-4">No activity yet</div>)}</div></div>
            <div className="glass glass-hover glass-tertiary p-6 rounded-lg"><div className="flex justify-between items-center mb-4">
            <h2 className="section-header">Bookmarks</h2><button onClick={() => setShowBookmarkAdd(!showBookmarkAdd)} className="btn-glass text-sm">
            {showBookmarkAdd ? 'Done' : '+'}</button></div>{showBookmarkAdd && (
            <div className="space-y-2 mb-4 p-3 rounded bg-white bg-opacity-5"><input type="text" value={newBookmark.title}
            onChange={(e) => setNewBookmark({ ...newBookmark, title: e.target.value })} placeholder="Title" className="input-glass w-full text-sm" />
            <input type="url" value={newBookmark.url} onChange={(e) => setNewBookmark({ ...newBookmark, url: e.target.value })}
            placeholder="URL" className="input-glass w-full text-sm" /><button onClick={() => {
            if (newBookmark.title && newBookmark.url) { setBookmarks([...bookmarks, { id: Date.now(), ...newBookmark }]);
            setNewBookmark({ title: '', url: '' }); setShowBookmarkAdd(false); } }} className="btn-gold w-full text-sm">Add</button></div>)}
            <div className="space-y-2">{bookmarks.map((bm) => (<a key={bm.id} href={bm.url} target="_blank" rel="noopener noreferrer"
            className="block p-2 rounded glass glass-hover text-sm text-gold hover:text-gold-light transition">🔖 {bm.title}</a>))}</div></div></div></div></div>
            <SyncModal isOpen={showSync} onClose={() => setShowSync(false)} onSyncChanged={(id) => setSyncId(id)} />
            {showSettings && (<div className="modal-overlay" onClick={() => setShowSettings(false)}>
            <div className="modal-glass p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-bold">Settings</h2>
            <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-gray-200"><CloseIcon /></button></div>
            <SettingField label="Name" value={settings.name || ''} onChange={(val) => setSettings({ ...settings, name: val })} />
            <SettingField label="Title" value={settings.title || ''} onChange={(val) => setSettings({ ...settings, title: val })} />
            <SettingField label="Company" value={settings.company || ''} onChange={(val) => setSettings({ ...settings, company: val })} />
            <SettingField label="Notifications" type="toggle" value={settings.notifications}
            onChange={(val) => setSettings({ ...settings, notifications: val })} />
            <SettingField label="Sound Effects" type="toggle" value={settings.soundEnabled}
            onChange={(val) => setSettings({ ...settings, soundEnabled: val })} />
            <div className="py-3 text-xs text-gray-500">Shortcuts: 1-9 launch apps · / spotlight · C calculator · F focus · ESC close</div>
            <div className="pt-6 space-y-2"><button onClick={() => {
            setLayout(['launcher', 'goals', 'market', 'checklist', 'notes', 'activity', 'bookmarks']); setShowSettings(false); }} className="btn-glass w-full">Reset Layout</button>
            <button onClick={() => { if (window.confirm('Clear all data? This cannot be undone.')) { localStorage.clear(); window.location.reload(); } }} className="btn-glass w-full text-red-400 border-red-400">Clear All Data</button></div></div></div>)}
            <div className="text-center py-12"><p className="caption-text" style={{color:'rgba(255,255,255,0.15)',letterSpacing:'0.15em'}}>COMMAND CENTER · FM HOME LOANS · BUILT WITH PURPOSE</p></div>
            <QuickActionsToolbar onNewNote={() => { if (reminders.length < 5) { setReminders([...reminders, { id: Date.now(), text: 'New note...',
            left: Math.random() * (window.innerWidth - 250), top: Math.random() * (window.innerHeight - 150) }]); } }} onStartTimer={() => { document.querySelector('.pomodoro-ring')?.scrollIntoView({behavior:'smooth'}); }}
            onAddIncome={() => { document.querySelector('.income-sparkline')?.closest('.glass')?.scrollIntoView({behavior:'smooth'}); }}
            onLogHabit={() => { document.querySelector('.habit-streak')?.closest('.glass')?.scrollIntoView({behavior:'smooth'}); }} /></div></div>); };
        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
