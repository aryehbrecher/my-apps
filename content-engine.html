const buildSystemPrompt = (settings, brandVoice) => {
  const voiceExamples = brandVoice.length > 0
    ? `\n\nHere are examples of the user's actual writing voice. Match this tone, cadence, and style closely:\n---\n${brandVoice.join('\n---\n')}\n---`
    : '';
  const personality = settings.personalitySliders || {professional:70,educational:50,brief:40};
  return `You are a content ghostwriter for ${settings.name}, ${settings.title} at ${settings.company}. You write mortgage marketing content that sounds like a real, experienced loan officer — NOT generic AI content.

CRITICAL RULES:
- Sound human. Use contractions. Be direct. No corporate buzzwords like "navigate," "leverage," "landscape," or "journey."
- Never guarantee rates or outcomes. Always imply "subject to qualification" where relevant.
- Never use phrases like "In today's market" or "As a mortgage professional" — these are dead giveaways of AI slop.
- Include real mortgage knowledge: LTV, DTI, PMI, rate locks, points, buydowns, ARM vs fixed, conforming limits, etc. when relevant.
- Compliance: No discriminatory language. No guaranteed approvals. No specific rate promises without "as of [date], subject to change."
- NMLS#: ${settings.nmls || '[not set]'} | Phone: ${settings.phone || '[not set]'} | Email: ${settings.email || '[not set]'}

PERSONALITY CALIBRATION:
- Professional ↔ Casual: ${personality.professional}/100 (higher = more formal)
- Educational ↔ Sales: ${personality.educational}/100 (higher = more educational)
- Brief ↔ Detailed: ${personality.brief}/100 (higher = more detailed)
${voiceExamples}

Write content that a loan officer would actually want to post. If it sounds like it came from ChatGPT, you failed.`;
};

const generateId = () => Math.random().toString(36).substring(2, 11);

const copyToClipboard = async (text) => {
  try { await navigator.clipboard.writeText(text); return true; }
  catch { return false; }
};

const callClaude = async (apiKey, systemPrompt, userPrompt, onStream) => {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error: ${response.status}`);
  }
  const data = await response.json();
  return data.content?.[0]?.text || '';
};

// Toast notification
const Toast = ({message, type='success', onClose}) => {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
  return <div className={`toast fixed bottom-6 right-6 ${bg} text-white px-4 py-2 rounded-lg shadow-lg z-50 text-sm font-medium`}>{message}</div>;
};

// Copy button
const CopyBtn = ({text, className=''}) => {
  const {addToast} = useContext(AppContext);
  return <button className={`btn-ghost px-2 py-1 rounded text-xs ${className}`} onClick={async()=>{
    if(await copyToClipboard(text)) addToast('Copied!');
    else addToast('Failed to copy','error');
  }}>📋 Copy</button>;
};

// Loading indicator

  return (
    <div className="card-inner rounded-lg p-4 output-block">

const RateUpdateGenerator = () => {
  const {settings, addToast, saveContent} = useContext(AppContext);
  const [rates, setRates] = useState(DEFAULT_RATES);
  const [context, setContext] = useState('');
  const [outputs, setOutputs] = useState({whatsapp:SAMPLE_OUTPUTS.whatsapp, linkedin:SAMPLE_OUTPUTS.linkedin, realtorEmail:SAMPLE_OUTPUTS.realtorEmail, consumer:SAMPLE_OUTPUTS.consumer});
  const [loading, setLoading] = useState({whatsapp:false,linkedin:false,realtorEmail:false,consumer:false});
  const [tones, setTones] = useState({whatsapp:'casual',linkedin:'professional',realtorEmail:'professional',consumer:'educational'});

  const generateChannel = async (channel) => {
    if(!settings.apiKey){addToast('Set your API key in Settings','error');return;}
    if(!rates.thirtyYr){addToast('Enter at least the 30yr rate','error');return;}
    setLoading(p=>({...p,[channel]:true}));
    try{
      const rateStr = `Today's rates: 30yr Fixed: ${rates.thirtyYr}%${rates.fifteenYr?`, 15yr Fixed: ${rates.fifteenYr}%`:''}${rates.fha?`, FHA: ${rates.fha}%`:''}${rates.va?`, VA: ${rates.va}%`:''}`;
      const contextStr = context ? `\nMarket context: ${context}` : '';
      const toneStr = `\nTone: ${tones[channel]}`;
      const sys = buildSystemPrompt(settings, settings.brandVoiceSamples||[]);
      const user = `${CHANNEL_PROMPTS[channel]}\n\n${rateStr}${contextStr}${toneStr}`;
      const result = await callClaude(settings.apiKey, sys, user);
      setOutputs(p=>({...p,[channel]:result}));
    }catch(e){addToast(e.message,'error');}
    setLoading(p=>({...p,[channel]:false}));

const LeadNurture = () => {
  const {settings, addToast, saveContent} = useContext(AppContext);
  const [selectedSeq, setSelectedSeq] = useState('newLead');
  const [messages, setMessages] = useState({});
  const [loadingIdx, setLoadingIdx] = useState({});
  const [generating, setGenerating] = useState(false);

  const sequences = Object.entries(NURTURE_SEQUENCE_PROMPTS);

  const generateSequence = async () => {
    if(!settings.apiKey){addToast('Set your API key in Settings','error');return;}
    const seq = NURTURE_SEQUENCE_PROMPTS[selectedSeq];
    setGenerating(true);
    const newMsgs = {};
    for(let i=0;i<seq.count;i++){
      setLoadingIdx(p=>({...p,[i]:true}));
      try{
        const sys = buildSystemPrompt(settings, settings.brandVoiceSamples||[]);
        const result = await callClaude(settings.apiKey, sys, seq.prompts[i]);
        newMsgs[i] = result;
        setMessages(p=>({...p,[`${selectedSeq}_${i}`]:result}));
      }catch(e){addToast(`Message ${i+1} failed: ${e.message}`,'error');}
      setLoadingIdx(p=>({...p,[i]:false}));
    }
    setGenerating(false);
  };

  const regenerateOne = async (idx) => {
    if(!settings.apiKey){addToast('Set your API key in Settings','error');return;}
    const seq = NURTURE_SEQUENCE_PROMPTS[selectedSeq];
    setLoadingIdx(p=>({...p,[idx]:true}));
    try{
      const sys = buildSystemPrompt(settings, settings.brandVoiceSamples||[]);
      const result = await callClaude(settings.apiKey, sys, seq.prompts[idx]);
      setMessages(p=>({...p,[`${selectedSeq}_${idx}`]:result}));
    }catch(e){addToast(e.message,'error');}
    setLoadingIdx(p=>({...p,[idx]:false}));
  };

  const copyAll = () => {
    const seq = NURTURE_SEQUENCE_PROMPTS[selectedSeq];
    const allText = Array.from({length:seq.count}, (_,i) => {
      const msg = messages[`${selectedSeq}_${i}`];
      return msg ? `--- Message ${i+1} ---\n${msg}` : null;
    }).filter(Boolean).join('\n\n');
    if(allText){copyToClipboard(allText);addToast('All messages copied!');}
  };

  const seq = NURTURE_SEQUENCE_PROMPTS[selectedSeq];

  return (
    <div className="space-y-6">
      <div className="card rounded-xl p-6">
        <h2 className="text-lg font-bold mb-4" style={{color:'var(--gold)'}}>📬 Lead Nurture Sequences</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
          {sequences.map(([id,s])=>(
            <button key={id} onClick={()=>setSelectedSeq(id)} className={`p-4 rounded-lg text-left transition-all ${selectedSeq===id?'ring-2':'card-inner'}`} style={selectedSeq===id?{borderColor:'var(--gold)',background:'rgba(197,165,90,.1)'}:{}}>
              <div className="font-semibold text-sm">{s.name}</div>
              <div className="text-xs text-muted mt-1">{s.description}</div>
            </button>
          ))}
        </div>
        <div className="flex items-center gap-3">
          <button onClick={generateSequence} className="btn-gold px-6 py-2 rounded-lg text-sm font-semibold" disabled={generating}>
            {generating ? <LoadingDots/> : `⚡ Generate ${seq.count}-Message Sequence`}
          </button>
          <button onClick={copyAll} className="btn-outline px-4 py-2 rounded-lg text-sm">📋 Copy All</button>
        </div>
      </div>
      <div className="space-y-3">
        {Array.from({length:seq.count}, (_,i) => {
          const key = `${selectedSeq}_${i}`;
          const content = messages[key] || '';
          return (
            <OutputBlock key={key} label={`Message ${i+1} of ${seq.count}`} icon={`${i+1}️⃣`} content={content} loading={loadingIdx[i]} onRegenerate={()=>regenerateOne(i)} onSave={(c,l)=>{saveContent({id:generateId(),content:c,label:`${seq.name} - Msg ${i+1}`,tag:'Nurture',date:new Date().toLocaleDateString()});addToast('Saved!');}}/>
          );
        })}
      </div>
    </div>
  );
};

const ContentCalendar = () => {
  const {settings, addToast, saveContent} = useContext(AppContext);
  const [weekContent, setWeekContent] = useState({});
  const [loading, setLoading] = useState({});
  const [generatingAll, setGeneratingAll] = useState(false);
  const [weekOffset, setWeekOffset] = useState(0);

  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

  const getWeekDates = () => {
    const now = new Date();
    const dayOfWeek = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1) + weekOffset * 7);
    return days.map((d,i) => {
      const date = new Date(monday);
      date.setDate(monday.getDate() + i);
      return date.toLocaleDateString('en-US', {month:'short', day:'numeric'});
    });
  };
  const weekDates = getWeekDates();

  const generateDay = async (day) => {
    if(!settings.apiKey){addToast('Set your API key in Settings','error');return;}
    setLoading(p=>({...p,[day]:true}));
    try{
      const sys = buildSystemPrompt(settings, settings.brandVoiceSamples||[]);
      const result = await callClaude(settings.apiKey, sys, CALENDAR_THEMES[day].prompt);
      setWeekContent(p=>({...p,[day]:result}));
    }catch(e){addToast(e.message,'error');}
    setLoading(p=>({...p,[day]:false}));
  };

  const generateWeek = async () => {
    if(!settings.apiKey){addToast('Set your API key in Settings','error');return;}
    setGeneratingAll(true);
    for(const day of days){
      await generateDay(day);
    }
    setGeneratingAll(false);
  };

  return (
    <div className="space-y-6">
      <div className="card rounded-xl p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-lg font-bold" style={{color:'var(--gold)'}}>📅 Content Calendar</h2>
          <div className="flex items-center gap-2">
            <button onClick={()=>setWeekOffset(p=>p-1)} className="btn-ghost px-2 py-1 rounded text-sm">← Prev</button>
            <button onClick={()=>setWeekOffset(0)} className="btn-ghost px-2 py-1 rounded text-xs">This Week</button>
            <button onClick={()=>setWeekOffset(p=>p+1)} className="btn-ghost px-2 py-1 rounded text-sm">Next →</button>
          </div>
        </div>
        <button onClick={generateWeek} className="btn-gold px-6 py-2 rounded-lg text-sm font-semibold mb-4" disabled={generatingAll}>
          {generatingAll ? <LoadingDots/> : '⚡ Generate Full Week'}
        </button>
        <div className="space-y-3">
          {days.map((day,i)=>{
            const theme = CALENDAR_THEMES[day];
            return (
              <div key={day} className="card-inner rounded-lg p-4">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-3">
                    <span className="text-lg">{theme.icon}</span>
                    <div>
                      <span className="font-semibold text-sm">{day}</span>
                      <span className="text-xs text-muted ml-2">{weekDates[i]}</span>
                      <span className="text-xs ml-2 tag px-2 py-0.5 rounded">{theme.theme}</span>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={()=>generateDay(day)} className="btn-ghost px-2 py-1 rounded text-xs" disabled={loading[day]}>🔄</button>
                    {weekContent[day] && <CopyBtn text={weekContent[day]}/>}
                    {weekContent[day] && <button onClick={()=>{saveContent({id:generateId(),content:weekContent[day],label:`${day} - ${theme.theme}`,tag:'Calendar',date:weekDates[i]});addToast('Saved!');}} className="btn-ghost px-2 py-1 rounded text-xs">💾</button>}
                  </div>
                </div>
                {loading[day] ? (
                  <div className="text-sm text-muted py-2"><LoadingDots/></div>
                ) : weekContent[day] ? (
                  <pre className="text-sm whitespace-pre-wrap leading-relaxed" style={{fontFamily:'Inter,sans-serif'}}>{weekContent[day]}</pre>
                ) : (
                  <div className="text-xs text-muted italic">Click generate to create {day}'s {theme.theme.toLowerCase()} post</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

const BrandVoice = () => {
  const {settings, updateSettings, addToast} = useContext(AppContext);
  const [newSample, setNewSample] = useState('');
  const samples = settings.brandVoiceSamples || [];
  const sliders = settings.personalitySliders || {professional:70,educational:50,brief:40};

  const addSample = () => {
    if(!newSample.trim()) return;
    const updated = [...samples, newSample.trim()];
    updateSettings({brandVoiceSamples: updated});
    setNewSample('');
    addToast('Voice sample added!');
  };

  const removeSample = (idx) => {
    const updated = samples.filter((_,i)=>i!==idx);
    updateSettings({brandVoiceSamples: updated});
  };

  const updateSlider = (key, val) => {
    updateSettings({personalitySliders: {...sliders, [key]: parseInt(val)}});
  };

  return (
    <div className="space-y-6">
      <div className="card rounded-xl p-6">
        <h2 className="text-lg font-bold mb-4" style={{color:'var(--gold)'}}>🎤 Brand Voice Training</h2>

          <button onClick={addSample} className="btn-gold px-4 py-2 rounded-lg text-sm mt-2">+ Add Sample</button>
        </div>
        {samples.length > 0 && (
          <div className="space-y-2">
            <div className="text-xs text-muted font-semibold mb-2">{samples.length} voice sample{samples.length>1?'s':''} saved</div>

  const [search, setSearch] = useState('');
  const [filterTag, setFilterTag] = useState('All');

  const tags = ['All', ...new Set(savedContent.map(c=>c.tag))];

  const filtered = savedContent.filter(c => {
    const matchSearch = !search || c.content.toLowerCase().includes(search.toLowerCase()) || c.label.toLowerCase().includes(search.toLowerCase());
    const matchTag = filterTag === 'All' || c.tag === filterTag;
    return matchSearch && matchTag;
  });

  const deleteItem = (id) => {
    setSavedContent(prev => prev.filter(c => c.id !== id));
    addToast('Deleted');
  };

  const exportAll = () => {
    const blob = new Blob([JSON.stringify(savedContent, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'content-engine-library.json'; a.click();
    URL.revokeObjectURL(url);
    addToast('Exported!');
  };

  return (
    <div className="space-y-6">
      <div className="card rounded-xl p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-lg font-bold" style={{color:'var(--gold)'}}>📚 Saved Content Library</h2>
          <div className="flex items-center gap-2">
            <span className="text-xs text-muted">{savedContent.length} items</span>
            <button onClick={exportAll} className="btn-outline px-3 py-1 rounded-lg text-xs">Export JSON</button>
          </div>
        </div>
        <div className="flex items-center gap-3 mb-4">
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search saved content..." className="flex-1 px-3 py-2 rounded-lg text-sm"/>
          <div className="flex gap-1">
            {tags.map(t=>(
              <button key={t} onClick={()=>setFilterTag(t)} className={`px-2 py-1 rounded text-xs ${filterTag===t?'btn-gold':'btn-ghost'}`}>{t}</button>
            ))}
          </div>
        </div>
      </div>
      {filtered.length === 0 ? (
        <div className="card rounded-xl p-8 text-center">
          <div className="text-3xl mb-2">📭</div>
          <div className="text-sm text-muted">{savedContent.length===0 ? 'No saved content yet. Generate content and click 💾 to save.' : 'No results match your search.'}</div>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(item=>(
            <div key={item.id} className="card rounded-xl p-4">
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <span className="tag px-2 py-0.5 rounded text-xs">{item.tag}</span>
                  <span className="text-xs text-muted">{item.date}</span>
                  <span className="text-xs text-secondary">{item.label}</span>
                </div>
                <div className="flex items-center gap-1">
                  <CopyBtn text={item.content}/>
                  <button onClick={()=>deleteItem(item.id)} className="btn-ghost px-2 py-1 rounded text-xs text-red-400">🗑️</button>
                </div>
              </div>
              <pre className="text-sm whitespace-pre-wrap leading-relaxed" style={{fontFamily:'Inter,sans-serif'}}>{item.content.length > 300 ? item.content.slice(0,300)+'...' : item.content}</pre>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ============================================================
// TAB 8: SETTINGS
// ============================================================
const SettingsPanel = () => {
  const {settings, updateSettings, addToast, savedContent, theme, setTheme} = useContext(AppContext);
  const [showKey, setShowKey] = useState(false);

  const exportAll = () => {
    const data = {settings: {...settings, apiKey: '[REDACTED]'}, savedContent};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'content-engine-export.json'; a.click();
    URL.revokeObjectURL(url);
    addToast('Exported!');
  };

  return (
    <div className="space-y-6">
      <div className="card rounded-xl p-6">
        <h2 className="text-lg font-bold mb-4" style={{color:'var(--gold)'}}>⚙️ Settings</h2>

        <div className="mb-6">
          <h3 className="font-semibold text-sm mb-3">🔑 Claude API Key</h3>
          <div className="flex items-center gap-2">
            <input type={showKey?'text':'password'} value={settings.apiKey} onChange={e=>updateSettings({apiKey:e.target.value})} placeholder="sk-ant-..." className="flex-1 px-3 py-2 rounded-lg text-sm font-mono"/>
            <button onClick={()=>setShowKey(!showKey)} className="btn-ghost px-3 py-2 rounded-lg text-sm">{showKey?'Hide':'Show'}</button>
          </div>
          <p className="text-xs text-muted mt-1">Uses Claude Haiku for fast, affordable content generation</p>
        </div>

        <div className="border-t divider pt-6 mb-6">
          <h3 className="font-semibold text-sm mb-3">👤 Personal Info</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {[['name','Full Name','Aryeh Brecher'],['title','Title','Senior Loan Officer'],['nmls','NMLS#','123456'],['phone','Phone','(555) 123-4567'],['email','Email','aryeh@fmhomeloans.com'],['company','Company','FM Home Loans']].map(([k,l,ph])=>(
              <div key={k}>
                <label className="text-xs text-secondary block mb-1">{l}</label>
                <input type="text" value={settings[k]||''} onChange={e=>updateSettings({[k]:e.target.value})} placeholder={ph} className="w-full px-3 py-2 rounded-lg text-sm"/>
              </div>
            ))}
          </div>
        </div>

        <div className="border-t divider pt-6 mb-6">
          <h3 className="font-semibold text-sm mb-3">🎨 Appearance</h3>
          <div className="flex items-center gap-3">
            <button onClick={()=>setTheme('dark')} className={`px-4 py-2 rounded-lg text-sm ${theme==='dark'?'btn-gold':'btn-ghost'}`}>🌙 Dark</button>
            <button onClick={()=>setTheme('light')} className={`px-4 py-2 rounded-lg text-sm ${theme==='light'?'btn-gold':'btn-ghost'}`}>☀️ Light</button>
          </div>
        </div>

        <div className="border-t divider pt-6 mb-6">
          <h3 className="font-semibold text-sm mb-3">🎯 Default Tone</h3>
          <div className="flex items-center gap-2">
            {TONE_OPTIONS.map(t=>(
              <button key={t} onClick={()=>updateSettings({defaultTone:t.toLowerCase()})} className={`px-3 py-1 rounded-lg text-xs ${settings.defaultTone===t.toLowerCase()?'btn-gold':'btn-ghost'}`}>{t}</button>
            ))}
          </div>
        </div>

        <div className="border-t divider pt-6">
          <h3 className="font-semibold text-sm mb-3">📦 Data</h3>
          <div className="flex items-center gap-3">
            <button onClick={exportAll} className="btn-outline px-4 py-2 rounded-lg text-sm">Export All Data</button>
            <button onClick={()=>{if(confirm('Clear all saved content?')){localStorage.removeItem('ce_saved');window.location.reload();}}} className="px-4 py-2 rounded-lg text-sm text-red-400 border border-red-400 hover:bg-red-400 hover:text-white transition-all">Clear Saved Content</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// MAIN APP
// ============================================================
const App = () => {
  const [activeTab, setActiveTab] = useState('rates');
  const [theme, setTheme] = useState(()=>{ try{return localStorage.getItem('ce_theme')||'dark';}catch{return 'dark';} });
  const [toast, setToast] = useState(null);
  const [settings, setSettings] = useState(()=>{
    try{const s = localStorage.getItem('ce_settings'); return s ? {...DEFAULT_SETTINGS,...JSON.parse(s)} : DEFAULT_SETTINGS;}catch{return DEFAULT_SETTINGS;}
  });
  const [savedContent, setSavedContent] = useState(()=>{
    try{const s = localStorage.getItem('ce_saved'); return s ? JSON.parse(s) : [];}catch{return [];}
  });
  const [sidebarOpen, setSidebarOpen] = useState(true);

  useEffect(()=>{document.body.className=theme;try{localStorage.setItem('ce_theme',theme);}catch{}}, [theme]);
  useEffect(()=>{try{localStorage.setItem('ce_settings',JSON.stringify(settings));}catch{}}, [settings]);
  useEffect(()=>{try{localStorage.setItem('ce_saved',JSON.stringify(savedContent));}catch{}}, [savedContent]);

  const updateSettings = (partial) => setSettings(prev=>({...prev,...partial}));
  const addToast = (message, type='success') => setToast({message,type,key:Date.now()});
  const saveContent = (item) => setSavedContent(prev=>[item,...prev]);

  const TABS = [
    {id:'rates', label:'Rate Updates', icon:'📊'},
    {id:'linkedin', label:'LinkedIn Studio', icon:'💼'},
    {id:'realtor', label:'Realtor Outreach', icon:'🤝'},
    {id:'nurture', label:'Lead Nurture', icon:'📬'},
    {id:'calendar', label:'Content Calendar', icon:'📅'},
    {id:'voice', label:'Brand Voice', icon:'🎤'},
    {id:'library', label:'Saved Library', icon:'📚'},
    {id:'settings', label:'Settings', icon:'⚙️'}
  ];

  const ctx = {settings, updateSettings, addToast, saveContent, savedContent, setSavedContent, theme, setTheme};

  return (
    <AppContext.Provider value={ctx}>
      <div className="flex h-screen overflow-hidden">
        {/* Sidebar */}
        <div className={`sidebar flex-shrink-0 transition-all duration-300 ${sidebarOpen?'w-56':'w-16'} flex flex-col`}>
          <div className="p-4 flex items-center gap-3" style={{borderBottom:'1px solid var(--navy)'}}>
            <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:'var(--navy)'}}>
              <span style={{color:'var(--gold)', fontWeight:800, fontSize:'14px'}}>CE</span>
            </div>
            {sidebarOpen && (
              <div>
                <div className="text-sm font-bold" style={{color:'var(--gold)'}}>ContentEngine</div>
                <div className="text-xs text-muted">FM Home Loans</div>
              </div>
            )}
          </div>
          <nav className="flex-1 py-2 overflow-y-auto">
            {TABS.map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`sidebar-item w-full flex items-center gap-3 px-4 py-3 text-left transition-all ${activeTab===tab.id?'active':''}`}>
                <span className="text-lg flex-shrink-0">{tab.icon}</span>
                {sidebarOpen && <span className="text-sm">{tab.label}</span>}
              </button>
            ))}
          </nav>
          <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="btn-ghost w-full py-3 text-center text-xs">
            {sidebarOpen ? '◀ Collapse' : '▶'}
          </button>
        </div>

        {/* Main Content */}
        <div className="flex-1 overflow-y-auto">
          <header className="sticky top-0 z-10 px-6 py-4 flex items-center justify-between" style={{background:theme==='dark'?'rgba(15,17,23,.9)':'rgba(248,250,252,.9)',backdropFilter:'blur(12px)',borderBottom:theme==='dark'?'1px solid #2d3148':'1px solid #e2e8f0'}}>
            <div>
              <h1 className="text-xl font-bold">{TABS.find(t=>t.id===activeTab)?.icon} {TABS.find(t=>t.id===activeTab)?.label}</h1>
              <p className="text-xs text-muted">{settings.name} · {settings.company}</p>
            </div>
            <div className="flex items-center gap-3">
              {!settings.apiKey && (
                <button onClick={()=>setActiveTab('settings')} className="px-3 py-1 rounded-lg text-xs bg-red-500 bg-opacity-20 text-red-400 border border-red-500 border-opacity-30">
                  ⚠️ Set API Key
                </button>
              )}
              <button onClick={()=>setTheme(theme==='dark'?'light':'dark')} className="btn-ghost px-2 py-1 rounded-lg text-sm">
                {theme==='dark'?'☀️':'🌙'}
              </button>
            </div>
          </header>
          <main className="p-6 max-w-5xl">
            {activeTab==='rates' && <RateUpdateGenerator/>}
            {activeTab==='linkedin' && <LinkedInStudio/>}
            {activeTab==='realtor' && <RealtorOutreach/>}
            {activeTab==='nurture' && <LeadNurture/>}
            {activeTab==='calendar' && <ContentCalendar/>}
            {activeTab==='voice' && <BrandVoice/>}
            {activeTab==='library' && <SavedLibrary/>}
            {activeTab==='settings' && <SettingsPanel/>}
          </main>
        </div>
      </div>
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
    </AppContext.Provider>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
