<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpxTracker — Options P&L</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141414;--bg2:#1b1b1b;--bg3:#212121;--bg4:#282828;--bg5:#303030;
  --border:#2e2e2e;--border2:#3a3a3a;--border3:#484848;
  --text:#f0f0f0;--text2:#b0b0b0;--text3:#737373;--text4:#4a4a4a;
  --blue:#6366f1;--blue2:#4f46e5;--blue-glow:rgba(99,102,241,0.15);
  --green:#00c805;--green2:#00a804;--green-glow:rgba(0,200,5,0.14);
  --red:#ff3b30;--red2:#d63027;--red-glow:rgba(255,59,48,0.14);
  --gold:#f0b429;--gold2:#d69a1c;--gold-glow:rgba(240,180,41,0.14);
  --purple:#a78bfa;--purple-glow:rgba(167,139,250,0.14);
  --r:10px;--r2:14px;--r3:20px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.22);
  --shadow-md:0 4px 20px rgba(0,0,0,.28);
  --shadow-lg:0 10px 40px rgba(0,0,0,.36);
}
[data-theme="light"]{
  --bg:#f5f5f7;--bg2:#eaeaed;--bg3:#ffffff;--bg4:#f0f0f2;--bg5:#e5e5e8;
  --border:#d8d8dc;--border2:#c8c8cc;--border3:#b0b0b5;
  --text:#1a1a1a;--text2:#444444;--text3:#777777;--text4:#999999;
  --shadow-sm:0 2px 8px rgba(0,0,0,.08);
  --shadow-md:0 4px 20px rgba(0,0,0,.12);
  --shadow-lg:0 10px 40px rgba(0,0,0,.16);
}
[data-theme="light"] body{background:var(--bg);background-image:radial-gradient(ellipse at 60% 0%,rgba(0,200,5,0.02) 0%,transparent 60%),radial-gradient(ellipse at 10% 80%,rgba(99,102,241,0.02) 0%,transparent 50%)}
[data-theme="light"] .header{background:rgba(245,245,247,0.92)}
[data-theme="light"] .ticker-strip{background:var(--bg2)}
[data-theme="light"] .modal-bg{background:rgba(255,255,255,.6)}
[data-theme="light"] .modal{background:var(--bg3)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1;background-image:radial-gradient(ellipse at 60% 0%,rgba(0,200,5,0.03) 0%,transparent 60%),radial-gradient(ellipse at 10% 80%,rgba(99,102,241,0.03) 0%,transparent 50%)}
.app{display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}
.header{background:rgba(20,20,20,0.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 0 rgba(255,255,255,.03)}
.logo{display:flex;align-items:center;gap:10px;margin-right:28px}
.logo-icon{width:32px;height:32px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 18px var(--green-glow)}
.logo-text{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.logo-badge{font-size:9px;font-weight:700;color:var(--green);background:var(--green-glow);border:1px solid rgba(0,200,5,0.25);padding:1px 6px;border-radius:20px;letter-spacing:.5px}
.header-left{display:flex;align-items:center}
.nav{display:flex;gap:1px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:3px}
.nav-btn{background:none;border:none;color:var(--text3);padding:6px 15px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;transition:all .18s;white-space:nowrap;letter-spacing:.1px}
.nav-btn:hover{color:var(--text2);background:rgba(255,255,255,0.06)}
.nav-btn.active{background:var(--bg4);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.06)}
.header-right{display:flex;align-items:center;gap:12px}
.header-pnl{text-align:right}
.header-pnl-label{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.header-pnl-val{font-size:22px;font-weight:800;line-height:1.1;letter-spacing:-0.5px}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text3);width:34px;height:34px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .18s}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ticker-strip{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:42px;display:flex;align-items:center;overflow:hidden;position:sticky;top:58px;z-index:199;gap:0;box-shadow:0 1px 0 rgba(255,255,255,.02)}
.ticker-strip::-webkit-scrollbar{display:none}
.ticker-scroll-wrapper{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;gap:0;flex:1;scroll-behavior:smooth}
.ticker-scroll-wrapper::-webkit-scrollbar{display:none}
.ticker-arrow-btn{background:rgba(0,0,0,.3);border:none;color:var(--text3);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;position:relative;z-index:1}
.ticker-arrow-btn:hover{background:rgba(0,0,0,.5);color:var(--text2)}
.ticker-arrow-btn:disabled{opacity:.3;cursor:default}
.ticker-item{display:flex;align-items:center;gap:7px;padding:0 16px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.t-sym{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.4px}
.t-price{font-size:12px;color:var(--text);font-weight:600}
.t-chg{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px}
.t-chg.pos{background:var(--green-glow);color:var(--green)}
.t-chg.neg{background:var(--red-glow);color:var(--red)}
.t-session{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px;white-space:nowrap}
.t-session.pre{background:rgba(240,180,41,0.12);color:var(--gold);border:1px solid rgba(240,180,41,0.22)}
.t-session.after{background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid rgba(167,139,250,0.22)}
.t-session.closed{background:rgba(80,80,80,0.15);color:var(--text3);border:1px solid var(--border)}
.t-ext{font-size:10px;color:var(--text3);margin-left:2px}
.t-ext-price{font-size:11px;font-weight:600}
.t-ext-chg{font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px}
.strip-right{display:flex;align-items:center;gap:10px;margin-left:auto;padding-left:16px;flex-shrink:0}
.strip-time{font-size:10px;color:var(--text4)}
.refresh-btn{background:none;border:1px solid var(--border2);color:var(--text3);padding:2px 9px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;transition:all .2s}
.refresh-btn:hover:not(:disabled){background:var(--bg4);color:var(--text2)}
.refresh-btn:disabled{opacity:.3;cursor:default}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.content{flex:1;padding:24px 28px;max-width:1500px;width:100%;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;position:relative;overflow:hidden;transition:all .22s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-sm)}
.kpi:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r2) var(--r2) 0 0}
.kpi.kpi-blue::before{background:linear-gradient(90deg,var(--blue),var(--purple));opacity:.9}
.kpi.kpi-green::before{background:linear-gradient(90deg,var(--green),#7fff80);opacity:.9}
.kpi.kpi-red::before{background:linear-gradient(90deg,var(--red),#ff6b60);opacity:.9}
.kpi.kpi-gold::before{background:linear-gradient(90deg,var(--gold),#ffe066);opacity:.9}
.kpi.kpi-purple::before{background:linear-gradient(90deg,var(--purple),var(--blue));opacity:.9}
.kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:800;line-height:1;letter-spacing:-0.8px;margin-bottom:6px;font-feature-settings:'tnum' 1}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-icon{position:absolute;top:14px;right:14px;font-size:22px;opacity:.1}
.pos{color:var(--green);font-feature-settings:'tnum' 1}.neg{color:var(--red);font-feature-settings:'tnum' 1}.neu{color:var(--text)}.gold{color:var(--gold)}.blue{color:var(--blue)}.purple{color:var(--purple)}
.greeks-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:18px}
.greek-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.greek-label{font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.greek-val{font-size:17px;font-weight:800;letter-spacing:-0.3px}
.greek-sub{font-size:10px;color:var(--text3);margin-top:2px}
.tbl-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.8px;padding:12px 15px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:rgba(0,0,0,.2)}
td{padding:12px 15px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,0.03);transition:background .12s}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b-call{background:rgba(99,102,241,0.14);color:var(--blue);border:1px solid rgba(99,102,241,0.28)}
.b-put{background:rgba(167,139,250,0.14);color:var(--purple);border:1px solid rgba(167,139,250,0.28)}
.b-buy{background:rgba(0,200,5,0.1);color:var(--green);border:1px solid rgba(0,200,5,0.22)}
.b-sell{background:rgba(255,59,48,0.1);color:var(--red);border:1px solid rgba(255,59,48,0.22)}
.b-open{background:rgba(0,200,5,0.1);color:var(--green);border:1px solid rgba(0,200,5,0.2)}
.b-closed{background:rgba(80,80,80,0.15);color:var(--text3)}
.b-itm{background:rgba(0,200,5,0.12);color:var(--green);border:1px solid rgba(0,200,5,0.22)}
.b-otm{background:rgba(255,59,48,0.1);color:var(--red);border:1px solid rgba(255,59,48,0.18)}
.b-atm{background:rgba(240,180,41,0.12);color:var(--gold);border:1px solid rgba(240,180,41,0.22)}
.strat-income{background:rgba(240,180,41,0.12);color:var(--gold);border:1px solid rgba(240,180,41,0.25)}
.strat-directional{background:rgba(99,102,241,0.12);color:var(--blue);border:1px solid rgba(99,102,241,0.25)}
.strat-neutral{background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid rgba(167,139,250,0.25)}
.strat-hedge{background:rgba(0,200,5,0.1);color:var(--green);border:1px solid rgba(0,200,5,0.22)}
.strat-other{background:rgba(100,100,100,0.1);color:var(--text3);border:1px solid rgba(100,100,100,0.22)}
.btn{padding:8px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .18s cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:.1px}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--green);color:#000;box-shadow:0 2px 10px var(--green-glow);font-weight:700}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 18px var(--green-glow);background:var(--green2)}
.btn-secondary{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:hover:not(:disabled){background:var(--bg5);color:var(--text);border-color:var(--border3)}
.btn-success{background:rgba(0,200,5,0.1);color:var(--green);border:1px solid rgba(0,200,5,0.25)}
.btn-success:hover:not(:disabled){background:rgba(0,200,5,0.18)}
.btn-danger{background:rgba(255,59,48,0.1);color:var(--red);border:1px solid rgba(255,59,48,0.22)}
.btn-danger:hover:not(:disabled){background:rgba(255,59,48,0.18)}
.btn-ghost{background:none;color:var(--text3);border:1px solid transparent}
.btn-ghost:hover:not(:disabled){background:var(--bg4);color:var(--text2);border-color:var(--border)}
.btn-purple{background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid rgba(167,139,250,0.25)}
.btn-purple:hover:not(:disabled){background:rgba(167,139,250,0.22)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:8px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.sec-count{font-size:11px;font-weight:600;background:var(--bg4);border:1px solid var(--border);color:var(--text3);padding:1px 7px;border-radius:20px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r3);padding:28px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04)}
.modal-wide{max-width:720px}
.modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:var(--text3);font-weight:600}
input,select,textarea{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:10px 12px;font-size:13px;width:100%;outline:none;transition:all .18s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);background:var(--bg3)}
input::placeholder,textarea::placeholder{color:var(--text4)}
select option{background:var(--bg3)}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.3}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12px}
.no-key-banner{background:var(--gold-glow);border:1px solid rgba(240,180,41,0.2);border-left:3px solid var(--gold);border-radius:var(--r2);padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--gold)}
.no-key-banner a{color:var(--green);cursor:pointer;font-weight:700;text-decoration:underline;text-underline-offset:2px}
.alert{border-radius:var(--r);padding:10px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.alert-warn{background:var(--gold-glow);border:1px solid rgba(240,180,41,0.25);color:var(--gold)}
.alert-danger{background:var(--red-glow);border:1px solid rgba(255,59,48,0.25);color:var(--red)}
.alert-info{background:var(--blue-glow);border:1px solid rgba(99,102,241,0.25);color:var(--blue)}
.chart-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:20px;box-shadow:var(--shadow-sm)}
.chart-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}
/* Progress bar */
.prog-bar{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .4s}
/* POP ring */
.pop-ring{display:inline-flex;flex-direction:column;align-items:center;gap:1px}
.pop-val{font-size:13px;font-weight:800}
.pop-label{font-size:8px;color:var(--text4);letter-spacing:.5px;text-transform:uppercase}
/* DIT */
.dit-badge{font-size:10px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);padding:2px 6px;border-radius:4px;white-space:nowrap}
/* AI Chat */
.ai-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.ai-header{background:linear-gradient(135deg,rgba(0,200,5,0.06),rgba(99,102,241,0.06));border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:10px}
.ai-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-title{font-size:13px;font-weight:700;color:var(--text)}
.ai-sub{font-size:11px;color:var(--text3)}
.ai-messages{max-height:320px;overflow-y:auto;padding:14px}
.ai-msg{display:flex;gap:8px;margin-bottom:12px}
.ai-msg.user{flex-direction:row-reverse}
.ai-bubble{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.ai-bubble.assistant{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:4px 12px 12px 12px}
.ai-bubble.user{background:var(--green);color:#000;border-radius:12px 4px 12px 12px;font-weight:500}
.ai-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}
.ai-avatar.bot{background:linear-gradient(135deg,var(--blue),var(--purple))}
.ai-avatar.me{background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
.ai-input-row{border-top:1px solid var(--border);padding:12px 14px;display:flex;gap:8px;align-items:flex-end}
.ai-textarea{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:10px 14px;font-size:13px;outline:none;resize:none;font-family:inherit;max-height:100px;transition:border .2s}
.ai-textarea:focus{border-color:var(--green)}
.ai-send{background:var(--green);color:#000;border:none;width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .18s;font-weight:700}
.ai-send:hover:not(:disabled){transform:scale(1.05)}
.ai-send:disabled{opacity:.4;cursor:default}
/* Payoff chart */
.payoff-positive{color:var(--green)}
.payoff-negative{color:var(--red)}
/* Research */
.iv-banner{border-radius:var(--r2);padding:18px 22px;margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.iv-low{background:var(--green-glow);border:1px solid rgba(0,200,5,0.22)}
.iv-normal{background:var(--blue-glow);border:1px solid rgba(99,102,241,0.22)}

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

/* ══ CONSTANTS ══ */
const WATCHLIST=['SPY','QQQ','TSLA','NVDA','AAPL','AMD','META'];
const DEFAULT_IV={SPY:0.15,QQQ:0.17,TSLA:0.58,NVDA:0.48,AAPL:0.26,AMD:0.45,META:0.36,AMZN:0.30,MSFT:0.25,DEFAULT:0.32};
const RISK_FREE_DEFAULT=0.05;
let _riskFreeRate=RISK_FREE_DEFAULT;
let _riskFreeLastFetch=0;
const RISK_FREE_CACHE_MS=3600000; // 1 hour cache
// Primary + fallback CORS proxies — tried in order on failure
const CORS_PROXIES=['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
const CORS_PROXY=CORS_PROXIES[0];

// Fetch with automatic CORS proxy fallback
const corsGet=async(rawUrl,opts={})=>{
  for(const proxy of CORS_PROXIES){
    try{
      const r=await fetch(proxy+encodeURIComponent(rawUrl),{signal:AbortSignal.timeout(10000),...opts});
      if(r.ok)return r;
    }catch(e){/* try next */}
  }
  throw new Error('All CORS proxies failed for: '+rawUrl);
};

/* ══ DYNAMIC RISK-FREE RATE ══ */
const fetchRiskFreeRate=async()=>{
  if(Date.now()-_riskFreeLastFetch<RISK_FREE_CACHE_MS&&_riskFreeRate!==RISK_FREE_DEFAULT)return _riskFreeRate;
  try{
    // Fetch 13-week T-bill yield (^IRX) from Yahoo Finance via CORS proxy
    const r=await corsGet('https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EIRX,%5ETNX&fields=regularMarketPrice');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const results=d.quoteResponse?.result||[];
    // Prefer 13-week T-bill (^IRX), fallback to 10-year (^TNX)
    const irx=results.find(q=>q.symbol==='^IRX');
    const tnx=results.find(q=>q.symbol==='^TNX');
    const rate=irx?.regularMarketPrice||tnx?.regularMarketPrice;
    if(rate&&rate>0&&rate<20){
      _riskFreeRate=rate/100; // Convert from percentage to decimal
      _riskFreeLastFetch=Date.now();
      console.log(`[OpxTracker] Risk-free rate updated: ${(rate).toFixed(2)}% (${irx?'^IRX':'^TNX'})`);
      return _riskFreeRate;
    }
  }catch(e){console.warn('[OpxTracker] Risk-free rate fetch failed, using default:',e.message);}
  return _riskFreeRate;
};
const getRiskFreeRate=()=>_riskFreeRate;

/* ══ YAHOO OPTIONS CHAIN ══ */
let _optionsChainCache={};
const OPTIONS_CACHE_MS=300000; // 5 min cache

const fetchYahooOptionsChain=async(symbol)=>{
  const key=symbol.toUpperCase();
  const cached=_optionsChainCache[key];
  if(cached&&Date.now()-cached.ts<OPTIONS_CACHE_MS)return cached.data;
  try{
    const r=await corsGet(`https://query1.finance.yahoo.com/v7/finance/options/${key}`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const chain=d.optionChain?.result?.[0];
    if(!chain)return null;
    const allOptions=[];
    const calls=chain.options?.[0]?.calls||[];
    const puts=chain.options?.[0]?.puts||[];
    calls.forEach(c=>{allOptions.push({type:'Call',strike:c.strike,expiry:c.expiration,bid:c.bid||0,ask:c.ask||0,last:c.lastPrice||0,iv:c.impliedVolatility||0,volume:c.volume||0,oi:c.openInterest||0,contractSymbol:c.contractSymbol});});
    puts.forEach(p=>{allOptions.push({type:'Put',strike:p.strike,expiry:p.expiration,bid:p.bid||0,ask:p.ask||0,last:p.lastPrice||0,iv:p.impliedVolatility||0,volume:p.volume||0,oi:p.openInterest||0,contractSymbol:p.contractSymbol});});
    // Also extract available expiry dates for multi-expiry fetching
    const expirationDates=chain.expirationDates||[];
    const result={options:allOptions,expirationDates,underlyingPrice:chain.quote?.regularMarketPrice};
    _optionsChainCache[key]={data:result,ts:Date.now()};
    return result;
  }catch(e){console.warn(`[OpxTracker] Options chain fetch failed for ${key}:`,e.message);return null;}
};

const fetchOptionsForExpiry=async(symbol,expiryTimestamp)=>{
  const key=symbol.toUpperCase();
  try{
    const r=await corsGet(`https://query1.finance.yahoo.com/v7/finance/options/${key}?date=${expiryTimestamp}`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const chain=d.optionChain?.result?.[0];
    if(!chain)return[];
    const allOptions=[];
    (chain.options?.[0]?.calls||[]).forEach(c=>{allOptions.push({type:'Call',strike:c.strike,expiry:c.expiration,bid:c.bid||0,ask:c.ask||0,last:c.lastPrice||0,iv:c.impliedVolatility||0,volume:c.volume||0,oi:c.openInterest||0});});
    (chain.options?.[0]?.puts||[]).forEach(p=>{allOptions.push({type:'Put',strike:p.strike,expiry:p.expiration,bid:p.bid||0,ask:p.ask||0,last:p.lastPrice||0,iv:p.impliedVolatility||0,volume:p.volume||0,oi:p.openInterest||0});});
    return allOptions;
  }catch(e){return[];}
};

const findOptionMatch=(options,trade)=>{
  if(!options||!options.length)return null;
  const strike=parseFloat(trade.strike);
  const type=trade.optionType;
  // Find exact match by strike and type
  const match=options.find(o=>o.type===type&&Math.abs(o.strike-strike)<0.01);
  if(!match)return null;
  // Calculate mid-price
  const mid=(match.bid>0&&match.ask>0)?(match.bid+match.ask)/2:(match.last||null);
  if(!mid||mid<=0)return null;
  return{mid:parseFloat(mid.toFixed(2)),bid:match.bid,ask:match.ask,last:match.last,iv:match.iv,volume:match.volume,oi:match.openInterest};
};

/* ══ LIVE OPTIONS MARK FETCHER ══ */
const fetchLiveOptionMarks=async(openTrades)=>{
  const results={};
  // Group trades by ticker
  const byTicker={};
  openTrades.forEach(t=>{
    const sym=t.ticker.toUpperCase();
    if(!byTicker[sym])byTicker[sym]=[];
    byTicker[sym].push(t);
  });

  await Promise.all(Object.entries(byTicker).map(async([sym,trades])=>{
    // Get default chain first (nearest expiry)
    const chain=await fetchYahooOptionsChain(sym);
    if(!chain)return;

    // Collect unique expiry timestamps needed
    const expiryTimestamps=new Set();
    trades.forEach(t=>{
      if(t.expiry){
        const ts=Math.floor(new Date(t.expiry+'T00:00:00').getTime()/1000);
        expiryTimestamps.add(ts);
      }
    });

    // Fetch options for each unique expiry
    const allOptions=[...chain.options];
    const availableExpiries=new Set(chain.expirationDates||[]);

    for(const ts of expiryTimestamps){
      // Find closest available expiry
      let bestExpiry=null,bestDiff=Infinity;
      for(const avail of availableExpiries){
        const diff=Math.abs(avail-ts);
        if(diff<bestDiff){bestDiff=diff;bestExpiry=avail;}
      }
      // Only fetch if we found a close match (within 3 days)
      if(bestExpiry&&bestDiff<259200){
        const expiryOptions=await fetchOptionsForExpiry(sym,bestExpiry);
        allOptions.push(...expiryOptions);
      }
    }

    // Match each trade
    trades.forEach(t=>{
      // Filter options to matching expiry range
      const tradeExpTs=Math.floor(new Date(t.expiry+'T00:00:00').getTime()/1000);
      const relevantOpts=allOptions.filter(o=>Math.abs((o.expiry||0)-tradeExpTs)<259200);
      const match=findOptionMatch(relevantOpts,t);
      if(match){
        results[t.id]={mark:match.mid,iv:match.iv,bid:match.bid,ask:match.ask,source:'live'};
      }
    });
  }));
  return results;
};

/* ══ IV RANK / IV PERCENTILE ══ */
let _ivDataCache={};
const IV_CACHE_MS=1800000; // 30 min cache

const calcIVRankFromChain=(chain)=>{
  if(!chain||!chain.options||!chain.options.length)return null;
  // Get ATM options IV as current IV estimate
  const price=chain.underlyingPrice;
  if(!price)return null;
  // Find nearest ATM calls
  const calls=chain.options.filter(o=>o.type==='Call'&&o.iv>0);
  if(!calls.length)return null;
  calls.sort((a,b)=>Math.abs(a.strike-price)-Math.abs(b.strike-price));
  const atmIV=calls[0]?.iv;
  if(!atmIV)return null;
  // Get all IVs to build a distribution
  const allIVs=chain.options.filter(o=>o.iv>0&&Math.abs(o.strike-price)/price<0.15).map(o=>o.iv);
  if(allIVs.length<3)return{currentIV:atmIV,rank:null,percentile:null};
  const sorted=[...allIVs].sort((a,b)=>a-b);
  const min=sorted[0],max=sorted[sorted.length-1];
  const rank=max>min?Math.round(((atmIV-min)/(max-min))*100):50;
  // Percentile: % of values below current
  const below=sorted.filter(v=>v<atmIV).length;
  const percentile=Math.round((below/sorted.length)*100);
  return{currentIV:atmIV,rank:Math.max(0,Math.min(100,rank)),percentile:Math.max(0,Math.min(100,percentile))};
};

/* ══ MATH ══ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt$=(v,d=2)=>{if(v===null||v===undefined||isNaN(v))return'—';const a=Math.abs(v),s=v<0?'-':'';if(a>=1e6)return s+'$'+(a/1e6).toFixed(1)+'M';if(a>=1000)return s+'$'+a.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');return s+'$'+a.toFixed(d);};
const fmtPct=v=>v===null||isNaN(v)?'—':(v>=0?'+':'')+v.toFixed(2)+'%';

const normCDF=x=>{const a1=0.31938153,a2=-0.356563782,a3=1.781477937,a4=-1.821255978,a5=1.330274429;const L=Math.abs(x),k=1/(1+0.2316419*L);const w=1-(1/Math.sqrt(2*Math.PI))*Math.exp(-L*L/2)*(a1*k+a2*k*k+a3*k*k*k+a4*k*k*k*k+a5*k*k*k*k*k);return x<0?1-w:w;};
const normPDF=x=>Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI);

const blackScholes=(type,S,K,T,r,sigma)=>{
  if(T<=0)return Math.max(0,type==='Call'?S-K:K-S);
  const d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T)),d2=d1-sigma*Math.sqrt(T);
  return type==='Call'?S*normCDF(d1)-K*Math.exp(-r*T)*normCDF(d2):K*Math.exp(-r*T)*normCDF(-d2)-S*normCDF(-d1);
};

const estimateMark=(trade,sp)=>{
  if(!sp||!trade.expiry||!trade.strike)return null;
  const T=(new Date(trade.expiry)-new Date())/(365.25*24*3600*1000);
  // If the option has already expired, don't estimate — return null so the user
  // is prompted to enter the actual close/settlement price manually.
  if(T<0)return null;
  const sigma=DEFAULT_IV[trade.ticker.toUpperCase()]||DEFAULT_IV.DEFAULT;
  const r=getRiskFreeRate();
  const val=blackScholes(trade.optionType,sp,parseFloat(trade.strike),T,r,sigma);
  return isNaN(val)||val<0?null:Math.max(0.01,parseFloat(val.toFixed(2)));
};

const calcGreeks=(trade,sp)=>{
  if(!sp||!trade.expiry||!trade.strike)return{delta:0,theta:0,gamma:0};
  const S=sp,K=parseFloat(trade.strike),qty=parseFloat(trade.quantity)||1;
  const T=(new Date(trade.expiry)-new Date())/(365.25*24*3600*1000);
  if(T<=0)return{delta:0,theta:0,gamma:0};
  const sigma=DEFAULT_IV[trade.ticker.toUpperCase()]||DEFAULT_IV.DEFAULT;
  const r=getRiskFreeRate();
  const d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T)),d2=d1-sigma*Math.sqrt(T);
  const rawDelta=trade.optionType==='Call'?normCDF(d1):normCDF(d1)-1;
  const gamma=normPDF(d1)/(S*sigma*Math.sqrt(T));
  const thetaRaw=(-(S*sigma*normPDF(d1))/(2*Math.sqrt(T))-(trade.optionType==='Call'?r*K*Math.exp(-r*T)*normCDF(d2):-r*K*Math.exp(-r*T)*normCDF(-d2)))/365;
  const sign=trade.action==='Sell'?-1:1;
  return{delta:rawDelta*sign*qty*100,theta:thetaRaw*sign*qty*100,gamma:gamma*sign*qty*100};
};

const calcPnL=(trade,override=null)=>{
  const cp=override!==null?override:(trade.status==='Closed'?parseFloat(trade.closePrice):parseFloat(trade.currentMark));
  if(cp===null||cp===undefined||isNaN(cp))return null;
  const entry=parseFloat(trade.premium),qty=parseFloat(trade.quantity)||1;
  return isNaN(entry)?null:(trade.action==='Buy'?(cp-entry)*qty*100:(entry-cp)*qty*100);
};

const calcPOP=(trade,sp)=>{
  if(!sp||!trade.expiry||!trade.strike)return null;
  const T=(new Date(trade.expiry)-new Date())/(365.25*24*3600*1000);
  if(T<=0)return null;
  const sigma=DEFAULT_IV[trade.ticker.toUpperCase()]||DEFAULT_IV.DEFAULT;
  const K=parseFloat(trade.strike),prem=parseFloat(trade.premium)||0;
  const r=getRiskFreeRate();
  // Breakeven point for POP calc (same formula for buy and sell — direction flip handled below)
  const be=trade.optionType==='Call'?K+prem:K-prem;
  const d2=(Math.log(sp/be)+(r-sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  // Probability underlying is above/below breakeven at expiry
  if(trade.optionType==='Call'){
    return trade.action==='Buy'?normCDF(d2):normCDF(-d2);
  } else {
    return trade.action==='Buy'?normCDF(-d2):normCDF(d2);
  }
};

const calcMaxProfit=(trade)=>{
  const qty=parseFloat(trade.quantity)||1,prem=parseFloat(trade.premium)||0;
  if(trade.action==='Sell')return prem*qty*100; // credit = max profit
  return null; // unlimited for long
};

const calcBreakeven=trade=>{const K=parseFloat(trade.strike),p=parseFloat(trade.premium);if(isNaN(K)||isNaN(p))return null;return trade.optionType==='Call'?K+p:K-p;};
const calcDIT=trade=>trade.date?Math.floor((new Date()-new Date(trade.date))/86400000):0;
const getMoneyness=(trade,sp)=>{if(!sp||!trade.strike)return null;const K=parseFloat(trade.strike),pct=((sp-K)/K)*100;if(trade.optionType==='Call'){if(sp>K*1.005)return{label:'ITM',cls:'b-itm',pct};if(sp<K*0.995)return{label:'OTM',cls:'b-otm',pct};return{label:'ATM',cls:'b-atm',pct};}else{if(sp<K*0.995)return{label:'ITM',cls:'b-itm',pct};if(sp>K*1.005)return{label:'OTM',cls:'b-otm',pct};return{label:'ATM',cls:'b-atm',pct};}};

/* ══ PORTFOLIO STATS ══ */
const calcStats=closed=>{
  if(!closed.length)return{};
  const pnls=closed.map(t=>calcPnL(t)).filter(p=>p!==null);
  const wins=pnls.filter(p=>p>0),losses=pnls.filter(p=>p<0);
  const total=pnls.reduce((s,p)=>s+p,0),winRate=pnls.length?wins.length/pnls.length:0;
  const avgWin=wins.length?wins.reduce((s,p)=>s+p,0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((s,p)=>s+p,0)/losses.length:0;
  const pf=losses.length&&avgLoss?Math.abs(avgWin*wins.length/(avgLoss*losses.length)):null;
  const exp=winRate*avgWin+(1-winRate)*avgLoss;
  let peak=0,run=0,maxDD=0;
  pnls.forEach(p=>{run+=p;if(run>peak)peak=run;const dd=peak-run;if(dd>maxDD)maxDD=dd;});
  const totalFees=closed.reduce((s,t)=>s+(parseFloat(t.fees)||0),0);
  return{total,winRate,avgWin,avgLoss,pf,exp,maxDD,n:pnls.length,wins:wins.length,losses:losses.length,totalFees};
};

/* ══ NLP TRADE PARSER ══ */
const SKIP_WORDS=new Set(['BTO','STO','BUY','SELL','SOLD','BOUGHT','LONG','SHORT','CALL','CALLS','PUT','PUTS','EXP','EXPIRY','EXPIRING','EXPIRES','AT','FOR','CR','DB','CREDIT','DEBIT','AND','THE','A','AN','ON','IN','X','TO','OF','CONTRACT','CONTRACTS','OPEN','CLOSE','OPTION','OPTIONS']);

const parseTradeText=text=>{
  const raw=text.trim();
  const up=raw.toUpperCase();
  const result={};

  // 1. ACTION — check first
  if(/\b(BTO|BOUGHT|BUY|LONG)\b/i.test(raw))result.action='Buy';
  else if(/\b(STO|SOLD|SELL|SHORT)\b/i.test(raw))result.action='Sell';

  // 2. OPTION TYPE — detect before ticker (avoids "C" in ticker confusion)
  if(/\bcalls?\b/i.test(raw)||/\d[Cc]\b/.test(raw))result.optionType='Call';
  else if(/\bputs?\b/i.test(raw)||/\d[Pp]\b/.test(raw))result.optionType='Put';
  else if(/\bC\b/.test(raw)&&!/\bP\b/.test(raw))result.optionType='Call';
  else if(/\bP\b/.test(raw)&&!/\bC\b/.test(raw))result.optionType='Put';

  // 3. TICKER — first uppercase alphabetic token that isn't a keyword
  const words=raw.split(/[\s,]+/);
  for(const w of words){
    const clean=w.replace(/[^A-Za-z]/g,'').toUpperCase();
    if(clean.length>=1&&clean.length<=5&&/^[A-Z]+$/.test(clean)&&!SKIP_WORDS.has(clean)){
      result.ticker=clean;break;
    }
  }

  // 4. QUANTITY — support up to 5 digits (e.g. 200, 1000 contracts)
  let qty=null;
  const qtyPatterns=[
    /\b(\d{1,5})\s*(?:contracts?|x)\b/i,                                         // "200 contracts" / "5x"
    result.ticker?new RegExp(`\\b(\\d{1,5})\\s+${result.ticker}\\b`,'i'):null,    // "200 SPY"
    /\b(?:BTO|STO|bought|sold|buy|sell)\s+(\d{1,5})\b/i,                         // "bought 200"
  ].filter(Boolean);
  for(const pat of qtyPatterns){const m=raw.match(pat);if(m){qty=parseInt(m[1]);break;}}
  if(!qty){
    // Fallback: first standalone integer ≤ 10000 that is clearly not a year/strike/price
    const nums=[...raw.matchAll(/\b(\d{1,5})\b/g)];
    for(const m of nums){
      const n=parseInt(m[1]);
      // skip things that look like years or prices with decimal
      if(n>=1&&n<=9999&&!raw.slice(m.index-1,m.index).includes('$')&&!raw.slice(m.index-1,m.index).includes('.')){
        qty=n;break;
      }
    }
  }
  if(qty&&qty>=1&&qty<=9999)result.quantity=qty;

  // 5. STRIKE — number explicitly attached to call/put keyword, or preceded by $ sign
  //    Explicitly exclude the detected quantity to avoid treating "200 contracts" as the strike
  const qtyVal=result.quantity;
  const strikePatterns=[
    /\$(\d{2,6}(?:\.\d{1,2})?)\s*(?:c|p|calls?|puts?)\b/i,   // $580 calls
    /\b(\d{2,6}(?:\.\d{1,2})?)\s*(?:c|p)\b/i,                  // 580c / 580p
    /\b(\d{2,6}(?:\.\d{1,2})?)\s+(?:calls?|puts?)\b/i,         // 580 calls
    /(?:strike|at strike)[:\s]+\$?(\d{2,6}(?:\.\d{1,2})?)/i,  // strike: 580
    /\$(\d{2,6}(?:\.\d{1,2})?)/,                                // bare $580
  ];
  for(const pat of strikePatterns){
    const m=raw.match(pat);
    if(m){
      const v=parseFloat(m[1]);
      if(v!==qtyVal){result.strike=v;break;}  // don't steal the quantity
    }
  }
  // Fallback: largest number that isn't the quantity and isn't tiny (likely a premium)
  if(!result.strike){
    const allNums=[...raw.matchAll(/\b(\d{2,6}(?:\.\d{1,2})?)\b/g)].map(m=>parseFloat(m[1]));
    const candidates=allNums.filter(n=>n>=5&&n<=100000&&n!==qtyVal);
    if(candidates.length)result.strike=Math.max(...candidates);
  }

  // 6. PREMIUM — explicitly keyed: @, for, cr, db, at $X, paid
  //    Require the number to NOT equal the quantity or the strike
  const premPatterns=[
    /@\s*\$?(\d{1,4}(?:\.\d{1,2})?)/,                          // @8.50
    /\bfor\s+\$?(\d{1,4}(?:\.\d{1,2})?)/i,                     // for 8.50
    /\bcr(?:edit)?\s+\$?(\d{1,4}(?:\.\d{1,2})?)/i,             // cr 3.00
    /\bdb\s+\$?(\d{1,4}(?:\.\d{1,2})?)/i,                      // db 2.50
    /\bat\s+\$(\d{1,4}(?:\.\d{1,2})?)/i,                       // at $8.50 (require $)
    /\bpaid\s+\$?(\d{1,4}(?:\.\d{1,2})?)/i,                    // paid 8.50
    /\bpremium\s+\$?(\d{1,4}(?:\.\d{1,2})?)/i,                 // premium 3.00
  ];
  for(const pat of premPatterns){
    const m=raw.match(pat);
    if(m){const v=parseFloat(m[1]);if(v!==qtyVal&&v!==result.strike){result.premium=v;break;}}
  }
  // Fallback: any decimal number (X.XX format) that isn't the strike or qty
  if(!result.premium){
    const decimals=[...raw.matchAll(/\b(\d{1,4}\.\d{1,2})\b/g)].map(m=>parseFloat(m[1]));
    const candidates=decimals.filter(n=>n!==result.strike&&n!==qtyVal&&n<500);
    if(candidates.length)result.premium=candidates[candidates.length-1];
  }

  // 7. EXPIRY — MM/DD, Month Name, "exp MM/DD"
  const months={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  const bumpYearIfPast=dateStr=>{if(!dateStr)return dateStr;const d=new Date(dateStr+'T12:00:00');if(d<new Date()){const bumped=new Date(dateStr+'T12:00:00');bumped.setFullYear(bumped.getFullYear()+1);return bumped.toISOString().slice(0,10);}return dateStr;};
  const dateM=raw.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
  if(dateM){const mo=dateM[1].padStart(2,'0'),dy=dateM[2].padStart(2,'0'),yr=dateM[3]?(dateM[3].length===2?'20'+dateM[3]:dateM[3]):new Date().getFullYear().toString();result.expiry=dateM[3]?`${yr}-${mo}-${dy}`:bumpYearIfPast(`${yr}-${mo}-${dy}`);}
  if(!result.expiry){
    const monM=raw.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s*(\d{1,2})(?:[,\s]+(\d{4}))?/i);
    if(monM){const mo=months[monM[1].toLowerCase().slice(0,3)],dy=monM[2].padStart(2,'0'),yr=monM[3]||new Date().getFullYear().toString();result.expiry=monM[3]?`${yr}-${mo}-${dy}`:bumpYearIfPast(`${yr}-${mo}-${dy}`);}
  }

  // 8. STRATEGY INFERENCE (smarter — checks keywords too)
  const hasSpread=/spread|vertical/i.test(raw);
  const hasIronCondor=/iron\s*condor/i.test(raw);
  const hasCovered=/covered/i.test(raw);
  const hasCSP=/cash.?secured|csp/i.test(raw);
  if(hasIronCondor)result.strategy='Iron Condor';
  else if(hasSpread&&result.action==='Buy')result.strategy=result.optionType==='Call'?'Vertical Debit Spread':'Vertical Debit Spread';
  else if(hasSpread&&result.action==='Sell')result.strategy=result.optionType==='Call'?'Bear Call Spread':'Bull Put Spread';
  else if(hasCovered&&result.optionType==='Call')result.strategy='Covered Call';
  else if(hasCSP||result.action==='Sell'&&result.optionType==='Put')result.strategy='Cash Secured Put';
  else if(result.action==='Buy'&&result.optionType==='Call')result.strategy='Long Call';
  else if(result.action==='Buy'&&result.optionType==='Put')result.strategy='Long Put';
  else if(result.action==='Sell'&&result.optionType==='Call')result.strategy='Covered Call';

  result.status='Open';
  result.date=new Date().toISOString().slice(0,10);
  result.fees=0.65;
  return result;
};

const callClaudeAPI=async(text,apiKey)=>{
  const today=new Date().toISOString().slice(0,10);
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:500,
      messages:[{role:'user',content:`You are a stock options trade parser. Today is ${today}. Extract options trade details from the following text and return ONLY a valid JSON object (no markdown, no explanation).

Required fields:
- ticker: stock symbol (e.g. "SPY", "AAPL") — string, uppercase
- optionType: "Call" or "Put"
- strike: strike price as a number (e.g. 580)
- expiry: expiration date as "YYYY-MM-DD" (if month/day given without year, use current year ${today.slice(0,4)})
- action: "Buy" (for BTO/bought/long) or "Sell" (for STO/sold/short)
- quantity: number of contracts as integer
- premium: option price per share as a decimal number (e.g. 8.50)
- strategy: one of "Long Call","Long Put","Covered Call","Cash Secured Put","Bull Put Spread","Bear Call Spread","Iron Condor","Straddle","Strangle","Vertical Debit Spread","Other"
- notes: the original trade text

Trade text: "${text}"`}]
    })
  });
  if(!r.ok)throw new Error('Claude API error');
  const d=await r.json();
  const content=d.content[0].text;
  const match=content.match(/\{[\s\S]*\}/);
  if(!match)throw new Error('No JSON');
  return JSON.parse(match[0]);
};

const localAnswer=text=>{
  const low=text.toLowerCase();
  for(const qa of LOCAL_QA){if(qa.k.some(k=>low.includes(k)))return qa.a;}
  return null;
};

const isLikelyTrade=text=>{
  const t=text.toUpperCase();
  const hasAction=/\b(BTO|STO|BOUGHT|SOLD|BUY|SELL|LONG|SHORT)\b/.test(t);
  const hasType=/\b(CALLS?|PUTS?)\b|\d[CP]\b/.test(t);
  const hasPrice=/@|\bfor\b|\bcr\b|\bdb\b|\bat\s+\$?\d/i.test(text);
  return hasAction&&(hasType||hasPrice);
};

/* ══ PAYOFF DIAGRAM ══ */
function PayoffDiagram({trade,stockPrice,onClose}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const K=parseFloat(trade.strike),prem=parseFloat(trade.premium),qty=parseFloat(trade.quantity)||1;
    const sp=stockPrice||K;
    const range=sp*0.25;
    const prices=Array.from({length:60},(_,i)=>sp-range+(i/59)*range*2);
    const pnls=prices.map(S=>{
      let intrinsic=trade.optionType==='Call'?Math.max(0,S-K):Math.max(0,K-S);
      let raw=trade.action==='Buy'?(intrinsic-prem)*qty*100:(prem-intrinsic)*qty*100;
      return raw;
    });
    const bePrice=calcBreakeven(trade);
    chartRef.current=new Chart(canvasRef.current,{
      type:'line',
      data:{labels:prices.map(p=>'$'+p.toFixed(0)),datasets:[{
        data:pnls,borderColor:'var(--blue)',borderWidth:2,fill:true,
        backgroundColor:(ctx)=>{const chart=ctx.chart,{ctx:c,chartArea}=chart;if(!chartArea)return;const grd=c.createLinearGradient(0,chartArea.top,0,chartArea.bottom);grd.addColorStop(0,'rgba(0,200,5,0.14)');grd.addColorStop(0.5,'rgba(0,200,5,0.02)');grd.addColorStop(1,'rgba(255,59,48,0.08)');return grd;},
        tension:0.1,pointRadius:0,
        segment:{borderColor:ctx=>ctx.p1.parsed.y>=0?'var(--green)':'var(--red)'}
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(28,28,28,0.97)',borderColor:'var(--border2)',borderWidth:1,callbacks:{label:ctx=>` ${fmt$(ctx.parsed.y)}`}}},
        scales:{
          x:{grid:{color:'rgba(48,48,48,0.5)'},ticks:{color:'var(--text4)',font:{size:9},maxTicksLimit:8},border:{color:'transparent'}},
          y:{grid:{color:'rgba(48,48,48,0.5)'},ticks:{color:'var(--text4)',font:{size:9},callback:v=>fmt$(v)},border:{color:'transparent'}}
        },
        annotation:{annotations:{be:{type:'line',xMin:bePrice,xMax:bePrice}}}
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[trade,stockPrice]);

  const maxProfit=calcMaxProfit(trade);
  const be=calcBreakeven(trade);
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:16}}>
        <div style={{textAlign:'center',background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px'}}>
          <div style={{fontSize:10,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.7px'}}>Breakeven</div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--gold)'}}>${be?.toFixed(2)||'—'}</div>
        </div>
        <div style={{textAlign:'center',background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px'}}>
          <div style={{fontSize:10,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.7px'}}>Max Profit</div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--green)'}}>{maxProfit?fmt$(maxProfit):'Unlimited'}</div>
        </div>
        <div style={{textAlign:'center',background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px'}}>
          <div style={{fontSize:10,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.7px'}}>Max Loss</div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--red)'}}>
            {trade.action==='Buy'?fmt$(-parseFloat(trade.premium)*(parseFloat(trade.quantity)||1)*100):'Varies'}
          </div>
        </div>
      </div>
      <div style={{height:220}}><canvas ref={canvasRef}/></div>
      {stockPrice&&<div style={{fontSize:11,color:'var(--text4)',marginTop:8,textAlign:'center'}}>Current price: ${stockPrice.toFixed(2)} · Chart shows P&L at expiry across price range</div>}
      <div className="modal-footer"><button className="btn btn-ghost" onClick={onClose}>Close</button></div>
    </div>
  );
}

/* ══ EQUITY CHART ══ */
function EquityChart({trades}){
  const ref=useRef(null),inst=useRef(null);
  const data=useMemo(()=>{
    const closed=trades.filter(t=>t.status==='Closed'&&t.closeDate&&calcPnL(t)!==null).sort((a,b)=>new Date(a.closeDate)-new Date(b.closeDate));
    let run=0;const pts=[{x:'Start',y:0}];
    closed.forEach(t=>{run+=calcPnL(t)||0;pts.push({x:t.closeDate,y:parseFloat(run.toFixed(2))});});
    return pts;
  },[trades]);
  useEffect(()=>{
    if(!ref.current||data.length<2)return;
    if(inst.current)inst.current.destroy();
    const fin=data[data.length-1]?.y||0;
    const col=fin>=0?'rgba(0,200,5,1)':'rgba(255,59,48,1)';
    inst.current=new Chart(ref.current,{
      type:'line',
      data:{labels:data.map(d=>d.x),datasets:[{data:data.map(d=>d.y),borderColor:col,borderWidth:2,fill:true,backgroundColor:fin>=0?'rgba(0,200,5,0.07)':'rgba(255,59,48,0.07)',tension:0.4,pointRadius:3,pointBackgroundColor:col,pointBorderColor:'transparent'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(28,28,28,0.97)',borderColor:'rgba(56,56,56,0.9)',borderWidth:1,callbacks:{label:ctx=>` ${fmt$(ctx.parsed.y)}`}}},scales:{x:{grid:{color:'rgba(48,48,48,0.5)'},ticks:{color:'var(--text4)',font:{size:10}},border:{color:'transparent'}},y:{grid:{color:'rgba(48,48,48,0.5)'},ticks:{color:'var(--text4)',font:{size:10},callback:v=>fmt$(v)},border:{color:'transparent'}}}}
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[data]);
  if(data.length<2)return<div className="empty" style={{padding:24}}><div className="empty-sub">Close trades to build your equity curve</div></div>;
  return<div style={{height:160}}><canvas ref={ref}/></div>;
}

/* ══ POSITION SIZER ══ */
function PositionSizer(){
  const [acct,setAcct]=useState(25000);
  const [risk,setRisk]=useState(2);
  const [prem,setPrem]=useState(5);
  const [stop,setStop]=useState(50);
  const maxR=acct*(risk/100),contracts=prem>0&&stop>0?Math.floor(maxR/(prem*100*(stop/100))):0;
  const totalCost=contracts*prem*100,maxLoss=totalCost*(stop/100);
  return<div className="calc-section"><div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:12}}>🎯 Position Sizer</div><div className="calc-grid"><div className="form-group"><label>Account Size</label><input type="number" value={acct} onChange={e=>setAcct(+e.target.value)}/></div><div className="form-group"><label>Risk Per Trade (%)</label><input type="number" step="0.5" value={risk} onChange={e=>setRisk(+e.target.value)}/></div><div className="form-group"><label>Option Premium ($)</label><input type="number" step="0.10" value={prem} onChange={e=>setPrem(+e.target.value)}/></div><div className="form-group"><label>Stop Loss (%)</label><input type="number" value={stop} onChange={e=>setStop(+e.target.value)}/></div></div><div className="calc-result"><div className="calc-r-item"><div className="calc-r-val blue">{contracts}</div><div className="calc-r-label">Contracts</div></div><div className="calc-r-item"><div className="calc-r-val">{fmt$(totalCost)}</div><div className="calc-r-label">Total Cost</div></div><div className="calc-r-item"><div className="calc-r-val neg">{fmt$(maxLoss)}</div><div className="calc-r-label">Max Loss</div></div></div></div>;
}

/* ══ SHOULD I CLOSE ADVISOR ══ */
const getCloseAdvice=(trade,prices)=>{
  const sp=prices[trade.ticker.toUpperCase()]?.price;
  const pnl=calcPnL(trade);
  const maxP=calcMaxProfit(trade);
  const daysLeft=Math.ceil((new Date(trade.expiry)-new Date())/86400000);
  const dit=calcDIT(trade);
  const pctMax=maxP&&pnl?Math.min(100,pnl/maxP*100):null;
  const pop=sp?calcPOP(trade,sp):null;
  const reasons=[];
  let verdict='hold',color='var(--blue)',emoji='🔵';

  // Strong close signals
  if(pnl!==null&&pnl>0&&pctMax!==null&&pctMax>=50){reasons.push('You\'ve captured 50%+ of the max possible profit — the classic "take it and run" signal');verdict='close';color='var(--green)';emoji='🟢';}
  if(daysLeft<=7&&daysLeft>0){reasons.push(`Only ${daysLeft} days left until expiry — time is almost up, options lose value fast in the last week`);verdict=verdict==='close'?'close':'close';color='var(--gold)';emoji='🟡';}
  if(daysLeft<=0){reasons.push('This option expires TODAY — close it now or it expires worthless');verdict='close_now';color='var(--red)';emoji='🔴';}
  if(pnl!==null&&pnl<0){const loss=Math.abs(pnl),entry=parseFloat(trade.premium)*(parseFloat(trade.quantity)||1)*100;const lossPct=loss/entry*100;if(lossPct>=50){reasons.push(`You're down ${lossPct.toFixed(0)}% on this trade — cutting losses now prevents a bigger hole`);verdict='close';color='var(--red)';emoji='🔴';}}
  if(pop!==null&&pop<0.30){reasons.push('The odds of this trade being profitable are below 30% — the math is not in your favor');if(verdict!=='close_now'){verdict='close';color='var(--red)';emoji='🔴';}}

  // Hold signals
  if(reasons.length===0){
    if(pnl!==null&&pnl>0&&(pctMax===null||pctMax<50)){reasons.push('Trade is profitable but hasn\'t hit your target yet — let it ride');}
    else if(daysLeft>21){reasons.push('Plenty of time left — no rush to act');}
    else{reasons.push('No urgent exit signals right now');}
    verdict='hold';color='var(--blue)';emoji='🔵';
  }
  const verdictText=verdict==='close_now'?'Close NOW':verdict==='close'?'Consider Closing':'Hold for Now';
  return{verdict,verdictText,color,emoji,reasons,pnl,daysLeft,pctMax,pop};
};

/* ══ SMART TIP ══ */
const TIP_KEY='opx_tip_v2';
function SmartTip({trades,prices,vix}){
  const [tipId,setTipId]=useState(()=>{try{return localStorage.getItem(TIP_KEY)||'';}catch{return '';}});
  const openTrades=trades.filter(t=>t.status==='Open');
  const closedTrades=trades.filter(t=>t.status==='Closed');

  const tip=useMemo(()=>{
    const urgent=openTrades.filter(t=>{const d=Math.ceil((new Date(t.expiry)-new Date())/86400000);return d>=0&&d<=5;});
    if(openTrades.length===0&&closedTrades.length===0)
      return{id:'welcome',icon:'👋',title:'Welcome to OpxTracker!',text:'Get started by adding a trade. Click "+ New Trade" or go to "AI Quick Add" and just type it like a text message — e.g. "bought 2 SPY 580 calls May 16 at 8.50"'};
    if(urgent.length)
      return{id:`exp-${urgent[0].id}`,icon:'⏰',title:`${urgent[0].ticker} expires in ${Math.ceil((new Date(urgent[0].expiry)-new Date())/86400000)} days`,text:`Options lose value very fast in their final week — this is called theta decay. Consider closing this position to lock in your result, rather than risking a total loss at expiry.`};
    if(vix&&vix>28)
      return{id:`vix-${Math.floor(vix)}`,icon:'⚡',title:`High market fear — VIX ${vix.toFixed(1)}`,text:`Options are unusually expensive right now. That's bad for buyers (you overpay) but good for sellers (you collect more). Stick to defined-risk trades — never risk more than you can afford to lose.`};
    if(openTrades.length){
      const withPnl=openTrades.map(t=>{const sp=prices[t.ticker?.toUpperCase()]?.price;const mk=t.currentMark?parseFloat(t.currentMark):(sp?estimateMark(t,sp):null);return{t,pnl:mk!==null?calcPnL(t,mk):calcPnL(t),maxP:calcMaxProfit(t)};});
      const winner=withPnl.find(x=>x.maxP&&x.pnl>=x.maxP*0.5);
      if(winner)return{id:`profit-${winner.t.id}`,icon:'🎯',title:'Consider taking profit',text:`${winner.t.ticker} ${winner.t.optionType} is at ${Math.round(winner.pnl/winner.maxP*100)}% of its maximum possible profit. Many experienced traders close positions at 50% of max profit — you lock in gains and free up capital for the next trade.`};
    }
    return null;
  },[trades,prices,vix]);

  if(!tip||tipId===tip.id)return null;
  return(
    <div className="smart-tip">
      <span className="smart-tip-icon">{tip.icon}</span>
      <div className="smart-tip-body">
        <div className="smart-tip-title">{tip.title}</div>
        <div className="smart-tip-text">{tip.text}</div>
      </div>
      <button className="smart-tip-close" onClick={()=>{setTipId(tip.id);try{localStorage.setItem(TIP_KEY,tip.id);}catch{}}}>✕</button>
    </div>
  );
}

/* ══ PORTFOLIO STORY ══ */
function PortfolioStory({trades,prices}){
  const openTrades=trades.filter(t=>t.status==='Open');
  if(!openTrades.length)return null;

  // Calculate unrealized P&L for each open trade
  const withPnl=openTrades.map(t=>{
    const sp=prices[t.ticker?.toUpperCase()]?.price;
    const mark=t.currentMark?parseFloat(t.currentMark):(sp?estimateMark(t,sp):null);
    const pnl=mark!==null?calcPnL(t,mark):calcPnL(t);
    const daysLeft=t.expiry?Math.ceil((new Date(t.expiry)-new Date())/86400000):999;
    return{...t,pnl,daysLeft};
  });

  const totalPnl=withPnl.reduce((s,t)=>s+(t.pnl||0),0);
  const winners=withPnl.filter(t=>t.pnl>0);
  const losers=withPnl.filter(t=>t.pnl<0);
  const expiringSoon=withPnl.filter(t=>t.daysLeft<=7&&t.daysLeft>0);
  const best=[...withPnl].sort((a,b)=>(b.pnl||0)-(a.pnl||0))[0];
  const worst=[...withPnl].sort((a,b)=>(a.pnl||0)-(b.pnl||0))[0];

  // Build plain-English headline
  const pnlStr=totalPnl>=0?`up ${fmt$(totalPnl)}`:`down ${fmt$(Math.abs(totalPnl))}`;
  const openWord=openTrades.length===1?'1 open position':`${openTrades.length} open positions`;
  const headlineParts=[];
  if(totalPnl!==0)headlineParts.push(`You're currently ${pnlStr} across ${openWord}.`);
  else headlineParts.push(`You have ${openWord}.`);

  const subParts=[];
  if(best&&best.pnl>0)subParts.push(`Best performer: ${best.ticker} ${best.optionType} (+${fmt$(best.pnl)})`);
  if(worst&&worst.pnl<0)subParts.push(`Watch: ${worst.ticker} ${worst.optionType} (${fmt$(worst.pnl)})`);
  if(expiringSoon.length)subParts.push(`${expiringSoon.length} trade${expiringSoon.length>1?'s':''} expiring within 7 days`);

  const pills=[];
  if(winners.length)pills.push({cls:'good',icon:'✓',label:`${winners.length} winning`});
  if(losers.length)pills.push({cls:'bad',icon:'↓',label:`${losers.length} losing`});
  if(expiringSoon.length)pills.push({cls:'warn',icon:'⏰',label:`${expiringSoon.length} expiring soon`});
  if(!expiringSoon.length&&openTrades.length)pills.push({cls:'info',icon:'📊',label:`${openTrades.length} active`});

  return(
    <div className="story-card fade-in">
      <div className="story-headline">{headlineParts.join(' ')}</div>
      {subParts.length>0&&<div className="story-sub">{subParts.join(' · ')}</div>}
      <div className="story-pills">
        {pills.map((p,i)=><span key={i} className={`story-pill ${p.cls}`}>{p.icon} {p.label}</span>)}
      </div>
    </div>
  );
}

/* ══ POSITION HEALTH ══ */
const getPositionHealth=(trade,prices)=>{
  const sp=prices[trade.ticker?.toUpperCase()]?.price;
  const mark=trade.currentMark?parseFloat(trade.currentMark):(sp?estimateMark(trade,sp):null);
  const pnl=mark!==null?calcPnL(trade,mark):calcPnL(trade);
  const daysLeft=trade.expiry?Math.ceil((new Date(trade.expiry)-new Date())/86400000):999;
  const entry=parseFloat(trade.premium)||0;
  const qty=parseFloat(trade.quantity)||1;
  const maxLoss=entry*qty*100;
  const maxProfit=trade.action==='Sell'?maxLoss:null;

  if(daysLeft<=3)return{dot:'health-red',label:'Expiring!',color:'var(--red)'};
  if(daysLeft<=7)return{dot:'health-red',label:'Exp soon',color:'var(--red)'};
  if(pnl!==null&&maxProfit&&pnl>=maxProfit*0.5)return{dot:'health-green',label:'Take profit?',color:'var(--green)'};
  if(pnl!==null&&pnl>0&&daysLeft>7)return{dot:'health-green',label:'On track',color:'var(--green)'};
  if(pnl!==null&&pnl<-maxLoss*0.5)return{dot:'health-red',label:'Down 50%+',color:'var(--red)'};
  if(pnl!==null&&pnl<0)return{dot:'health-yellow',label:'Monitor',color:'var(--gold)'};
  if(daysLeft<=14)return{dot:'health-yellow',label:'Watch DTE',color:'var(--gold)'};
  return{dot:'health-green',label:'Good',color:'var(--green)'};
};

/* ══ SIMPLE GLOSSARY ══ */
const GLOSSARY=[
  {term:'Call Option',plain:'A bet that the stock goes UP. You make money if the price rises above your strike price before expiry.'},
  {term:'Put Option',plain:'A bet that the stock goes DOWN. You make money if the price drops below your strike price before expiry.'},
  {term:'Strike Price',plain:'The price you\'re betting the stock will reach. Example: a $580 call means you\'re betting SPY goes above $580.'},
  {term:'Expiry / Expiration',plain:'The deadline. If the stock hasn\'t moved in your direction by this date, your option expires worthless.'},
  {term:'Premium',plain:'The price you pay (or receive) for the option. Like an insurance premium — you pay it upfront.'},
  {term:'Buy to Open (BTO)',plain:'You\'re buying an option. You pay the premium. You profit if the stock moves in your direction.'},
  {term:'Sell to Open (STO)',plain:'You\'re selling an option and collecting the premium upfront. You profit if the stock stays put or moves away from your strike.'},
  {term:'VIX',plain:'The market\'s "fear gauge." Think of it like a thermometer for market anxiety. Under 15 = calm. Over 30 = panic.'},
  {term:'ITM (In the Money)',plain:'Your option already has value. For a call: stock is ABOVE the strike. For a put: stock is BELOW the strike.'},
  {term:'OTM (Out of the Money)',plain:'Your option hasn\'t hit the target yet. For a call: stock is still BELOW strike. For a put: still ABOVE.'},
  {term:'ATM (At the Money)',plain:'Stock price is right at your strike price. Closest to 50/50.'},
  {term:'Theta / Time Decay',plain:'Options lose value every day just from time passing — like an ice cube melting. Selling options = you benefit from this. Buying = you fight it.'},
  {term:'Delta',plain:'How much your option moves per $1 move in the stock. Delta 0.50 = your option gains $50 for every $1 the stock moves up (100 shares).'},
  {term:'POP (Probability of Profit)',plain:'The statistical chance this trade makes money by expiry. 70% POP = 7 out of 10 times, trades like this win.'},
  {term:'Max Profit',plain:'The most you can possibly make on a trade. For credit trades (selling), this is the premium you collected upfront.'},
  {term:'Iron Condor',plain:'A strategy where you sell both a call spread and a put spread at the same time. You win if the stock stays in a range.'},
  {term:'Cash Secured Put (CSP)',plain:'You sell a put option and have cash ready in case you have to buy the shares. You collect premium and only lose if the stock crashes below your strike.'},
  {term:'Covered Call',plain:'You own 100 shares of a stock and sell a call against it. You collect premium and give up any upside above your strike.'},
];

        <div className="news-list" style={{marginBottom:20}}>{news.map((n,i)=><div className="news-item" key={i}><div className="news-hl"><a href={n.url} target="_blank" rel="noreferrer">{n.headline}</a></div><div className="news-meta">{n.source} · {new Date(n.datetime*1000).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div></div>)}</div>
      )}

        <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)'}}>

        </div>

          <div key={i} style={{padding:'12px 16px',borderBottom:'1px solid rgba(48,48,48,0.5)',display:'grid',gridTemplateColumns:'160px 1fr',gap:16,alignItems:'start'}}>

            <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{g.plain}</div>
          </div>
