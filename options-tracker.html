}

/* ══ ANALYTICS TAB ══ */
function AnalyticsTab({trades}){
  const stratRef=useRef(null),tickerRef=useRef(null),dowRef=useRef(null);
  const stratInst=useRef(null),tickerInst=useRef(null),dowInst=useRef(null);
  const closed=useMemo(()=>trades.filter(t=>t.status==='Closed'&&calcPnL(t)!==null),[trades]);
  const stats=useMemo(()=>calcStats(closed),[closed]);
  const byStrategy=useMemo(()=>{const m={};closed.forEach(t=>{const s=t.strategy||'Other';if(!m[s])m[s]={total:0,count:0,wins:0};const p=calcPnL(t);m[s].total+=p;m[s].count++;if(p>0)m[s].wins++;});return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);},[closed]);
  const byTicker=useMemo(()=>{const m={};closed.forEach(t=>{if(!m[t.ticker])m[t.ticker]={total:0,count:0};m[t.ticker].total+=calcPnL(t);m[t.ticker].count++;});return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);},[closed]);
  const monthly=useMemo(()=>{const m={};closed.forEach(t=>{const k=t.closeDate?t.closeDate.slice(0,7):'?';if(!m[k])m[k]=0;m[k]+=calcPnL(t);});return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));},[closed]);
  const byDOW=useMemo(()=>{const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const m={Mon:0,Tue:0,Wed:0,Thu:0,Fri:0};closed.forEach(t=>{if(t.closeDate){const d=days[new Date(t.closeDate).getDay()];if(m[d]!==undefined)m[d]+=calcPnL(t)||0;}});return Object.entries(m);},[closed]);
  const best=useMemo(()=>closed.reduce((b,t)=>(calcPnL(t)||0)>(calcPnL(b)||0)?t:b,closed[0]||null),[closed]);
  const worst=useMemo(()=>closed.reduce((w,t)=>(calcPnL(t)||0)<(calcPnL(w)||0)?t:w,closed[0]||null),[closed]);

  const mkChart=(ref,inst,labels,data,axis='y')=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'bar',data:{labels,datasets:[{data,backgroundColor:data.map(v=>v>=0?'rgba(0,200,5,0.14)':'rgba(255,59,48,0.14)'),borderColor:data.map(v=>v>=0?'rgba(0,200,5,0.8)':'rgba(255,59,48,0.8)'),borderWidth:1,borderRadius:4}]},options:{indexAxis:axis,responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(28,28,28,0.97)',borderColor:'rgba(56,56,56,0.9)',borderWidth:1,callbacks:{label:ctx=>` ${fmt$(ctx.parsed[axis==='y'?'x':'y'])}`}}},scales:{x:{grid:{color:'rgba(48,48,48,0.5)'},ticks:{color:'var(--text4)',font:{size:10},callback:v=>axis==='y'?fmt$(v):v},border:{color:'transparent'}},y:{grid:{display:axis==='x'},ticks:{color:'var(--text2)',font:{size:11}},border:{color:'transparent'}}}}});
  };
  useEffect(()=>{mkChart(stratRef,stratInst,byStrategy.map(([s])=>s),byStrategy.map(([,v])=>v.total));return()=>{if(stratInst.current)stratInst.current.destroy();};},[byStrategy]);
  useEffect(()=>{mkChart(tickerRef,tickerInst,byTicker.map(([s])=>s),byTicker.map(([,v])=>v.total));return()=>{if(tickerInst.current)tickerInst.current.destroy();};},[byTicker]);
  useEffect(()=>{mkChart(dowRef,dowInst,byDOW.map(([d])=>d),byDOW.map(([,v])=>v),'x');return()=>{if(dowInst.current)dowInst.current.destroy();};},[byDOW]);

  if(!closed.length)return<div className="empty" style={{marginTop:48}}><div className="empty-icon">📊</div><div className="empty-title">No closed trades</div><div className="empty-sub">Analytics appear once you close your first trade</div></div>;
  const maxM=Math.max(...monthly.map(([,v])=>Math.abs(v)),1);
  return(
    <div className="fade-in">
      <div className="analytics-highlights">
        <div className="hl-card"><div className="hl-label">Win Rate</div><div className="hl-val" style={{color:stats.winRate>=0.5?'var(--green)':'var(--red)'}}>{(stats.winRate*100).toFixed(0)}%</div><div className="hl-sub">{stats.wins}W · {stats.losses}L</div></div>
        <div className="hl-card"><div className="hl-label">Profit Factor</div><div className="hl-val" style={{color:stats.pf>=1?'var(--green)':'var(--red)'}}>{stats.pf!=null?stats.pf.toFixed(2):'—'}</div><div className="hl-sub">Gross P / Gross L</div></div>
        <div className="hl-card"><div className="hl-label">Expectancy</div><div className="hl-val" style={{color:stats.exp>=0?'var(--green)':'var(--red)'}}>{fmt$(stats.exp)}</div><div className="hl-sub">Per trade avg</div></div>
        <div className="hl-card"><div className="hl-label">Max Drawdown</div><div className="hl-val neg">{fmt$(stats.maxDD)}</div><div className="hl-sub">Peak → trough</div></div>
        <div className="hl-card"><div className="hl-label">Avg Win</div><div className="hl-val pos">{fmt$(stats.avgWin)}</div><div className="hl-sub">Per winning trade</div></div>
        <div className="hl-card"><div className="hl-label">Avg Loss</div><div className="hl-val neg">{fmt$(stats.avgLoss)}</div><div className="hl-sub">Per losing trade</div></div>
        <div className="hl-card"><div className="hl-label">Total Fees Paid</div><div className="hl-val gold">{fmt$(stats.totalFees||0)}</div><div className="hl-sub">Across all closed trades</div></div>
        {best&&<div className="hl-card"><div className="hl-label">🏆 Best Trade</div><div className="hl-val pos">{fmt$(calcPnL(best))}</div><div className="hl-sub">{best.ticker} {best.optionType} ${best.strike}</div></div>}
        {worst&&<div className="hl-card"><div className="hl-label">📉 Worst Trade</div><div className="hl-val neg">{fmt$(calcPnL(worst))}</div><div className="hl-sub">{worst.ticker} {worst.optionType} ${worst.strike}</div></div>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="chart-box"><div className="chart-title">P&L by Strategy</div><div style={{height:Math.max(100,byStrategy.length*36)+'px'}}><canvas ref={stratRef}/></div></div>
        <div className="chart-box"><div className="chart-title">P&L by Ticker</div><div style={{height:Math.max(100,byTicker.length*36)+'px'}}><canvas ref={tickerRef}/></div></div>
      </div>
      <div className="chart-box" style={{marginBottom:16}}>
        <div className="chart-title">P&L by Day of Week (tastytrade insight)</div>
        <div style={{height:120}}><canvas ref={dowRef}/></div>
      </div>
      <div className="chart-box" style={{marginBottom:16}}>
        <div className="chart-title">Monthly P&L</div>
        <table><thead><tr><th>Month</th><th>P&L</th><th style={{width:'40%'}}>Visual</th></tr></thead>
        <tbody>{monthly.map(([m,v])=><tr key={m}><td style={{color:'var(--text2)',fontSize:11}}>{m}</td><td className={v>=0?'pnl-pos':'pnl-neg'}>{fmt$(v)}</td><td><div style={{display:'flex',gap:8,alignItems:'center'}}><div className="month-bar-outer"><div className="month-bar-inner" style={{width:(Math.abs(v)/maxM*100)+'%',background:v>=0?'var(--green)':'var(--red)'}}/></div></div></td></tr>)}</tbody></table>
      </div>
      <div className="tbl-wrap">
        <table><thead><tr><th>Strategy</th><th>Trades</th><th>Win %</th><th>Total P&L</th><th>Avg P&L</th><th>Avg Win</th><th>Avg Loss</th></tr></thead>
        <tbody>{byStrategy.map(([s,v])=>{
          const w=closed.filter(t=>(t.strategy||'Other')===s&&calcPnL(t)>0),l=closed.filter(t=>(t.strategy||'Other')===s&&calcPnL(t)<0);
          const aw=w.length?w.reduce((a,t)=>a+(calcPnL(t)||0),0)/w.length:null,al=l.length?l.reduce((a,t)=>a+(calcPnL(t)||0),0)/l.length:null;
          return<tr key={s}><td style={{fontWeight:600}}>{s}</td><td style={{color:'var(--text2)'}}>{v.count}</td><td style={{color:v.wins/v.count>=0.5?'var(--green)':'var(--red)',fontWeight:600}}>{Math.round(100*v.wins/v.count)}%</td><td className={v.total>=0?'pnl-pos':'pnl-neg'}>{fmt$(v.total)}</td><td className={v.total/v.count>=0?'pnl-pos':'pnl-neg'}>{fmt$(v.total/v.count)}</td><td className="pnl-pos">{aw!=null?fmt$(aw):'—'}</td><td className="pnl-neg">{al!=null?fmt$(al):'—'}</td></tr>;
        })}</tbody></table>
      </div>
    </div>
  );
}

/* ══ TRADE FORM ══ */
function TradeForm({initial,onSave,onCancel}){
  const [f,setF]=useState({date:new Date().toISOString().slice(0,10),ticker:'',optionType:'Call',strike:'',expiry:'',action:'Buy',quantity:1,premium:'',fees:0.65,strategy:'Long Call',status:'Open',closeDate:'',closePrice:'',notes:'',...initial});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const sub=e=>{e.preventDefault();if(!f.ticker||!f.strike||!f.expiry||!f.premium)return alert('Fill required fields');onSave({...f,id:f.id||uid(),currentMark:f.currentMark||'',liveMarked:f.liveMarked||'est'});};
  return(
    <form onSubmit={sub}>
      <div className="form-row">
        <div className="form-group"><label>Date *</label><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></div>
        <div className="form-group"><label>Ticker *</label><input value={f.ticker} onChange={e=>set('ticker',e.target.value.toUpperCase())} placeholder="SPY"/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Option Type</label><select value={f.optionType} onChange={e=>set('optionType',e.target.value)}><option>Call</option><option>Put</option></select></div>
        <div className="form-group"><label>Action</label><select value={f.action} onChange={e=>set('action',e.target.value)}><option>Buy</option><option>Sell</option></select></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Strike *</label><input type="number" value={f.strike} onChange={e=>set('strike',e.target.value)} placeholder="580"/></div>
        <div className="form-group"><label>Expiry *</label><input type="date" value={f.expiry} onChange={e=>set('expiry',e.target.value)}/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Contracts *</label><input type="number" min="1" value={f.quantity} onChange={e=>set('quantity',e.target.value)}/></div>
        <div className="form-group"><label>Entry Premium *</label><input type="number" step="0.01" value={f.premium} onChange={e=>set('premium',e.target.value)} placeholder="8.50"/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Commission / Fees ($)</label><input type="number" step="0.01" value={f.fees} onChange={e=>set('fees',e.target.value)} placeholder="0.65"/></div>
        <div className="form-group"><label>Strategy</label><select value={f.strategy} onChange={e=>set('strategy',e.target.value)}>{STRATEGIES.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Status</label><select value={f.status} onChange={e=>set('status',e.target.value)}><option>Open</option><option>Closed</option></select></div>
        {f.status==='Closed'&&<div className="form-group"><label>Close Date</label><input type="date" value={f.closeDate} onChange={e=>set('closeDate',e.target.value)}/></div>}
      </div>
      {f.status==='Closed'&&<div className="form-row"><div className="form-group full"><label>Close Price</label><input type="number" step="0.01" value={f.closePrice} onChange={e=>set('closePrice',e.target.value)}/></div></div>}
      <div className="form-group full"><label>Notes / Thesis</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value)} rows={2} style={{resize:'vertical'}} placeholder="Trade thesis, setup, rules…"/></div>
      <div className="modal-footer">
        <button type="button" className="btn btn-ghost" onClick={onCancel}>Cancel</button>
        <button type="submit" className="btn btn-primary">{initial?.id?'Update Trade':'Add Trade'}</button>
      </div>
    </form>
  );
}

/* ══ CLOSE MODAL ══ */
function CloseModal({trade,onClose,onCancel}){
  const [price,setPrice]=useState('');
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const preview=price?calcPnL(trade,parseFloat(price)):null;
  const roi=preview!==null&&trade.premium?((parseFloat(price)-parseFloat(trade.premium))/parseFloat(trade.premium)*100*(trade.action==='Sell'?-1:1)):null;
  const maxP=calcMaxProfit(trade);
  const pctMax=maxP&&preview?Math.min(100,Math.round(preview/maxP*100)):null;
  return(
    <div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'11px 14px',marginBottom:16,fontSize:12,color:'var(--text2)'}}>
        {trade.ticker} {trade.optionType} ${trade.strike} · {trade.action} {trade.quantity}x · Entry ${trade.premium}
      </div>
      <div className="form-row">
        <div className="form-group"><label>Your Fill Price (per contract)</label><input type="number" step="0.01" value={price} onChange={e=>setPrice(e.target.value)} placeholder="12.50" autoFocus/></div>
        <div className="form-group"><label>Close Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
      </div>
      {preview!==null&&(
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'12px 16px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <div style={{textAlign:'center'}}><div style={{fontSize:10,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.6px'}}>P&L</div><div style={{fontSize:20,fontWeight:800,color:preview>=0?'var(--green)':'var(--red)'}}>{fmt$(preview)}</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:10,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.6px'}}>Return</div><div style={{fontSize:20,fontWeight:800,color:roi>=0?'var(--green)':'var(--red)'}}>{roi!==null?fmtPct(roi):'—'}</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:10,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.6px'}}>% of Max</div><div style={{fontSize:20,fontWeight:800,color:'var(--gold)'}}>{pctMax!==null?pctMax+'%':'—'}</div></div>
        </div>
      )}
      {pctMax!==null&&pctMax>=45&&pctMax<=55&&<div className="alert alert-info" style={{marginTop:10}}>🎯 You're near 50% of max profit — Tastytrade's classic exit signal!</div>}
      <div className="modal-footer">
        <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
        <button className="btn btn-success" onClick={()=>{if(!price)return;onClose(parseFloat(price),date);}}>🔒 Lock In P&L</button>
      </div>
    </div>
  );
}

/* ══ SETTINGS ══ */
function SettingsModal({apiKey,claudeKey,onSave,onCancel,onImportCSV,onImportJSON,onClearSamples,trades}){
  const [key,setKey]=useState(apiKey||'');
  const [ckey,setCkey]=useState(claudeKey||'');
  const [useSessionStorage,setUseSessionStorage]=useState(localStorage.getItem('opx_use_session_storage')==='true');
  const fileRef=useRef(null);
  const jsonFileRef=useRef(null);
  const clearAllKeys=()=>{if(confirm('This will clear all API keys from storage. Continue?')){localStorage.removeItem('opx_apikey');localStorage.removeItem('opx_claudekey');setKey('');setCkey('');alert('All keys cleared');}};
  const handleCSV=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>onImportCSV(ev.target.result);r.readAsText(file);};
  const handleJSON=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.version!==1||!Array.isArray(data.trades))throw new Error('Invalid JSON format');onImportJSON(data.trades);}catch(err){alert('Invalid JSON file: '+err.message);}};r.readAsText(file);};
  const exportCSV=()=>{
    const headers=['date','ticker','optionType','strike','expiry','action','quantity','premium','fees','strategy','status','closeDate','closePrice','notes'];
    const rows=trades.map(t=>headers.map(h=>`"${(t[h]||'').toString().replace(/"/g,'""')}"`).join(','));
    const csv=[headers.join(','),...rows].join('\n');
    const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(csv);a.download='opxtracker-trades.csv';a.click();
  };
  const exportJSON=()=>{
    const data={version:1,exportDate:new Date().toISOString(),trades:trades};
    const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(data,null,2));a.download='opxtracker-trades.json';a.click();
  };
  const handleSave=()=>{if(useSessionStorage!==(localStorage.getItem('opx_use_session_storage')==='true')){localStorage.setItem('opx_use_session_storage',useSessionStorage.toString());}onSave(key.trim(),ckey.trim());};
  return(
    <div>
      <div className="form-group" style={{marginBottom:14}}>
        <label>Finnhub API Key (live prices)</label>
        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="Get free key at finnhub.io" type="password"/>
        <div style={{fontSize:11,color:'var(--text4)',marginTop:4}}>Free: 60 req/min · No credit card · <a href="https://finnhub.io/register" target="_blank" style={{color:'var(--blue)'}}>Get key →</a></div>
      </div>
      <div className="form-group" style={{marginBottom:16}}>
        <label>Claude API Key (AI Quick Add)</label>
        <input value={ckey} onChange={e=>setCkey(e.target.value)} placeholder="sk-ant-… (optional, for smarter parsing)" type="password"/>
        <div style={{fontSize:11,color:'var(--text4)',marginTop:4}}>Optional. Enables Claude claude-haiku-4-5 to parse complex trade descriptions. <a href="https://console.anthropic.com" target="_blank" style={{color:'var(--blue)'}}>Get key →</a></div>
      </div>
      <div className="alert alert-warn" style={{marginBottom:16}}>⚠️ API keys are stored in browser localStorage in plaintext. Only use on secure devices. Do not share your browser data.</div>
      <div style={{marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
        <input type="checkbox" id="ss-check" checked={useSessionStorage} onChange={e=>setUseSessionStorage(e.target.checked)} style={{width:'auto',cursor:'pointer'}}/>
        <label htmlFor="ss-check" style={{margin:0,cursor:'pointer',fontSize:11}}>Use session storage (keys won't persist after closing browser)</label>
      </div>
      <button className="btn btn-danger btn-sm" onClick={clearAllKeys} style={{marginBottom:16}}>🔑 Clear All Keys</button>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'14px 0'}}/>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,fontWeight:600}}>Import / Export</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input type="file" accept=".csv" ref={fileRef} style={{display:'none'}} onChange={handleCSV}/>
          <input type="file" accept=".json" ref={jsonFileRef} style={{display:'none'}} onChange={handleJSON}/>
          <button className="btn btn-secondary btn-sm" onClick={()=>fileRef.current.click()}>📂 Import CSV</button>
          <button className="btn btn-secondary btn-sm" onClick={exportCSV}>📤 Export CSV</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>jsonFileRef.current.click()}>📥 Import JSON</button>
          <button className="btn btn-secondary btn-sm" onClick={exportJSON}>📋 Export JSON</button>
        </div>
      </div>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'14px 0'}}/>
      <button className="btn btn-danger btn-sm" onClick={onClearSamples}>🗑 Clear Sample Data</button>
      <div className="modal-footer">
        <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary" onClick={handleSave}>Save Settings</button>
      </div>
    </div>
  );
}

/* ══ EDUCATION TAB ══ */
const CURRICULUM=[
  {level:1,title:'The Basics',subtitle:'Start here — zero experience needed',emoji:'🌱',color:'var(--green)',lessons:[
    {id:'l1_1',title:'What is an option?',body:'An option is a contract giving you the RIGHT (but not the obligation) to buy or sell a stock at a specific price before a specific date. Think of it like a concert ticket — you paid for the right to attend, but you don\'t HAVE to go. The ticket expires on a set date. Options work the same way.'},
    {id:'l1_2',title:'Calls vs Puts — which direction are you betting?',body:'CALL = you\'re betting the stock goes UP. Like calling someone over — you want it to come to you. PUT = you\'re betting the stock goes DOWN. Like putting something down — you expect it to drop. Simple rule: Calls UP, Puts DOWN.'},
    {id:'l1_3',title:'What is a Strike Price?',body:'The strike price is the target price you\'re betting on. If you buy a SPY $580 Call, you\'re betting SPY will be above $580 before expiry. If SPY is at $575 when you buy it, the stock needs to move up $5 just to break even — plus the premium you paid.'},
    {id:'l1_4',title:'What is Expiry / Expiration?',body:'Every option has a deadline. After that date, the option either has value or expires completely worthless. Options are a ticking clock. Closer to expiry = faster decay. Most traders NEVER let options expire — they sell them before the deadline to salvage value.'},
    {id:'l1_5',title:'What is Premium?',body:'Premium is what you pay to buy the option (or receive when you sell one). If a SPY call costs $8.50, you pay $850 per contract (options represent 100 shares). That\'s your max loss as a buyer. As a seller, you collect that $850 upfront and keep it if the option expires worthless.'},
    {id:'l1_6',title:'ITM, ATM, OTM — what do these mean?',body:'In the Money (ITM): your option already has real value. Call ITM = stock is above strike. Put ITM = stock is below strike. At the Money (ATM): stock is right at your strike. Out of the Money (OTM): not there yet. OTM options are cheaper but need a bigger move to pay off.'},
  ]},
  {level:2,title:'Your First Strategies',subtitle:'4 beginner strategies explained plainly',emoji:'📚',color:'var(--blue)',lessons:[
    {id:'l2_1',title:'Long Call — betting a stock goes up',body:'BUY a call option on a stock you think will rise. Pay premium upfront. Max loss is ONLY what you paid. Your upside is theoretically unlimited. Example: AAPL at $200, buy a $210 call for $3.00 ($300 total). If AAPL rises to $220, your call is worth ~$10+. You profit. If AAPL falls, you lose only your $300.'},
    {id:'l2_2',title:'Long Put — betting a stock goes down',body:'BUY a put option on a stock you think will fall. Works like a Long Call but in reverse. Max loss is the premium paid. Great for hedging stocks you already own — if your portfolio drops, your put goes up and offsets the damage.'},
    {id:'l2_3',title:'Cash Secured Put — getting paid to wait',body:'SELL a put on a stock you\'d be happy to own at a lower price. You collect the premium immediately. If stock stays above your strike: you keep all the premium. If stock drops below: you buy it at that price (which you wanted anyway) minus what you collected. Example: SPY at $580, sell $560 put for $4. If SPY stays above $560: keep $400. If SPY drops to $555: you buy at an effective price of $556.'},
    {id:'l2_4',title:'Covered Call — collecting income on stocks you own',body:'If you own 100 shares of a stock, SELL a call against it to collect income. If the stock rises above your strike, your shares get "called away" — sold at the strike price (still a profit). If it stays below, you keep the premium AND your shares. Repeat every month.'},
    {id:'l2_5',title:'Why sellers have the edge — time decay',body:'When you BUY options, time works AGAINST you. Every single day, your option loses a little value (theta decay). When you SELL options, time works FOR you — you collect that decay. This is why professional traders lean toward selling options. You\'re on the winning side of the clock. Buyers need the stock to move fast and far. Sellers just need it to stay put.'},
  ]},
  {level:3,title:'Risk Management',subtitle:'The difference between lasting and blowing up',emoji:'🛡️',color:'var(--gold)',lessons:[
    {id:'l3_1',title:'The 2–5% Rule: Never bet the farm',body:'Never risk more than 2–5% of your total account on any single trade. If you have $25,000 and risk 2% per trade, you can lose 50 trades in a row and still have capital. If you risk 20% per trade, 5 bad losses wipe you out. This rule sounds boring — it\'s the most important rule in trading.'},
    {id:'l3_2',title:'Know your max loss BEFORE entering',body:'Every trade should have a clear answer to: "What\'s the absolute worst case here?" Long options: max loss = premium paid. Short options: can be much larger (potentially unlimited for naked calls). Always use spreads to cap max loss when selling. Write the number down before entering. If that loss would hurt badly, size down or skip the trade.'},
    {id:'l3_3',title:'Setting exit rules: take profit and stop loss',body:'Decide your exits BEFORE you enter. Take Profit: For credit trades (selling), close at 50% of max profit. For debit trades (buying), target 100% gain. Stop Loss: For credit trades, close at 2× what you collected. For debit trades, close at 50% loss. Written rules remove emotion. Emotion destroys accounts.'},
    {id:'l3_4',title:'Diversify: don\'t put it all in one trade',body:'Don\'t load up on one ticker, one direction, or one expiry. Example of a balanced portfolio: 40% income trades (selling puts/calls), 30% directional plays, 30% hedges. If 5 trades are all SPY calls and SPY drops 5%, you lose everything. Spread across tickers, strategies, and expiries.'},
    {id:'l3_5',title:'When NOT to trade',body:'Sometimes the best trade is no trade. Avoid trading: right before Fed announcements or major jobs reports unless you know exactly what you\'re doing. When you\'re emotional — scared, angry, or chasing a loss. In extreme volatility without experience. Cash is a valid position. There are 250+ trading days per year. Missing a few costs nothing.'},
  ]},
  {level:4,title:'The Greeks',subtitle:'Why your option price changes every second',emoji:'🧮',color:'var(--purple)',lessons:[
    {id:'l4_1',title:'Delta: how much does your option move?',body:'Delta tells you how much your option\'s price changes per $1 move in the stock. Delta 0.50 = for every $1 up, your call gains $0.50. At 100 shares per contract, that\'s $50 per contract per $1 move. Delta also roughly equals the probability the option finishes in the money. 0.50 delta ≈ 50% chance of profit at expiry. Deep ITM options have delta near 1.0. Far OTM options near 0.'},
    {id:'l4_2',title:'Theta: time is always working against buyers',body:'Theta is the dollar amount your option loses each day just from time passing. If theta = -$5, your option loses $5 every single day — even if the stock doesn\'t move. Buyers pay this. Sellers collect it. This is the seller\'s statistical edge. Theta accelerates dramatically in the last 30 days before expiry.'},
    {id:'l4_3',title:'Gamma: the accelerator',body:'Gamma measures how fast delta changes as the stock moves. High gamma = small moves cause big swings in your delta. Options near expiry and near ATM have the highest gamma. This makes near-expiry options dangerous to sell (they can blow up fast) but exciting to buy if you want a leveraged short-term bet.'},
    {id:'l4_4',title:'Vega: volatility is your friend or enemy',body:'Vega measures how much your option changes when volatility changes by 1%. When market panic spikes volatility, option prices jump UP — even if the stock barely moves. Buyers of options love volatility spikes. Sellers hate them. Strategy: in calm markets, sell options (collect cheap premium). In volatile markets, buy options (premium is expensive but moves are large enough to compensate).'},
    {id:'l4_5',title:'Using all the Greeks together',body:'Think of your portfolio in Greek terms. Net delta tells you if you\'re net bullish or bearish. Net theta tells you what you\'re paying or collecting per day. Want income: sell options, earn positive theta. Want a directional bet: buy options, get positive delta. Monitor these at the portfolio level to understand your true exposure.'},
  ]},
  {level:5,title:'Spreads & Multi-Leg Strategies',subtitle:'Reduce risk, keep more of your premium',emoji:'⚡',color:'var(--blue)',lessons:[
    {id:'l5_1',title:'Bull Put Spread — income with a safety net',body:'Sell a put at price A, buy a put at price B (lower). You collect the difference. Max loss is capped at (A − B − premium collected) × 100. Example: SPY at $580. Sell $560 put for $4, buy $550 put for $1.50. Net credit = $2.50 ($250). Max loss = $750. You win if SPY stays above $560. Spreads let you sell options without unlimited risk.'},
    {id:'l5_2',title:'Bear Call Spread — income when bearish',body:'Sell a call at price A, buy a call at price B (higher). Collect the difference. You win if the stock stays below your sold call strike. Mirror image of bull put spread. Example: SPY at $580. Sell $600 call for $3, buy $610 call for $1.50. Net credit = $1.50. You profit as long as SPY stays below $600.'},
    {id:'l5_3',title:'Iron Condor — collecting rent in a sideways market',body:'Combine a bull put spread + bear call spread on the same stock. You collect premium from both sides. You profit if the stock stays within your defined range until expiry. Example: SPY at $580. Sell $560/$550 put spread for $2.50 + sell $600/$610 call spread for $1.50 = $4.00 total ($400). You keep everything if SPY stays between $560 and $600.'},
    {id:'l5_4',title:'Debit Spreads — directional bets at lower cost',body:'Buy a call (or put) at strike A, sell one at strike B further OTM. The sold option reduces your cost. Example: SPY at $580. Buy $580 call for $8, sell $590 call for $4. Net cost = $4 ($400). Max profit = $6 ($600). You profit if SPY rises above $580. Trade-off: upside is capped at $590. Better risk/reward than buying the raw call.'},
    {id:'l5_5',title:'Straddles and Strangles — betting on BIG moves',body:'Straddle: buy ATM call + ATM put. You profit if the stock moves A LOT in either direction. Perfect before earnings when a big move is expected but direction is uncertain. Strangle: buy OTM call + OTM put. Cheaper, but needs an even bigger move to profit. Warning: these are expensive. The stock has to move more than the combined premium you paid. Best used before confirmed catalysts.'},
  ]},
  {level:6,title:'Advanced Tactics',subtitle:'What experienced traders actually do',emoji:'🎯',color:'var(--red)',lessons:[
    {id:'l6_1',title:'Earnings plays: high risk, high reward',body:'Earnings releases cause big moves. Two approaches: 1) Buy a straddle BEFORE earnings — bet on big move. 2) Sell a straddle AFTER the announcement — vol crush means IV collapses and premiums drop fast. Buying into earnings is expensive because IV is elevated. The move often needs to exceed what options already priced in. Experienced traders typically fade (sell) earnings vol rather than buy it.'},
    {id:'l6_2',title:'Rolling: extending a trade that needs more time',body:'Rolling means closing your current position and reopening at a later expiry (sometimes different strike). When to roll: option is losing but your thesis is intact, or near expiry and you need more time. Roll for credit when possible — collect more premium than you spend closing. Never roll just to avoid a loss. Only roll if the original thesis is still valid.'},
    {id:'l6_3',title:'What to do when a trade goes wrong',body:'1. Don\'t panic-close immediately — assess if the thesis changed. 2. Did you set a stop loss rule? Follow it without emotion. 3. Can you roll to a better position with your thesis still intact? 4. Accept the loss if the thesis is broken. Trying to "make it back" in the same trade leads to bigger losses. Every loss is tuition. Best traders lose small, win medium — consistently.'},
    {id:'l6_4',title:'Implied vs Historical Volatility — the real edge',body:'Implied Volatility (IV): what the market EXPECTS. Historical Volatility (HV): what actually happened. The edge: when IV > HV, options are overpriced — sell them. When IV < HV, options are underpriced — buy them. This is the entire basis for selling options. On average, IV runs 2–4% higher than realized vol, giving sellers a consistent long-term statistical edge.'},
    {id:'l6_5',title:'Building a trading system',body:'Best traders have a SYSTEM, not gut calls. A basic system: 1) Define your edge — what strategy, what conditions. 2) Define entry rules — specific criteria. 3) Define exit rules — profit target AND stop loss. 4) Define position sizing — % of account per trade. 5) Track everything in a journal. 6) Review monthly. A system removes emotion. Emotion destroys accounts.'},
  ]},
];

function EducationTab(){
  const [progress,setProgress]=useState(()=>{try{return JSON.parse(localStorage.getItem('opx_edu')||'{}');}catch{return {};}});
  const [openLevel,setOpenLevel]=useState(1);
  const [openLesson,setOpenLesson]=useState(null);
  useEffect(()=>{localStorage.setItem('opx_edu',JSON.stringify(progress));},[progress]);
  const toggle=id=>setProgress(p=>({...p,[id]:!p[id]}));
  const lvlProg=lv=>{const done=lv.lessons.filter(l=>progress[l.id]).length;return{done,total:lv.lessons.length,pct:Math.round(done/lv.lessons.length*100)};};
  const all=CURRICULUM.flatMap(l=>l.lessons),totalDone=all.filter(l=>progress[l.id]).length,totalPct=Math.round(totalDone/all.length*100);
  return(
    <div className="fade-in">
      <div style={{background:'linear-gradient(135deg,rgba(0,200,5,0.06),rgba(99,102,241,0.07))',border:'1px solid var(--border2)',borderRadius:'var(--r2)',padding:'20px 24px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,flexWrap:'wrap'}}>
        <div><div style={{fontSize:20,fontWeight:800,marginBottom:4}}>📖 Options Trading Academy</div><div style={{fontSize:13,color:'var(--text2)'}}>Zero to expert — one lesson at a time. Check off each lesson as you learn it. Progress is saved automatically.</div></div>
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:32,fontWeight:900,color:'var(--blue)',lineHeight:1}}>{totalPct}%</div>
          <div style={{fontSize:10,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.8px',marginTop:2}}>Complete</div>
          <div style={{width:90,height:6,background:'var(--bg2)',borderRadius:3,overflow:'hidden',marginTop:6}}><div style={{width:totalPct+'%',height:'100%',background:'linear-gradient(90deg,var(--blue),var(--purple))',borderRadius:3,transition:'width .4s'}}/></div>
          <div style={{fontSize:10,color:'var(--text4)',marginTop:4}}>{totalDone}/{all.length} lessons</div>
        </div>
      </div>
      {CURRICULUM.map(lv=>{
        const lp=lvlProg(lv),isOpen=openLevel===lv.level,isDone=lp.pct===100;
        return(
          <div key={lv.level} style={{marginBottom:10,border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden',background:'var(--bg3)'}}>
            <div style={{padding:'14px 18px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',userSelect:'none',background:isOpen?'rgba(255,255,255,0.025)':'none',borderBottom:isOpen?'1px solid var(--border)':'none'}} onClick={()=>setOpenLevel(isOpen?null:lv.level)}>
              <div style={{fontSize:22}}>{lv.emoji}</div>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.6px'}}>Level {lv.level}</div>
                  {isDone&&<span style={{fontSize:9,fontWeight:700,color:'var(--green)',background:'rgba(0,200,5,0.12)',border:'1px solid rgba(0,200,5,0.28)',padding:'1px 6px',borderRadius:10}}>✓ DONE</span>}
                </div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:1}}>{lv.title}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{lv.subtitle}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0,marginRight:8}}>
                <div style={{fontSize:13,fontWeight:700,color:lv.color}}>{lp.done}/{lp.total}</div>
                <div style={{width:56,height:4,background:'var(--bg2)',borderRadius:2,overflow:'hidden',marginTop:4}}><div style={{width:lp.pct+'%',height:'100%',background:lv.color,borderRadius:2,transition:'width .3s'}}/></div>
              </div>
              <div style={{fontSize:12,color:'var(--text4)',transform:isOpen?'rotate(180deg)':'none',transition:'transform .2s'}}>▼</div>
            </div>
            {isOpen&&(
              <div>
                {lv.lessons.map(lesson=>{
                  const done=!!progress[lesson.id],isExpanded=openLesson===lesson.id;
                  return(
                    <div key={lesson.id} style={{borderBottom:'1px solid rgba(34,34,34,0.8)',background:done?'rgba(0,200,5,0.03)':'none'}}>
                      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px',cursor:'pointer'}} onClick={()=>setOpenLesson(isExpanded?null:lesson.id)}>
                        <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${done?lv.color:'var(--border2)'}`,background:done?lv.color:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s',cursor:'pointer'}} onClick={e=>{e.stopPropagation();toggle(lesson.id);}}>
                          {done&&<span style={{color:'#fff',fontSize:12,fontWeight:800,lineHeight:1}}>✓</span>}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:done?'var(--text3)':'var(--text)',textDecoration:done?'line-through':'none',transition:'all .2s'}}>{lesson.title}</div>
                        </div>
                        <div style={{fontSize:11,color:'var(--text4)'}}>{isExpanded?'▲':'▼'}</div>
                      </div>
                      {isExpanded&&(
                        <div style={{padding:'0 18px 16px 52px'}}>
                          <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.8,background:'var(--bg2)',borderRadius:'var(--r)',padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>{lesson.body}</div>
                          <button className="btn btn-sm" style={{background:done?'rgba(16,185,129,0.15)':lv.color+'22',color:done?'var(--green)':lv.color,border:`1px solid ${done?'rgba(16,185,129,0.3)':lv.color+'44'}`}} onClick={()=>toggle(lesson.id)}>{done?'↩ Mark as unread':'✓ Mark as learned'}</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
      {totalPct===100&&<div style={{textAlign:'center',padding:'32px',background:'rgba(16,185,129,0.06)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:'var(--r2)',marginTop:12}}><div style={{fontSize:40,marginBottom:10}}>🏆</div><div style={{fontSize:20,fontWeight:800,color:'var(--green)',marginBottom:6}}>You\'ve completed the entire curriculum!</div><div style={{fontSize:13,color:'var(--text2)'}}>You now know more than 90% of retail options traders. Now go apply it — carefully.</div></div>}
    </div>
  );
}

/* ══ APP ══ */
function App(){
  const [trades,setTrades]=useState(()=>{try{const s=localStorage.getItem('opx_trades');return s?JSON.parse(s):SAMPLE_TRADES;}catch{return SAMPLE_TRADES;}});
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('opx_apikey')||'');
  const [claudeKey,setClaudeKey]=useState(()=>localStorage.getItem('opx_claudekey')||'');
  const [prices,setPrices]=useState({});
  const [extPrices,setExtPrices]=useState({});
  const [marketSession,setMarketSession]=useState(getMarketSession());
  const [priceLoading,setPriceLoading]=useState(false);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [showAdd,setShowAdd]=useState(false);
  const [editTrade,setEditTrade]=useState(null);
  const [closeTrade,setCloseTrade]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [payoffTrade,setPayoffTrade]=useState(null);
  const [vix,setVix]=useState(null);
  const [earnings,setEarnings]=useState([]);
  const [news,setNews]=useState([]);
  const [researchLoading,setResearchLoading]=useState(false);
  const [researchLoaded,setResearchLoaded]=useState(false);
  const [riskFreeRate,setRiskFreeRate]=useState(RISK_FREE_DEFAULT);
  const [ivRankData,setIvRankData]=useState({});
  const [liveMarksAvailable,setLiveMarksAvailable]=useState({});
  const [marksUpdatedAt,setMarksUpdatedAt]=useState(null); // timestamp of last mark refresh
  const [marksLoading,setMarksLoading]=useState(false);
  const [logFilter,setLogFilter]=useState('All');
  const [canScrollLeft,setCanScrollLeft]=useState(false);
  const [canScrollRight,setCanScrollRight]=useState(false);
  const tickerScrollRef=useRef(null);
  const [logSearch,setLogSearch]=useState('');
  const [advisorTrade,setAdvisorTrade]=useState(null);
  const [theme,setTheme]=useState(()=>localStorage.getItem('opx_theme')||'dark');

  const toggleTheme=()=>{const newTheme=theme==='dark'?'light':'dark';setTheme(newTheme);localStorage.setItem('opx_theme',newTheme);document.documentElement.dataset.theme=newTheme;};

  useEffect(()=>{document.documentElement.dataset.theme=theme;},[theme]);

  useEffect(()=>{localStorage.setItem('opx_trades',JSON.stringify(trades));},[trades]);

  const tradesRef=useRef(trades);
  useEffect(()=>{tradesRef.current=trades;},[trades]);

  // Standalone mark refresh — no Finnhub key required, uses Yahoo options chain
  const refreshMarks=useCallback(async()=>{
    const openTrades=tradesRef.current.filter(t=>t.status==='Open'&&t.expiry&&new Date(t.expiry)>new Date());
    if(!openTrades.length)return;
    setMarksLoading(true);
    try{
      const liveMarks=await fetchLiveOptionMarks(openTrades);
      if(Object.keys(liveMarks).length>0){
        setLiveMarksAvailable(liveMarks);
        setTrades(prev=>prev.map(t=>{
          if(t.status!=='Open')return t;
          const hasManual=t.liveMarked===false&&t.currentMark!==''&&t.currentMark!==null;
          if(hasManual)return t;
          const live=liveMarks[t.id];
          if(live&&live.mark>0)return{...t,currentMark:live.mark,liveMarked:'live'};
          return t;
        }));
        setMarksUpdatedAt(new Date());
      }
    }catch(e){}
    setMarksLoading(false);
  },[]);

  const refreshPrices=useCallback(async()=>{
    if(!apiKey)return;
    setPriceLoading(true);
    setMarketSession(getMarketSession());
    try{
      const openTickers=tradesRef.current.filter(t=>t.status==='Open').map(t=>t.ticker.toUpperCase());
      const allSymbols=[...new Set([...WATCHLIST,...openTickers])];
      // Fetch stock quotes, extended hours, risk-free rate in parallel
      const [quotes,yahooData,rfr]=await Promise.all([
        fetchQuotes(allSymbols,apiKey),
        fetchYahooExtended(allSymbols),
        fetchRiskFreeRate()
      ]);
      setRiskFreeRate(rfr);
      if(!quotes.length){setPriceLoading(false);return;}
      const pm={};quotes.forEach(q=>{pm[q.symbol]={price:q.price,change:q.change,pct:q.pct};});
      setPrices(pm);
      setExtPrices(yahooData);

      // Fetch live option marks for open positions (non-blocking)
      const session=getMarketSession();

      // First pass: apply BS estimates immediately
      setTrades(prev=>prev.map(t=>{
        if(t.status!=='Open')return t;
        const hasManual=t.liveMarked===false&&t.currentMark!==''&&t.currentMark!==null;
        if(hasManual)return t;
        const sym=t.ticker.toUpperCase();
        let stockPrice=pm[sym]?.price;
        const ext=yahooData[sym];
        if(ext){
          if(session==='pre'&&ext.pre)stockPrice=ext.pre.price;
          else if(session==='after'&&ext.post)stockPrice=ext.post.price;
        }
        const est=estimateMark(t,stockPrice);
        return est===null?t:{...t,currentMark:est,liveMarked:'est'};
      }));

      // Second pass: try live option marks (async, updates when ready)
      const currentOpenTrades=tradesRef.current.filter(t=>t.status==='Open');
      fetchLiveOptionMarks(currentOpenTrades).then(liveMarks=>{
        if(Object.keys(liveMarks).length>0){
          setLiveMarksAvailable(liveMarks);
          setTrades(prev=>prev.map(t=>{
            if(t.status!=='Open')return t;
            const hasManual=t.liveMarked===false&&t.currentMark!==''&&t.currentMark!==null;
            if(hasManual)return t;
            const live=liveMarks[t.id];
            if(live&&live.mark>0){
              return{...t,currentMark:live.mark,liveMarked:'live'};
            }
            return t;
          }));
        }
      }).catch(()=>{});

      // Also fetch IV rank data for open tickers (non-blocking)
      Promise.all([...new Set(currentOpenTrades.map(t=>t.ticker.toUpperCase()))].map(async sym=>{
        const ivData=await fetchTickerIVData(sym);
        if(ivData)setIvRankData(prev=>({...prev,[sym]:ivData}));
      })).catch(()=>{});

      setLastRefresh(new Date());
    }catch(e){}
    finally{setPriceLoading(false);}
  },[apiKey]);

  const fetchResearch=useCallback(async()=>{
    if(!apiKey)return;
    setResearchLoading(true);
    try{
      const [v,e,n,rfr]=await Promise.all([fetchVIX(apiKey),fetchEarnings(apiKey),fetchNews(apiKey),fetchRiskFreeRate()]);
      if(v){setVix(v);}setEarnings(e);setNews(n);setRiskFreeRate(rfr);setResearchLoaded(true);
      // Fetch IV rank for watchlist and open position tickers
      const openTickers=trades.filter(t=>t.status==='Open').map(t=>t.ticker.toUpperCase());
      const allSyms=[...new Set([...WATCHLIST,...openTickers])];
      allSyms.forEach(async sym=>{
        const ivData=await fetchTickerIVData(sym);
        if(ivData)setIvRankData(prev=>({...prev,[sym]:ivData}));
      });
    }
    finally{setResearchLoading(false);}
  },[apiKey,trades]);

  useEffect(()=>{
    if(apiKey)refreshPrices();
    const iv=setInterval(()=>{
      setMarketSession(getMarketSession());
      const session=getMarketSession();
      // Auto-refresh stock prices during market hours (requires Finnhub key)
      if(session!=='closed'&&apiKey)refreshPrices();
    },60000);
    return()=>clearInterval(iv);
  },[apiKey]);

  // Independent option mark refresh — no Finnhub key needed, every 5 min during market hours
  useEffect(()=>{
    refreshMarks(); // run immediately on mount
    const iv=setInterval(()=>{
      if(getMarketSession()!=='closed')refreshMarks();
    },300000); // 5 minutes
    return()=>clearInterval(iv);
  },[]);

  const openTrades=useMemo(()=>trades.filter(t=>t.status==='Open'),[trades]);
  const closedTrades=useMemo(()=>trades.filter(t=>t.status==='Closed'),[trades]);
  const openPnL=useMemo(()=>{let s=0,has=false;openTrades.forEach(t=>{const p=calcPnL(t);if(p!==null){s+=p;has=true;}});return has?s:null;},[openTrades]);
  const closedPnL=useMemo(()=>closedTrades.reduce((s,t)=>s+(calcPnL(t)||0),0),[closedTrades]);
  const totalPnL=(openPnL||0)+closedPnL;

  const greeks=useMemo(()=>{
    let delta=0,theta=0,gamma=0,capitalRisk=0,premCollected=0;
    openTrades.forEach(t=>{const sp=prices[t.ticker.toUpperCase()]?.price;if(sp){const g=calcGreeks(t,sp);delta+=g.delta;theta+=g.theta;gamma+=g.gamma;}const qty=parseFloat(t.quantity)||1,prem=parseFloat(t.premium)||0;if(t.action==='Buy')capitalRisk+=prem*qty*100;else premCollected+=prem*qty*100;});
    return{delta,theta,gamma,capitalRisk,premCollected};
  },[openTrades,prices]);

  const filteredTrades=useMemo(()=>{
    let t=trades;
    if(logFilter!=='All')t=t.filter(x=>x.status===logFilter);
    if(logSearch)t=t.filter(x=>x.ticker.toUpperCase().includes(logSearch.toUpperCase())||(x.strategy||'').toLowerCase().includes(logSearch.toLowerCase())||(x.notes||'').toLowerCase().includes(logSearch.toLowerCase()));
    return t.sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[trades,logFilter,logSearch]);

  const upsert=t=>{setTrades(p=>{const i=p.findIndex(x=>x.id===t.id);return i>=0?p.map(x=>x.id===t.id?t:x):[...p,t];});setShowAdd(false);setEditTrade(null);setCloseTrade(null);if(t.status==='Open'&&apiKey)setTimeout(()=>refreshPrices(),300);};
  const remove=id=>{if(confirm('Delete this trade?'))setTrades(p=>p.filter(x=>x.id!==id));};
  const closeTradeFn=(trade,price,date)=>upsert({...trade,status:'Closed',closePrice:price,closeDate:date,currentMark:'',liveMarked:false});
  const setManualMark=(id,val)=>setTrades(p=>p.map(t=>t.id===id?{...t,currentMark:parseFloat(val),liveMarked:false}:t));
  const saveKey=(k,ck)=>{setApiKey(k);setClaudeKey(ck);localStorage.setItem('opx_apikey',k);localStorage.setItem('opx_claudekey',ck);setShowSettings(false);if(k)setTimeout(()=>refreshPrices(),300);};
  const importCSV=csv=>{const lines=csv.trim().split('\n'),headers=lines[0].split(',').map(h=>h.trim());const imp=lines.slice(1).map(line=>{const vals=line.split(','),obj={id:uid()};headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim().replace(/^"|"$/g,'');});obj.liveMarked='est';obj.currentMark='';return obj;});setTrades(p=>[...p,...imp]);setShowSettings(false);alert(`Imported ${imp.length} trades`);};
  const importJSON=trades=>{const imp=trades.map(t=>({...t,id:t.id||uid(),liveMarked:t.liveMarked||'est',currentMark:t.currentMark||''}));setTrades(p=>[...p,...imp]);setShowSettings(false);alert(`Imported ${imp.length} trades`);};
  const clearSamples=()=>{if(confirm('Remove sample trades?')){setTrades(p=>p.filter(t=>!t.id.startsWith('s')));setShowSettings(false);}};
  const handleTab=t=>{setTab(t);if(t==='research'&&!researchLoaded&&apiKey)fetchResearch();};
  const pnlClass=v=>v===null?'neu':v>=0?'pos':'neg';
  const checkScroll=()=>{if(tickerScrollRef.current){const{scrollLeft,scrollWidth,clientWidth}=tickerScrollRef.current;setCanScrollLeft(scrollLeft>0);setCanScrollRight(scrollLeft<scrollWidth-clientWidth-10);}};
  const scroll=(direction)=>{if(tickerScrollRef.current){const amount=300;tickerScrollRef.current.scrollBy({left:direction==='left'?-amount:amount,behavior:'smooth'});setTimeout(checkScroll,300);}};
  useEffect(checkScroll,[prices]);
  const winRate=closedTrades.length?Math.round(100*closedTrades.filter(t=>calcPnL(t)>0).length/closedTrades.length):null;

  // Win/Loss streak
  const streak=useMemo(()=>{
    const closed=[...closedTrades].sort((a,b)=>new Date(b.closeDate||b.date)-new Date(a.closeDate||a.date));
    if(!closed.length)return{count:0,type:'none'};
    const first=calcPnL(closed[0])>=0?'win':'loss';
    let count=0;
    for(const t of closed){if((calcPnL(t)>=0?'win':'loss')===first)count++;else break;}
    return{count,type:first};
  },[closedTrades]);

  // CSV Export
  const exportCSV=()=>{
    const headers=['Date','Ticker','Type','Strike','Expiry','Action','Qty','Entry','Fees','CloseDate','ClosePrice','P&L','Strategy','Notes','Status'];
    const rows=filteredTrades.map(t=>{const pnl=calcPnL(t);return[t.date,t.ticker,t.optionType,t.strike,t.expiry,t.action,t.quantity,t.premium,t.fees||0,t.closeDate||'',t.closePrice||'',pnl!==null?pnl.toFixed(2):'',t.strategy||'',t.notes||'',t.status].map(v=>`"${v}"`).join(',');});
    const csv=[headers.join(','),...rows].join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='opxtracker-trades.csv';a.click();
  };

  // Keyboard shortcuts
  useEffect(()=>{
    const handler=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.key==='n'||e.key==='N'){e.preventDefault();setShowAdd(true);}
      if(e.key==='r'||e.key==='R'){e.preventDefault();if(apiKey)refreshPrices();}
      if(e.key==='Escape'){setShowAdd(false);setEditTrade(null);setCloseTrade(null);setPayoffTrade(null);setShowSettings(false);setAdvisorTrade(null);}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[apiKey]);

  return(
    <div className="app">
      <header className="header">
        <div className="header-left">
          <div className="logo">
            <div className="logo-icon" style={{fontSize:17}}>◈</div>
            <span className="logo-text">OpxTracker</span>
            <span className="logo-badge">BETA</span>
          </div>
          <nav className="nav">
            {[['dashboard','Dashboard'],['quickadd','AI Quick Add'],['log','Trade Log'],['research','Research'],['analytics','Analytics'],['learn','📖 Learn']].map(([k,l])=>(
              <button key={k} className={`nav-btn${tab===k?' active':''}`} onClick={()=>handleTab(k)}>{l}</button>
            ))}
          </nav>
        </div>
        <div className="header-right">
          <div className="header-pnl">
            <div className="header-pnl-label">Total P&L</div>
            <div className={`header-pnl-val ${pnlClass(totalPnL)}`}>{fmt$(totalPnL)}</div>
          </div>
          <button className="icon-btn" onClick={toggleTheme} title={`Switch to ${theme==='dark'?'light':'dark'} mode`}>{theme==='dark'?'☀️':'🌙'}</button>
          <button className="icon-btn" onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
          <button className="icon-btn" onClick={()=>setShowAdd(true)} title="Add Trade">+</button>
        </div>
      </header>

      <div className="ticker-strip">
        {canScrollLeft&&<button className="ticker-arrow-btn" onClick={()=>scroll('left')}>◀</button>}
        <div className="ticker-scroll-wrapper" ref={tickerScrollRef} onScroll={checkScroll}>
          {!Object.keys(prices).length&&!priceLoading&&<span style={{fontSize:11,color:'var(--text4)',padding:'0 16px'}}>{apiKey?'Waiting for price data…':'Add Finnhub API key in ⚙ Settings'}</span>}
          {priceLoading&&!Object.keys(prices).length&&<span style={{fontSize:11,color:'var(--text4)',padding:'0 16px'}}>Loading prices…</span>}
          {WATCHLIST.filter(s=>prices[s]).map(s=>{
            const q=prices[s];
            const ext=extPrices[s];
            const session=marketSession;
            const hasExt=ext&&((session==='pre'&&ext.pre)||(session==='after'&&ext.post));
            const extData=hasExt?(session==='pre'?ext.pre:ext.post):null;
            return(
            <div className="ticker-item" key={s}>
              <span className="t-sym">{s}</span>
              <span className="t-price">${q.price.toFixed(2)}</span>
              <span className={`t-chg ${q.change>=0?'pos':'neg'}`}>{q.change>=0?'+':''}{q.pct.toFixed(2)}%</span>
              {extData&&<React.Fragment>
                <span className="t-ext">→</span>
                <span className="t-ext-price" style={{color:extData.change>=0?'var(--green)':'var(--red)'}}>${extData.price.toFixed(2)}</span>
                <span className={`t-ext-chg ${extData.change>=0?'pos':'neg'}`} style={{fontSize:9,fontWeight:600,padding:'1px 4px',borderRadius:3,background:extData.change>=0?'var(--green-glow)':'var(--red-glow)',color:extData.change>=0?'var(--green)':'var(--red)'}}>{extData.change>=0?'+':''}{extData.pct.toFixed(2)}%</span>
              </React.Fragment>}
            </div>
          );})}
        </div>
        {canScrollRight&&<button className="ticker-arrow-btn" onClick={()=>scroll('right')}>▶</button>}
        <div className="strip-right">
          <span className={`t-session ${marketSession}`} title={`Market: ${SESSION_LABELS[marketSession]}`}>{SESSION_LABELS[marketSession]}</span>
          {vix&&<span style={{fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:12,background:vix<15?'var(--green-glow)':vix<20?'var(--blue-glow)':vix<30?'var(--gold-glow)':'var(--red-glow)',color:vix<15?'var(--green)':vix<20?'var(--blue)':vix<30?'var(--gold)':'var(--red)',border:`1px solid ${vix<15?'rgba(0,200,5,0.2)':vix<20?'rgba(99,102,241,0.2)':vix<30?'rgba(240,180,41,0.2)':'rgba(255,59,48,0.2)'}`
          }}>VIX {vix.toFixed(1)}</span>}
          {lastRefresh&&<span className="strip-time">{lastRefresh.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>}
          {marketSession==='regular'&&<div className="live-dot" title="Market Open"/>}
          {(marketSession==='pre'||marketSession==='after')&&<div className="live-dot" title={marketSession==='pre'?'Pre-Market':'After Hours'} style={{background:'var(--gold)',boxShadow:'0 0 6px var(--gold)'}}/>}
          <button className="refresh-btn" onClick={refreshPrices} disabled={priceLoading}>{priceLoading?<span className="spin">⟳</span>:'⟳'}</button>
        </div>
      </div>

      <div className="content">
        {!apiKey&&<div className="no-key-banner">⚠ No API key — live prices disabled. <a onClick={()=>setShowSettings(true)}>Add your free Finnhub key →</a></div>}

        {/* ── DASHBOARD ── */}
        {tab==='dashboard'&&<div className="fade-in">
          <SmartTip trades={trades} prices={prices} vix={vix}/>
          <PortfolioStory trades={trades} prices={prices}/>
          <ExpiryAlerts trades={trades}/>
          <div className="kpi-grid">
            <div className="kpi kpi-blue"><div className="kpi-icon">📈</div><div className="kpi-label">Total P&L</div><div className={`kpi-val ${pnlClass(totalPnL)}`}>{fmt$(totalPnL)}</div><div className="kpi-sub">Open + Realized</div></div>
            <div className="kpi kpi-green"><div className="kpi-icon">◈</div><div className="kpi-label">Unrealized P&L</div><div className={`kpi-val ${pnlClass(openPnL)}`}>{openPnL!==null?fmt$(openPnL):'—'}</div><div className="kpi-sub">{openTrades.length} open position{openTrades.length!==1?'s':''}</div></div>
            <div className="kpi kpi-purple"><div className="kpi-icon">🔒</div><div className="kpi-label">Realized P&L</div><div className={`kpi-val ${pnlClass(closedPnL)}`}>{fmt$(closedPnL)}</div><div className="kpi-sub">{closedTrades.length} closed trades</div></div>
            <div className="kpi kpi-gold"><div className="kpi-icon">🎯</div><div className="kpi-label">Win Rate</div><div className={`kpi-val ${winRate!==null?(winRate>=50?'pos':'neg'):'neu'}`}>{winRate!==null?winRate+'%':'—'}</div><div className="kpi-sub">{closedTrades.filter(t=>calcPnL(t)>0).length}W · {closedTrades.filter(t=>calcPnL(t)<0).length}L</div></div>
          </div>
          {openTrades.length>0&&<div className="greeks-row">
            <div className="greek-card"><div className="greek-label"><Tip label="Net Delta" tip="How much your portfolio gains/loses per $1 move in the stock. Positive = bullish, negative = bearish."/></div><div className="greek-val" style={{color:greeks.delta>5?'var(--green)':greeks.delta<-5?'var(--red)':'var(--text)'}}>{greeks.delta>=0?'+':''}{greeks.delta.toFixed(1)}</div><div className="greek-sub">{greeks.delta>5?'Bullish — betting UP':greeks.delta<-5?'Bearish — betting DOWN':'Neutral — no strong bias'}</div></div>
            <div className="greek-card"><div className="greek-label"><Tip label="Daily Theta" tip="Time decay — how much dollar value your options lose every single day just from time passing."/></div><div className="greek-val" style={{color:greeks.theta>=0?'var(--green)':'var(--red)'}}>{fmt$(greeks.theta)}/day</div><div className="greek-sub">{greeks.theta>=0?'Time is on your side 📈':'Time is against you ⏳'}</div></div>
            <div className="greek-card"><div className="greek-label"><Tip label="Net Gamma" tip="How fast your Delta changes. High gamma = bigger swings in your P&L as the stock moves."/></div><div className="greek-val">{greeks.gamma>=0?'+':''}{greeks.gamma.toFixed(3)}</div><div className="greek-sub">Delta sensitivity</div></div>
            <div className="greek-card"><div className="greek-label"><Tip label="Capital at Risk" tip="Total premium you've paid for long options — the most you could lose if everything expires worthless."/></div><div className="greek-val">{fmt$(greeks.capitalRisk)}</div><div className="greek-sub">Max possible loss (longs)</div></div>
            <div className="greek-card"><div className="greek-label"><Tip label="Premium Collected" tip="Cash you've received upfront from selling options. This is yours to keep if trades expire worthless."/></div><div className="greek-val pos">{fmt$(greeks.premCollected)}</div><div className="greek-sub">Collected upfront (shorts)</div></div>
            <div className="greek-card"><div className="greek-label"><Tip label="Risk-Free Rate" tip="The current US Treasury yield used in Black-Scholes calculations. Fetched live from Yahoo Finance (^IRX 13-week T-bill)."/></div><div className="greek-val">{(riskFreeRate*100).toFixed(2)}%</div><div className="greek-sub">{riskFreeRate===RISK_FREE_DEFAULT?'Default (fetch pending)':'Live T-bill rate'}</div></div>
          </div>}
          {closedTrades.length>0&&<div className="chart-box" style={{marginBottom:18}}><div className="chart-title">Equity Curve — Your running P&L over time</div><EquityChart trades={trades}/></div>}
          <div className="sec-hdr">
            <span className="sec-title">Open Positions <span className="sec-count">{openTrades.length}</span></span>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {marksUpdatedAt&&<span style={{fontSize:10,color:'var(--text4)'}}>Marks updated {marksUpdatedAt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>}
              <button className="btn btn-ghost btn-sm" onClick={refreshMarks} disabled={marksLoading} title="Refresh option marks from Yahoo Finance">{marksLoading?<span className="spin">⟳</span>:'⟳'} {marksLoading?'Updating…':'Update Marks'}</button>
              <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ New Trade</button>
            </div>
          </div>
          {openTrades.length===0?(
            <div className="onboard-card">
              <div style={{fontSize:36,marginBottom:10}}>📊</div>
              <div style={{fontSize:18,fontWeight:800,color:'var(--text)',marginBottom:6}}>No open positions yet</div>
              <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>Add your first trade to get started. It's easier than you think.</div>
              <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap',marginBottom:24}}>
                <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add Trade Manually</button>
                <button className="btn btn-secondary" onClick={()=>setTab('quickadd')}>🤖 Try AI Quick Add</button>
              </div>
              <div className="onboard-steps">
                <div className="onboard-step"><div className="onboard-step-num">1</div><div className="onboard-step-title">Add your trade</div><div className="onboard-step-desc">Enter any options position — calls, puts, spreads. Or just type it like a text message in AI Quick Add.</div></div>
                <div className="onboard-step"><div className="onboard-step-num">2</div><div className="onboard-step-title">Track P&L live</div><div className="onboard-step-desc">Add a free Finnhub API key in Settings and your P&L updates automatically with live prices.</div></div>
                <div className="onboard-step"><div className="onboard-step-num">3</div><div className="onboard-step-title">Get closing advice</div><div className="onboard-step-desc">Hit the 🤔 button on any position for a plain-English recommendation: hold, take profit, or close.</div></div>
                <div className="onboard-step"><div className="onboard-step-num">4</div><div className="onboard-step-title">Learn as you go</div><div className="onboard-step-desc">Use the 📖 Learn tab to understand options from scratch — no experience needed.</div></div>
              </div>
            </div>
          ):(
            <div className="pos-cards">
              {openTrades.map(t=>(
                <PositionCard key={t.id} trade={t} prices={prices}
                  onClose={setCloseTrade} onAdvisor={setAdvisorTrade}
                  onPayoff={setPayoffTrade} onEdit={setEditTrade} onRemove={remove}
                  ivRankData={ivRankData} liveMarksAvailable={liveMarksAvailable}
                  onRefreshMark={refreshMarks}/>
              ))}
            </div>
          )}
          {closedTrades.length>0&&<>
            <div className="sec-hdr"><span className="sec-title">Recent Closed <span className="sec-count">{closedTrades.length}</span></span><button className="btn btn-ghost btn-sm" onClick={()=>setTab('log')}>View All →</button></div>
            <div className="tbl-wrap" style={{overflowX:'auto'}}>
              <table><thead><tr><th>Date</th><th>Ticker</th><th>Type</th><th>Strike</th><th>Action</th><th>Entry</th><th>Exit</th><th>P&L</th><th>Return %</th><th>Fees</th></tr></thead>
              <tbody>{closedTrades.slice(-5).reverse().map(t=>{const pnl=calcPnL(t);const roi=t.closePrice&&t.premium?((parseFloat(t.closePrice)-parseFloat(t.premium))/parseFloat(t.premium)*100*(t.action==='Sell'?-1:1)):null;return<tr key={t.id}><td style={{color:'var(--text3)',fontSize:11}}>{t.closeDate||t.date}</td><td style={{fontWeight:700}}>{t.ticker}</td><td><span className={`badge ${t.optionType==='Call'?'b-call':'b-put'}`}>{t.optionType}</span></td><td>${t.strike}</td><td><span className={`badge ${t.action==='Buy'?'b-buy':'b-sell'}`}>{t.action}</span></td><td style={{color:'var(--text2)'}}>${parseFloat(t.premium).toFixed(2)}</td><td>{t.closePrice?'$'+parseFloat(t.closePrice).toFixed(2):'—'}</td><td className={pnl===null?'pnl-neu':pnl>=0?'pnl-pos':'pnl-neg'}>{pnl===null?'—':fmt$(pnl)}</td><td style={{color:roi===null?'var(--text3)':roi>=0?'var(--green)':'var(--red)',fontWeight:600,fontSize:11}}>{roi!==null?fmtPct(roi):'—'}</td><td style={{color:'var(--text3)',fontSize:11}}>{t.fees?fmt$(parseFloat(t.fees)):'—'}</td></tr>;})}
              </tbody></table>
            </div>
          </>}
        </div>}

        {/* ── AI QUICK ADD ── */}
        {tab==='quickadd'&&<div className="fade-in">
          <div className="sec-hdr" style={{marginBottom:16}}>
            <span className="sec-title">⚡ OpxBot</span>
            <span style={{fontSize:12,color:'var(--text3)'}}>Your options assistant — add trades &amp; ask questions in plain English</span>
          </div>
          <AITradeInput onAddTrade={t=>{upsert({...t,id:uid()});}} claudeKey={claudeKey}/>
          <div style={{marginTop:12,background:'var(--bg3)',border:'1px solid var(--border)',borderLeft:'3px solid var(--blue)',borderRadius:'var(--r2)',padding:'14px 18px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:6}}>💡 How it works</div>
            <div style={{fontSize:12,color:'var(--text3)',lineHeight:1.7}}>
              <span style={{color:'var(--green)',fontWeight:600}}>Add a trade:</span> Just describe it naturally — "bought 2 SPY 580 calls May 16 at 8.50" or "STO 1 TSLA 260 put for 4.20 exp April 17"<br/>
              <span style={{color:'var(--blue)',fontWeight:600}}>Ask anything:</span> "what is theta?", "explain iron condors", "when should I close?", "what does ITM mean?"<br/>
              <span style={{color:'var(--text4)'}}>For deeper learning, visit the</span> <strong style={{color:'var(--text2)',cursor:'pointer'}} onClick={()=>setTab('learn')}>📖 Learn tab →</strong>
            </div>
          </div>
        </div>}

        {/* ── TRADE LOG ── */}
        {tab==='log'&&<div className="fade-in">
          <div className="sec-hdr">
            <span className="sec-title">Trade Log <span className="sec-count">{filteredTrades.length}</span></span>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {marksUpdatedAt&&<span style={{fontSize:10,color:'var(--text4)'}}>Marks updated {marksUpdatedAt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>}
              <button className="btn btn-ghost btn-sm" onClick={refreshMarks} disabled={marksLoading}>{marksLoading?<span className="spin">⟳</span>:'⟳'} {marksLoading?'Updating…':'Update Marks'}</button>
              <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ New Trade</button>
            </div>
          </div>
          <div className="filters">
            <div className="tab-pills" style={{margin:0}}>{['All','Open','Closed'].map(f=><button key={f} className={`tab-pill${logFilter===f?' active':''}`} onClick={()=>setLogFilter(f)}>{f}</button>)}</div>
            <div className="search-bar" style={{marginLeft:'auto',width:240}}><span className="search-icon">🔍</span><input value={logSearch} onChange={e=>setLogSearch(e.target.value)} placeholder="Search ticker, strategy, notes…"/></div>
          </div>
          <div className="tbl-wrap" style={{overflowX:'auto'}}>
            {filteredTrades.length===0
              ?<div className="empty"><div className="empty-icon">🔍</div><div className="empty-title">No trades match</div></div>
              :(
              <table>
                <thead><tr>
                  <th>Date</th><th>Ticker</th><th>Type</th><th>Strike</th><th>Expiry</th>
                  <th>Act</th><th>Qty</th><th>Entry</th><th>Total Cost</th><th>Fees</th>
                  <th>Current Mark</th><th>P&amp;L</th><th>Return</th><th>DIT</th>
                  <th>Status</th><th>Strategy</th><th>Actions</th>
                </tr></thead>
                <tbody>{filteredTrades.map(t=>{
                  const sp=prices[t.ticker?.toUpperCase()]?.price;
                  const autoMark=t.currentMark?parseFloat(t.currentMark):(sp?estimateMark(t,sp):null);
                  const pnl=calcPnL(t);
                  const roi=t.status==='Closed'&&t.closePrice&&t.premium
                    ?((parseFloat(t.closePrice)-parseFloat(t.premium))/parseFloat(t.premium)*100*(t.action==='Sell'?-1:1))
                    :null;
                  const dit=calcDIT(t);
                  const totalCost=parseFloat(t.premium)*(parseFloat(t.quantity)||1)*100;
                  const isLive=t.liveMarked==='live';
                  const daysLeft=t.expiry?Math.ceil((new Date(t.expiry)-new Date())/86400000):null;
                  const isExpiredOpen=t.status==='Open'&&daysLeft!==null&&daysLeft<0;
                  return(
                    <tr key={t.id} style={isExpiredOpen?{background:'rgba(255,59,48,0.05)'}:{}}>
                      <td style={{color:'var(--text3)',fontSize:11}}>{t.date}</td>
                      <td style={{fontWeight:700}}>{t.ticker}</td>
                      <td><span className={`badge ${t.optionType==='Call'?'b-call':'b-put'}`}>{t.optionType}</span></td>
                      <td>${t.strike}</td>
                      <td style={{fontSize:11,color:isExpiredOpen?'var(--red)':'var(--text2)',fontWeight:isExpiredOpen?700:400}}>
                        {t.expiry}{isExpiredOpen&&<span style={{marginLeft:4,fontSize:9,color:'var(--red)'}}>EXPIRED</span>}
                      </td>
                      <td><span className={`badge ${t.action==='Buy'?'b-buy':'b-sell'}`}>{t.action}</span></td>
                      <td style={{color:'var(--text2)'}}>{t.quantity}</td>
                      <td>${parseFloat(t.premium).toFixed(2)}</td>
                      <td style={{color:'var(--text3)',fontSize:11}}>{t.action==='Sell'?'+':'-'}{fmt$(totalCost)}</td>
                      <td style={{color:'var(--text3)',fontSize:11}}>{t.fees?fmt$(parseFloat(t.fees)):'—'}</td>
                      <td>
                        {t.status==='Closed'
                          ?<span style={{fontWeight:600}}>{t.closePrice?'$'+parseFloat(t.closePrice).toFixed(2):'—'}</span>
                          :<div style={{display:'flex',flexDirection:'column',gap:3}}>
                            {/* Auto-updated mark display */}
                            <div style={{display:'flex',alignItems:'center',gap:4}}>
                              <span style={{fontWeight:700,color:isLive?'var(--green)':'var(--text2)',fontSize:12}}>
                                {autoMark?'$'+autoMark.toFixed(2):'—'}
                              </span>
                              <span className={`mark-source ${isLive?'mark-live':'mark-est'}`} style={{fontSize:9}}>
                                {isLive?'Live':'Est'}
                              </span>
                            </div>
                            {/* Manual override input — key resets it when autoMark changes */}
                            <input
                              key={t.id+'-'+(t.currentMark||'0')}
                              type="number" step="0.01"
                              defaultValue={t.currentMark||''}
                              onBlur={e=>e.target.value&&setManualMark(t.id,e.target.value)}
                              placeholder="override…"
                              style={{width:80,padding:'2px 6px',fontSize:10,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text3)'}}
                            />
                          </div>
                        }
                      </td>
                      <td className={pnl===null?'pnl-neu':pnl>=0?'pnl-pos':'pnl-neg'} style={{fontWeight:700}}>{pnl===null?'—':fmt$(pnl)}</td>
                      <td style={{color:roi===null?'var(--text4)':roi>=0?'var(--green)':'var(--red)',fontSize:11,fontWeight:600}}>{roi!==null?fmtPct(roi):'—'}</td>
                      <td style={{fontSize:10,color:'var(--text3)'}}>{dit}d</td>
                      <td><span className={`badge ${t.status==='Open'?'b-open':'b-closed'}`}>● {t.status}</span></td>
                      <td>{t.strategy&&<span className={`badge ${getStrategyBadge(t.strategy).className}`}>{getStrategyBadge(t.strategy).label}</span>}</td>
                      <td><div style={{display:'flex',gap:3}}>
                        {t.status==='Open'&&<button className="btn btn-success btn-xs" onClick={()=>setCloseTrade(t)}>Close</button>}
                        <button className="btn btn-ghost btn-xs" onClick={()=>setEditTrade(t)}>✎</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>remove(t.id)}>✕</button>
                      </div></td>
                    </tr>
                  );
                })}</tbody>
              </table>
            )}
          </div>
        </div>}

        {/* ── RESEARCH ── */}
        {tab==='research'&&<ResearchTab prices={prices} vix={vix} earnings={earnings} news={news} loading={researchLoading} trades={trades} onRefresh={fetchResearch} apiKey={apiKey} ivRankData={ivRankData} riskFreeRate={riskFreeRate}/>}

        {/* ── ANALYTICS ── */}
        {tab==='analytics'&&<AnalyticsTab trades={trades}/>}

        {/* ── LEARN ── */}
        {tab==='learn'&&<EducationTab/>}
      </div>

      {/* ── MODALS ── */}
      {showAdd&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}><div className="modal"><div className="modal-title">📋 Add New Trade</div><TradeForm onSave={upsert} onCancel={()=>setShowAdd(false)}/></div></div>}
      {editTrade&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setEditTrade(null)}><div className="modal"><div className="modal-title">✏️ Edit Trade</div><TradeForm initial={editTrade} onSave={upsert} onCancel={()=>setEditTrade(null)}/></div></div>}
      {closeTrade&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setCloseTrade(null)}><div className="modal"><div className="modal-title">🔒 Close Trade</div><CloseModal trade={closeTrade} onClose={(p,d)=>closeTradeFn(closeTrade,p,d)} onCancel={()=>setCloseTrade(null)}/></div></div>}
      {payoffTrade&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setPayoffTrade(null)}><div className="modal modal-wide"><div className="modal-title">📈 Payoff Diagram — {payoffTrade.ticker} {payoffTrade.optionType} ${payoffTrade.strike}</div><PayoffDiagram trade={payoffTrade} stockPrice={prices[payoffTrade.ticker.toUpperCase()]?.price} onClose={()=>setPayoffTrade(null)}/></div></div>}
      {showSettings&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowSettings(false)}><div className="modal"><div className="modal-title">⚙ Settings</div><SettingsModal apiKey={apiKey} claudeKey={claudeKey} onSave={saveKey} onCancel={()=>setShowSettings(false)} onImportCSV={importCSV} onImportJSON={importJSON} onClearSamples={clearSamples} trades={trades}/></div></div>}
      {advisorTrade&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setAdvisorTrade(null)}><div className="modal"><div className="modal-title">🤔 Should You Close This?</div><CloseAdvisorModal trade={advisorTrade} prices={prices} onClose={()=>setAdvisorTrade(null)}/></div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
