const genId = () => Math.random().toString(36).substr(2, 9);
const daysSince = (dateStr) => {
  if (!dateStr) return 999;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / 86400000);
};
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '—';
const fmtCurrency = (n) => new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', maximumFractionDigits:0 }).format(n);
const freqDays = { weekly:7, biweekly:14, monthly:30, quarterly:90 };

function getStatus(lastContact, frequency) {
  const days = daysSince(lastContact);
  const goal = freqDays[frequency] || 30;
  if (days <= goal * 0.7) return 'green';
  if (days <= goal) return 'yellow';
  return 'red';
}

function getStatusLabel(s) {
  return s === 'green' ? 'On Track' : s === 'yellow' ? 'Due Soon' : 'Overdue';
}

// ── Avatar ──
function Avatar({ name, size = 'md' }) {
  const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const colors = ['bg-blue-600','bg-violet-600','bg-emerald-600','bg-amber-600','bg-rose-600','bg-cyan-600','bg-indigo-600','bg-teal-600'];
  const idx = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % colors.length;
  const sz = size === 'sm' ? 'w-8 h-8 text-xs' : size === 'lg' ? 'w-16 h-16 text-xl' : 'w-10 h-10 text-sm';
  return <div className={`${colors[idx]} ${sz} rounded-full flex items-center justify-center font-bold text-white flex-shrink-0`}>{initials}</div>;
}

// ── StatusDot ──
function StatusDot({ status, withLabel = false }) {
  const c = status === 'green' ? 'bg-emerald-400' : status === 'yellow' ? 'bg-amber-400' : 'bg-red-400';
  return (
    <span className="inline-flex items-center gap-1.5">
      <span className={`w-2.5 h-2.5 rounded-full ${c} ${status === 'red' ? 'pulse-dot' : ''}`}/>
      {withLabel && <span className="text-xs font-medium">{getStatusLabel(status)}</span>}
    </span>
  );
}

// ── Referral Chart ──
function ReferralChart({ realtors, dark }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const allRefs = realtors.flatMap(r => r.referrals.map(ref => ({ ...ref, realtorName: r.name })));
    const months = {};
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const key = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
      months[key] = { sent: 0, funded: 0 };
    }
    allRefs.forEach(r => {
      const d = new Date(r.date);
      const key = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
      if (months[key]) {
        months[key].sent++;
        if (r.status === 'funded') months[key].funded++;
      }
    });
    const labels = Object.keys(months);
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Referrals Received', data: labels.map(l => months[l].sent), backgroundColor: dark ? 'rgba(96,165,250,0.7)' : 'rgba(59,130,246,0.7)', borderRadius: 6, barPercentage: 0.6 },
          { label: 'Funded', data: labels.map(l => months[l].funded), backgroundColor: dark ? 'rgba(52,211,153,0.7)' : 'rgba(16,185,129,0.7)', borderRadius: 6, barPercentage: 0.6 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: dark ? '#9ca3af' : '#6b7280', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: dark ? '#6b7280' : '#9ca3af' }, grid: { display: false } },
          y: { ticks: { color: dark ? '#6b7280' : '#9ca3af', stepSize: 1 }, grid: { color: dark ? 'rgba(55,65,81,0.3)' : 'rgba(209,213,219,0.5)' }, beginAtZero: true }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [realtors, dark]);

  return <canvas ref={canvasRef}/>;
}

function App() {
  const [dark, setDark] = useState(true);
  const [view, setView] = useState('queue'); // queue, dashboard, realtors, detail, data
  const [realtors, setRealtors] = useState(() => {
    try { const d = localStorage.getItem('referralhub_data'); return d ? JSON.parse(d) : SAMPLE_REALTORS; }
    catch { return SAMPLE_REALTORS; }
  });
  const [selectedId, setSelectedId] = useState(null);
  const [search, setSearch] = useState('');
  const [filterTag, setFilterTag] = useState('All');
  const [filterStatus, setFilterStatus] = useState('All');
  const [showForm, setShowForm] = useState(false);
  const [editRealtor, setEditRealtor] = useState(null);
  const [showLogContact, setShowLogContact] = useState(null);
  const [showAddReferral, setShowAddReferral] = useState(null);
  const [showAddNurture, setShowAddNurture] = useState(null);
  const [mobileMenu, setMobileMenu] = useState(false);

  useEffect(() => { localStorage.setItem('referralhub_data', JSON.stringify(realtors)); }, [realtors]);
  useEffect(() => { document.body.className = dark ? 'dark bg-gray-950 text-gray-100' : 'light bg-gray-50 text-gray-900'; }, [dark]);

  const updateRealtor = (id, fn) => setRealtors(rs => rs.map(r => r.id === id ? fn(r) : r));
  const selected = realtors.find(r => r.id === selectedId);

  const withStatus = useMemo(() => realtors.map(r => ({ ...r, status: getStatus(r.lastContact, r.frequency), daysSince: daysSince(r.lastContact) })), [realtors]);
  const overdue = useMemo(() => withStatus.filter(r => r.status === 'red').sort((a, b) => b.daysSince - a.daysSince), [withStatus]);
  const dueSoon = useMemo(() => withStatus.filter(r => r.status === 'yellow').sort((a, b) => b.daysSince - a.daysSince), [withStatus]);
  const onTrack = useMemo(() => withStatus.filter(r => r.status === 'green'), [withStatus]);

  const followUpQueue = useMemo(() => {
    const topProducerIds = new Set(realtors.filter(r => r.tags.includes('Top Producer')).map(r => r.id));
    return [...overdue, ...dueSoon].sort((a, b) => {
      if (a.status === 'red' && b.status !== 'red') return -1;
      if (b.status === 'red' && a.status !== 'red') return 1;
      if (topProducerIds.has(a.id) && !topProducerIds.has(b.id)) return -1;
      if (topProducerIds.has(b.id) && !topProducerIds.has(a.id)) return 1;
      return b.daysSince - a.daysSince;
    });
  }, [overdue, dueSoon, realtors]);

  const topByReferrals = useMemo(() =>
    [...withStatus].sort((a, b) => b.referrals.filter(r => r.status === 'funded').length - a.referrals.filter(r => r.status === 'funded').length).slice(0, 10)
  , [withStatus]);

  const healthScore = useMemo(() => {
    if (!withStatus.length) return 0;
    return Math.round((onTrack.length / withStatus.length) * 100);
  }, [withStatus, onTrack]);

  const totalRevenue = useMemo(() =>
    realtors.reduce((sum, r) => sum + r.referrals.filter(ref => ref.status === 'funded').reduce((s, ref) => s + (ref.loanAmount * 0.01), 0), 0)
  , [realtors]);

  const filtered = useMemo(() => {
    return withStatus.filter(r => {
      if (search && !r.name.toLowerCase().includes(search.toLowerCase()) && !r.company.toLowerCase().includes(search.toLowerCase())) return false;
      if (filterTag !== 'All' && !r.tags.includes(filterTag)) return false;
      if (filterStatus !== 'All' && r.status !== filterStatus) return false;
      return true;
    });
  }, [withStatus, search, filterTag, filterStatus]);

  const todayTip = TALKING_POINTS[new Date().getDay() % TALKING_POINTS.length];

  // ── Handlers ──
  const quickLog = (id, type) => {
    updateRealtor(id, r => ({
      ...r,
      lastContact: today,
      contactHistory: [{ date: today, type, notes: '' }, ...r.contactHistory]
    }));
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(realtors, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'referralhub-export.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImportJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { try { setRealtors(JSON.parse(ev.target.result)); } catch { alert('Invalid JSON'); } };
    reader.readAsText(file);
  };

  const handleImportCSV = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split('\n').filter(l => l.trim());
      if (lines.length < 2) return;
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());

          id: genId(), name: obj.name || '', company: obj.company || obj.brokerage || '', email: obj.email || '',

          frequency: obj.frequency || 'monthly', lastContact: obj.lastcontact || today,
          contactHistory: [], referrals: [], nurture: [], receivesMarketUpdate: false, partnerSince: today,
        };
      });

    };
    reader.readAsText(file);

      {sub && <div className="text-xs text-gray-400 mt-1">{sub}</div>}

        {/* Overlay for mobile menu */}
        {mobileMenu && <div className="fixed inset-0 z-30 bg-black/50 lg:hidden" onClick={() => setMobileMenu(false)}/>}

        {/* Main */}
        <main className="flex-1 overflow-y-auto">
          <div className="lg:hidden sticky top-0 z-20 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center gap-3">
            <button onClick={() => setMobileMenu(!mobileMenu)} className="text-gray-500">{Icons.menu}</button>
            <span className="font-bold text-brand-500">ReferralHub</span>
          </div>
          <div className="p-4 md:p-8 max-w-6xl mx-auto">
            {view === 'queue' && renderQueue()}
            {view === 'dashboard' && renderDashboard()}
            {view === 'realtors' && renderRealtors()}
            {view === 'detail' && renderDetail()}
            {view === 'data' && renderData()}
          </div>
        </main>
      </div>

      {/* Modals */}
      <RealtorForm open={showForm} onClose={() => { setShowForm(false); setEditRealtor(null); }} onSave={(r) => { if (editRealtor) { setRealtors(rs => rs.map(x => x.id === r.id ? { ...x, ...r } : x)); } else { setRealtors(rs => [...rs, r]); } }} realtor={editRealtor} />
      <LogContactModal open={!!showLogContact} onClose={() => setShowLogContact(null)} realtorName={showLogContact?.name || ''} onSave={(entry) => { updateRealtor(showLogContact.id, r => ({ ...r, lastContact: today, contactHistory: [entry, ...r.contactHistory] })); }} />
      <AddReferralModal open={!!showAddReferral} onClose={() => setShowAddReferral(null)} onSave={(ref) => { updateRealtor(showAddReferral.id, r => ({ ...r, referrals: [ref, ...r.referrals] })); }} />
      <AddNurtureModal open={!!showAddNurture} onClose={() => setShowAddNurture(null)} onSave={(n) => { updateRealtor(showAddNurture.id, r => ({ ...r, nurture: [n, ...r.nurture] })); }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
