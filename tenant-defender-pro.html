            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label" htmlFor="signup-stabilized">Rent Stabilized?</label>
                <select className="input-field" id="signup-stabilized" value={signupData.rentStabilized} onChange={e => setSignupData({...signupData, rentStabilized: e.target.value})}>
                  <option value="">Not sure</option>
                  <option value="yes">Yes</option>
                  <option value="no">No</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label" htmlFor="signup-building">Building Size</label>
                <select className="input-field" id="signup-building" value={signupData.buildingSize} onChange={e => setSignupData({...signupData, buildingSize: e.target.value})}>
                  <option value="">Select</option>
                  <option value="1-5">1–5 units</option>
                  <option value="6+">6+ units</option>
                  <option value="unknown">Not sure</option>
                </select>
              </div>
            </div>
            <button className="btn-cta" type="submit" style={{width: "100%", marginTop: 8}}>Start My Case Analysis <ArrowRight /></button>
          </form>
          <p style={{textAlign: "center", marginTop: 16, fontSize: 13, color: "var(--text-secondary)"}}>Your data stays private. We never share or sell it.</p>
          <DataProtection />
          <p style={{textAlign: "center", marginTop: 10, fontSize: 13}}>
            <a style={{color: "var(--text-secondary)", cursor: "pointer"}} onClick={() => setPage("landing")}>Back to home</a>
          </p>
        </div>
        <HelpButton page={page} />
      </div>
    );
  }

  /* ─── INTAKE PAGE (Light) ─── */
  if (page === "intake") {
    const currentFlow = selectedIssue && WIZARD_FLOWS[selectedIssue] ? WIZARD_FLOWS[selectedIssue] : [];
    const currentQ = currentFlow[wizardStep];
    const wizardTotal = currentFlow.length;
    const wizardComplete = wizardStep >= wizardTotal && wizardTotal > 0;

    const handleWizardSelect = (qId, value, isMulti) => {
      if (isMulti) {
        const prev = wizardAnswers[qId] || [];
        const updated = prev.includes(value) ? prev.filter(v => v !== value) : [...prev, value];
        setWizardAnswers({...wizardAnswers, [qId]: updated});
      } else {
        setWizardAnswers({...wizardAnswers, [qId]: value});
        // Auto-advance for single select after a brief pause
        setTimeout(() => setWizardStep(prev => prev + 1), 300);
      }
    };

    const handleWizardFinish = () => {
      const built = buildCaseDetailsFromAnswers(selectedIssue, wizardAnswers, currentFlow);
      setCaseDetails(built);
      setWizardMode(false);
    };

    // When issue changes, reset wizard
    const selectIssue = (issueId) => {
      setSelectedIssue(issueId);
      setSignupData({...signupData, issueType: issueId});
      setWizardStep(0);
      setWizardAnswers({});
      setWizardMode(true);
      setCaseDetails("");
    };

    return (
      <div className="page-enter" style={{minHeight: "100vh", padding: "80px 24px 60px", background: "var(--white)"}}>
        {overlays}
        <div className="container" style={{maxWidth: 900}}>
          <div style={{textAlign: "center", marginBottom: 40}} className="fade-up">
            <div style={{fontSize: 13, color: "var(--accent)", fontWeight: 700, marginBottom: 8, letterSpacing: "1.5px", textTransform: "uppercase"}}>Step 1 of 2</div>
            <h1 className="font-serif" style={{fontSize: 32, fontWeight: 800, marginBottom: 10, color: "var(--text)"}}>What's the situation?</h1>
            <p style={{color: "var(--text-secondary)", fontSize: 16, lineHeight: 1.6}}>Pick your issue and answer a few quick questions. We'll build your case from there.</p>
          </div>

          <div className="issue-grid">
            {NY_LAW.commonIssues.map((issue, i) => (
              <div key={issue.id} className={`card issue-card ${selectedIssue === issue.id ? "selected" : ""}`} onClick={() => selectIssue(issue.id)} role="button" tabIndex="0" aria-pressed={selectedIssue === issue.id} onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectIssue(issue.id); }}}>
                <div className="issue-icon">{issue.icon}</div>
                <div className="issue-title">{issue.title}</div>
                <div className="issue-desc">{issue.desc}</div>
                {selectedIssue === issue.id && (
                  <div style={{position: "absolute", top: 12, right: 12, color: "var(--accent)"}}><CheckIcon /></div>
                )}
              </div>
            ))}
          </div>

          {selectedIssue && wizardMode && !wizardComplete && currentQ && (
            <div className="fade-up" style={{marginTop: 32}}>
              <div className="card" style={{padding: 28}}>
                {/* Progress dots */}
                <div style={{display: "flex", gap: 6, marginBottom: 20, justifyContent: "center"}}>
                  {currentFlow.map((_, i) => (
                    <div key={i} style={{width: 8, height: 8, borderRadius: "50%", background: i < wizardStep ? "var(--accent)" : i === wizardStep ? "var(--accent)" : "var(--border)", opacity: i === wizardStep ? 1 : i < wizardStep ? 0.5 : 0.3, transition: "all 0.3s"}}></div>
                  ))}
                </div>
                <h3 style={{fontSize: 18, fontWeight: 700, marginBottom: 6, color: "var(--text)"}}>{currentQ.q}</h3>
                {currentQ.hint && <p style={{color: "var(--text-secondary)", fontSize: 14, marginBottom: 16}}>{currentQ.hint}</p>}
                <div style={{display: "flex", flexDirection: "column", gap: 8}}>
                  {currentQ.options.map((opt, i) => {
                    const isSelected = currentQ.type === "multi"
                      ? (wizardAnswers[currentQ.id] || []).includes(opt)
                      : wizardAnswers[currentQ.id] === opt;
                    return (
                      <div key={i} onClick={() => handleWizardSelect(currentQ.id, opt, currentQ.type === "multi")} role="button" tabIndex="0" onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleWizardSelect(currentQ.id, opt, currentQ.type === "multi"); }}}
                        style={{padding: "12px 16px", borderRadius: 8, border: isSelected ? "2px solid var(--accent)" : "1px solid var(--border)", background: isSelected ? "var(--accent-subtle)" : "var(--surface)", cursor: "pointer", fontSize: 15, color: "var(--text)", fontWeight: isSelected ? 600 : 400, transition: "all 0.2s", display: "flex", alignItems: "center", gap: 10}}>
                        {currentQ.type === "multi" && (
                          <div style={{width: 18, height: 18, borderRadius: 4, border: isSelected ? "2px solid var(--accent)" : "1.5px solid var(--gray-300)", background: isSelected ? "var(--accent)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0}}>
                            {isSelected && <CheckIcon />}
                          </div>
                        )}
                        {opt}
                      </div>
                    );
                  })}
                </div>
                <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 20}}>
                  <button style={{background: "none", border: "none", color: "var(--text-secondary)", cursor: "pointer", fontSize: 14, fontFamily: "inherit", padding: "8px 0"}} onClick={() => wizardStep > 0 ? setWizardStep(wizardStep - 1) : null} disabled={wizardStep === 0}>
                    {wizardStep > 0 ? "← Back" : ""}
                  </button>
                  {currentQ.type === "multi" && (
                    <button className="btn-primary" style={{padding: "10px 24px", fontSize: 14}} onClick={() => setWizardStep(wizardStep + 1)} disabled={!(wizardAnswers[currentQ.id] || []).length}>
                      Next →
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}

          {selectedIssue && wizardMode && wizardComplete && (
            <div className="fade-up" style={{marginTop: 32}}>
              <div className="card" style={{padding: 28, textAlign: "center"}}>
                <div style={{fontSize: 40, marginBottom: 12}}>✅</div>
                <h3 style={{fontSize: 18, fontWeight: 700, marginBottom: 8, color: "var(--text)"}}>Got it. We have what we need.</h3>
                <p style={{color: "var(--text-secondary)", fontSize: 15, marginBottom: 20, lineHeight: 1.6}}>Based on your answers, we've built your case summary. You can edit it below or launch the analysis directly.</p>
                <button className="btn-cta" style={{padding: "14px 32px", fontSize: 16}} onClick={() => { handleWizardFinish(); }}>
                  Review & Launch <ArrowRight />
                </button>
              </div>
            </div>
          )}

          {selectedIssue === "lease_review" && !wizardMode && (
            <div className="fade-up" style={{marginTop: 24}}>
              <div className="card" style={{padding: 28}}>
                <h3 style={{fontSize: 17, fontWeight: 700, color: "var(--text)", marginBottom: 8}}>📎 Upload Your Lease (Optional)</h3>
                <p style={{color: "var(--text-secondary)", fontSize: 14, marginBottom: 16, lineHeight: 1.6}}>Upload a copy of your lease and we'll analyze it for problematic clauses, illegal terms, and red flags under NY law. Supports PDF, JPG, and PNG.</p>
                <label style={{display: "flex", alignItems: "center", justifyContent: "center", padding: "20px 16px", borderRadius: 10, border: leaseFile ? "2px solid var(--green)" : "2px dashed var(--border)", background: leaseFile ? "rgba(22,163,74,0.05)" : "var(--surface)", cursor: "pointer", transition: "all 0.2s"}}>
                  <input type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display: "none"}} onChange={e => {
                    const file = e.target.files[0];
                    if (file) {
                      setLeaseFileName(file.name);
                      const reader = new FileReader();
                      reader.onload = (ev) => setLeaseFile(ev.target.result);
                      reader.readAsDataURL(file);
                    }
                  }} />
                  {leaseFile ? (
                    <span style={{color: "var(--green)", fontWeight: 600, fontSize: 15}}>✅ {leaseFileName} — uploaded</span>
                  ) : (
                    <span style={{color: "var(--text-secondary)", fontSize: 15}}>📄 Click to upload your lease</span>
                  )}
                </label>
                {leaseFile && (
                  <button style={{display: "block", margin: "10px auto 0", background: "none", border: "none", color: "var(--red)", fontSize: 13, cursor: "pointer", fontFamily: "inherit"}} onClick={() => { setLeaseFile(null); setLeaseFileName(""); }}>Remove file</button>
                )}
              </div>
            </div>
          )}

          {selectedIssue && !wizardMode && (
            <div className="fade-up" style={{marginTop: 32}}>
              <div className="card" style={{padding: 28}}>
                <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12}}>
                  <h3 style={{fontSize: 17, fontWeight: 700, color: "var(--text)"}}>Your case summary</h3>
                  <a style={{color: "var(--accent)", cursor: "pointer", fontSize: 13, fontWeight: 600}} onClick={() => { setWizardMode(true); setWizardStep(0); }}>Redo questions</a>
                </div>
                <p style={{color: "var(--text-secondary)", fontSize: 14, marginBottom: 14, lineHeight: 1.6}}>We built this from your answers. Edit anything you'd like, or add more detail.</p>
                <textarea className="input-field" placeholder="Your case details..." value={caseDetails} onChange={e => setCaseDetails(e.target.value)} style={{minHeight: 140}} />
                <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16}}>
                  <span style={{fontSize: 13, color: "var(--text-secondary)"}}>{caseDetails.length} characters</span>
                  <button className="btn-cta" style={{padding: "12px 28px", fontSize: 15}} onClick={startAnalysis} disabled={!caseDetails.trim() || caseDetails.length < 20}>Launch Analysis <ArrowRight /></button>
                </div>
              </div>
            </div>
          )}

          <div className="disclaimer-feature" style={{marginTop: 24}}>
            <strong>Your privacy matters:</strong> Case details are analyzed in real time and never stored on our servers. We don't share your data with third parties.
          </div>
          <DataProtection />
          <div style={{textAlign: "center", marginTop: 20}}>
            <a style={{color: "var(--text-secondary)", cursor: "pointer", fontSize: 14}} onClick={() => setPage("signup")}>Back to account info</a>
          </div>
        </div>
        <HelpButton page={page} />
      </div>
    );
  }

  /* ─── ANALYSIS PAGE (Dark — this is the product) ─── */
  if (page === "analysis") {
    const progressPercent = showVerdict ? 100 : agentMessages.length * 20 + (currentAgent ? 10 : 0);
    const issueInfo = NY_LAW.commonIssues.find(i => i.id === selectedIssue);

    return (
      <div className="page-enter" style={{minHeight: "100vh", padding: "40px 24px 60px", background: "var(--navy)", color: "white"}}>
        {overlays}
        <div className="container" style={{maxWidth: 900}}>
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20}}>
            <div>
              <div style={{display: "flex", alignItems: "center", gap: 10, marginBottom: 6}}>
                <span style={{fontSize: 22}}>{issueInfo ? issueInfo.icon : "📋"}</span>
                <h2 style={{fontSize: 22, fontWeight: 700}}>Case Analysis: {issueInfo ? issueInfo.title : "Legal Issue"}</h2>
              </div>
              <p style={{color: "rgba(255,255,255,0.4)", fontSize: 14}}>New York State — {signupData.borough}</p>
            </div>
            {!isProcessing && showVerdict && (
              <button className="btn-secondary-dark" style={{padding: "8px 16px", fontSize: 13, background: "transparent", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.6)", borderRadius: 6, cursor: "pointer"}} onClick={() => { setPage("intake"); setAgentMessages([]); setVerdict(null); setShowVerdict(false); setCurrentRound(0); setSelectedIssue(null); setCaseDetails(""); setWizardStep(0); setWizardAnswers({}); setWizardMode(true); }}>New Analysis</button>
            )}
          </div>

          {/* Win Meter */}
          <WinMeter score={winScore} isAnimating={isProcessing} label={winLabel} />

          {/* Progress */}
          <div style={{background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "12px 20px", marginBottom: 20}}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6}}>
              <span style={{fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.6)"}}>
                {showVerdict ? "Analysis Complete — Your Report is Ready" : isProcessing ? "AI Agents Are Debating Your Case..." : "Assembling Your Legal Team..."}
              </span>
              <span style={{fontSize: 13, color: "rgba(255,255,255,0.3)"}}>{Math.round(progressPercent)}%</span>
            </div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width: `${progressPercent}%`, background: showVerdict ? "var(--green-light)" : "var(--accent)"}}></div>
            </div>
          </div>

          <div className="chat-area" ref={chatRef} role="log" aria-label="Case analysis messages" aria-live="polite">
            {agentMessages.length === 0 && !currentAgent && (
              <div style={{textAlign: "center", padding: "48px 20px"}}>
                <div className="agent-loading-shimmer" style={{maxWidth: 400, margin: "0 auto 16px", height: 60}}></div>
                <div className="agent-loading-shimmer" style={{maxWidth: 320, margin: "0 auto 24px", height: 40}}></div>
                <div className="agent-prepare-text">Assembling your legal team...</div>
              </div>
            )}
            {agentMessages.length === 0 && currentAgent && !agentMessages.find(m => m.agent === currentAgent) && (
              <div style={{textAlign: "center", padding: "24px 20px"}}>
                <div className="agent-loading-shimmer" style={{maxWidth: 500, margin: "0 auto 12px", height: 80}}></div>
                <div className="agent-prepare-text">
                  {currentAgent === "defense" ? "Your Defense Counsel is reviewing NY statutes..." : currentAgent === "opposing" ? "Opposing Counsel is preparing counter-arguments..." : "The Judge is weighing both sides..."}
                </div>
              </div>
            )}
            {agentMessages.map((msg, i) => {
              const showRound1 = i === 0;
              const showRound2 = i === 2 && agentMessages.length > 2;

              return (
                <React.Fragment key={i}>
                  {showRound1 && (
                    <div className="round-indicator"><div className="round-badge">Round 1 — Opening Arguments</div></div>
                  )}
                  {showRound2 && (
                    <div className="round-indicator"><div className="round-badge">Round 2 — Rebuttals</div></div>
                  )}
                  <div className={`agent-card agent-${msg.agent} slide-in-up`} style={{animationDelay: `${i * 0.1}s`}}>
                    <div className={`agent-badge badge-${msg.agent}`}>
                      {msg.agent === "defense" && "Your Defense Counsel"}
                      {msg.agent === "opposing" && "Opposing Counsel"}
                      {msg.agent === "judge" && "The Judge"}
                    </div>
                    {i === agentMessages.length - 1 ? (
                      <StreamingText text={msg.content} speed={6} />
                    ) : (
                      <div className="agent-text" dangerouslySetInnerHTML={{__html: msg.content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>')}} />
                    )}
                  </div>
                </React.Fragment>
              );
            })}

            {currentAgent && (
              <div className={`agent-card agent-${currentAgent} fade-in`}>
                <div className={`agent-badge badge-${currentAgent}`}>
                  {currentAgent === "defense" && "Your Defense Counsel"}
                  {currentAgent === "opposing" && "Opposing Counsel"}
                  {currentAgent === "judge" && "The Judge"}
                </div>
                <div className="typing-dots">
                  <span style={{background: currentAgent === "defense" ? "#22c55e" : currentAgent === "opposing" ? "#f87171" : "#a78bfa"}}></span>
                  <span style={{background: currentAgent === "defense" ? "#22c55e" : currentAgent === "opposing" ? "#f87171" : "#a78bfa"}}></span>
                  <span style={{background: currentAgent === "defense" ? "#22c55e" : currentAgent === "opposing" ? "#f87171" : "#a78bfa"}}></span>
                </div>
              </div>
            )}

            {showVerdict && verdict && (
              <div className="slide-in-up">
                <div className="round-indicator"><div className="round-badge">Final Assessment</div></div>
                <div className="verdict-screenshot verdict-card-dramatic">
                  <div className="verdict-branding">
                    <ShieldIcon size={20} />
                    <div className="verdict-branding-text">TenantShield AI — Case Analysis</div>
                    <div style={{marginLeft: "auto", fontSize: 12, color: "rgba(255,255,255,0.3)"}}>{signupData.borough}, NY</div>
                  </div>
                  <div className="verdict-score-hero score-reveal">
                    <div className="verdict-score-number" style={{color: verdict.score >= 80 ? "#22c55e" : verdict.score >= 60 ? "#fbbf24" : "#f87171"}}>
                      {verdict.score}
                    </div>
                    <div className="verdict-score-label-big" style={{color: verdict.score >= 80 ? "#22c55e" : verdict.score >= 60 ? "#fbbf24" : "#f87171"}}>
                      {verdict.score >= 80 ? 'Strong Case' : verdict.score >= 60 ? 'Decent Case' : 'Tough but Possible'}
                    </div>
                    <div className="verdict-score-sublabel">out of 100 — based on NY housing law analysis</div>
                  </div>

                  <div className="verdict-title">Judicial Assessment</div>
                  <div className="agent-text" dangerouslySetInnerHTML={{__html: verdict.summary.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>')}} />
                  <div style={{marginTop: 24, display: "flex", gap: 10, flexWrap: "wrap"}}>
                    <button className="btn-cta" style={{padding: "12px 22px", fontSize: 14}} onClick={generateDemandLetter}>Generate Demand Letter</button>
                    <button style={{padding: "12px 22px", fontSize: 14, background: "transparent", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.6)", borderRadius: 6, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, minHeight: 48}} onClick={downloadFullReport}>Download Full Report</button>
                    <button style={{padding: "12px 22px", fontSize: 14, background: "transparent", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.6)", borderRadius: 6, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, minHeight: 48}} onClick={findTenantLawyer}>Find a Tenant Lawyer</button>
                  </div>
                </div>

                <div className="timeline-section">
                  <div className="timeline-title">Your Action Plan</div>
                  <div className="timeline">
                    <TimelineStep stepNumber="1" title="Send Your Demand Letter" timeframe="Today" detail="Click 'Generate Demand Letter' above to create one pre-filled with your case details. Print it, sign it, and send via certified mail (keep the receipt). This puts your landlord on legal notice and starts the clock." />
                    <TimelineStep stepNumber="2" title="Call 311 and File a Complaint" timeframe="This Week" detail="Dial 311 or go to nyc.gov/311 to file an HPD complaint. An inspector will visit to document the conditions. This creates an official government record — your landlord can't claim they didn't know." />
                    <TimelineStep stepNumber="3" title="Take It to Housing Court" timeframe="If No Response in 14 Days" detail="If your landlord ignores the demand letter, file an HP Action in Housing Court. You do NOT need a lawyer — the court has a free Help Center. Bring your demand letter receipt, 311 complaint number, photos, and this report." />
                  </div>
                </div>

                <div className="share-result-card">
                  <div className="share-result-header">Share Your Result</div>
                  <div className="share-result-sub">Help a friend or neighbor who might be in a similar situation.</div>
                  <div className="share-result-preview">
                    <div className="share-result-preview-text">
                      <strong style={{color: "white"}}>TenantShield AI scored my {issueInfo?.title?.toLowerCase() || "tenant"} case at {verdict.score}/100.</strong> Three AI legal agents analyzed my rights under NY law. It's free — you should try it.
                    </div>
                  </div>
                  <div className="share-buttons" style={{justifyContent: "flex-start"}}>
                    <button className="share-button" onClick={handleShareCopy}>{shareCopied ? "Link Copied!" : "Copy Link"}</button>
                    <button className="share-button" onClick={handleShareText}>Text a Friend</button>
                    <button className="share-button" onClick={handleShareEmail}>Email It</button>
                  </div>
                </div>

                <DataProtection dark={true} />
              </div>
            )}
          </div>

          <div className="disclaimer-feature disclaimer-feature-dark" style={{marginTop: 20}}>
            <strong>Transparency commitment:</strong> This analysis cites NY housing law as of 2026. For immediate safety emergencies, call 911. For urgent legal help, contact Legal Aid at (212) 577-3300 or 311 for housing complaints. We always recommend verifying specifics with a licensed attorney.
          </div>
        </div>

        {!isProcessing && showVerdict && (
          <div className="sticky-status-bar">
            <div className="pulse-dot"></div>
            <div className="status-text">Analysis Complete</div>
            <div className="status-progress"><div className="status-progress-fill"></div></div>
          </div>
        )}
        {isProcessing && (
          <div className="sticky-status-bar">
            <div className="pulse-dot"></div>
            <div className="status-text">Agents Deliberating...</div>
            <div className="status-progress"><div className="status-progress-fill"></div></div>
          </div>
        )}

        <HelpButton page={page} isProcessing={isProcessing} showVerdict={showVerdict} />
      </div>
    );
  }

  return null;
}

/* ─── Wrapper that renders App + Paywall overlays ─── */
function AppWithPaywall() {
  return (
    <>
      <App />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
