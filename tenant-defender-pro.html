<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0a1628;
    --navy-light: #0f1d32;
    --navy-mid: #162544;
    --navy-deep: #060f1d;
    --accent: #C87533;
    --accent-hover: #a8612a;
    --accent-subtle: rgba(200,117,51,0.08);
    --green: #16a34a;
    --green-light: #22c55e;
    --red: #dc2626;
    --red-light: #f87171;
    --purple: #7c3aed;
    --purple-light: #a78bfa;
    /* Warm neutrals — tinted toward brand, never pure white/black */
    --surface: #faf7f4;
    --surface-raised: #f5f0eb;
    --surface-inset: #efe8e0;
    --border: #e0d6cc;
    --border-subtle: #ebe3da;
    --white: #faf7f4;
    --gray-50: #f5f0eb;
    --gray-100: #efe8e0;
    --gray-200: #e0d6cc;
    --gray-300: #cec2b5;
    --gray-500: #8a7e72;
    --gray-600: #6b5f53;
    --gray-700: #4a3f35;
    --gray-800: #2d2419;
    --gray-900: #1a1208;
    --text: #2d2419;
    --text-secondary: #6b5f53;
    /* Easing — Emil Kowalski's strong curves */
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif; background: var(--surface); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

  /* Minimal animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .fade-up { animation: fadeUp 0.5s ease-out forwards; }
  .fade-in { animation: fadeIn 0.3s ease-out forwards; }

  /* Buttons */
  .btn-primary { background: var(--accent); color: #faf7f4; border: none; padding: 14px 32px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 200ms var(--ease-out), transform 150ms var(--ease-out); font-family: inherit; min-height: 48px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); padding: 14px 32px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: border-color 200ms var(--ease-out), color 200ms var(--ease-out), transform 150ms var(--ease-out); font-family: inherit; min-height: 48px; display: inline-flex; align-items: center; justify-content: center; }
  .btn-secondary:hover { border-color: var(--gray-500); color: var(--text); }
  .btn-secondary:active { transform: scale(0.97); }

  /* Dark variant buttons for dark sections */
  .dark .btn-secondary, .btn-secondary-dark { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.2); }
  .dark .btn-secondary:hover, .btn-secondary-dark:hover { color: white; border-color: rgba(255,255,255,0.4); }

  .btn-cta { background: var(--accent); color: #faf7f4; border: none; padding: 18px 40px; border-radius: 8px; font-size: 17px; font-weight: 700; cursor: pointer; transition: background 200ms var(--ease-out), transform 150ms var(--ease-out), box-shadow 200ms var(--ease-out); font-family: inherit; min-height: 48px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 1px 3px rgba(45,36,25,0.12); }
  .btn-cta:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,36,25,0.15); }
  .btn-cta:active { transform: scale(0.97); box-shadow: 0 1px 2px rgba(45,36,25,0.1); }
  .btn-cta:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .card:focus-visible, .issue-card:focus-visible, .wizard-option:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Skip to content link for screen readers */

  .skip-link:focus { top: 0; }

  /* Input — light theme */
  .input-field { background: var(--surface-inset); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; color: var(--text); font-size: 16px; width: 100%; font-family: inherit; transition: border-color 200ms var(--ease-out), box-shadow 200ms var(--ease-out); min-height: 48px; }

  select.input-field { appearance: auto; }

  /* Dark input variant for analysis page */
  .input-dark { background: var(--navy-light); border-color: rgba(255,255,255,0.1); color: #e2e8f0; }
  .input-dark:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,117,51,0.15); }
  .input-dark::placeholder { color: rgba(255,255,255,0.4); }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 96px 0 112px; }
  .section-label { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }

  .section-subtitle { color: var(--text-secondary); font-size: 17px; line-height: 1.6; max-width: 520px; }

  /* Cards — warm, subtle elevation */
  .card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 10px; box-shadow: 0 1px 3px rgba(45,36,25,0.06), 0 1px 2px rgba(45,36,25,0.04); transition: box-shadow 300ms var(--ease-out), border-color 300ms var(--ease-out), transform 300ms var(--ease-out); }
  .card:hover { box-shadow: 0 8px 24px rgba(45,36,25,0.1), 0 2px 6px rgba(45,36,25,0.06); border-color: var(--border); transform: translateY(-2px); }

  /* Agent cards — dark themed, keep for product section */
  .agent-card { border-radius: 10px; padding: 28px; margin-bottom: 16px; overflow: hidden; word-wrap: break-word; transition: border-color 250ms var(--ease-out), box-shadow 250ms var(--ease-out); }
  .agent-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .agent-defense { background: rgba(22,163,74,0.08); border: 1px solid rgba(22,163,74,0.25); }
  .agent-defense:hover { border-color: rgba(22,163,74,0.5); }
  .agent-opposing { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); }
  .agent-opposing:hover { border-color: rgba(220,38,38,0.5); }
  .agent-judge { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.25); }
  .agent-judge:hover { border-color: rgba(124,58,237,0.5); }

  .agent-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 700; margin-bottom: 14px; letter-spacing: 0.02em; }
  .badge-defense { background: rgba(22,163,74,0.18); color: #4ade80; }
  .badge-opposing { background: rgba(220,38,38,0.18); color: #fca5a5; }
  .badge-judge { background: rgba(124,58,237,0.18); color: #c4b5fd; }

  .agent-text { color: rgba(255,255,255,0.82); line-height: 1.75; font-size: 15px; }
  .agent-text strong { color: #fff; font-weight: 700; }

  /* Typing indicator */
  .typing-dots { display: inline-flex; gap: 4px; padding: 8px 0; }
  .typing-dots span { width: 7px; height: 7px; border-radius: 50%; animation: pulse 1.4s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* Progress bar */
  .progress-bar { height: 6px; background: var(--navy-mid); border-radius: 3px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  /* Stat cards — left-aligned, not centered metric boxes */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 48px; }
  .stat-card { text-align: left; padding: 24px 20px; border-left: 2px solid var(--border); }
  .stat-number { font-family: 'Crimson Pro', Georgia, serif; font-size: 36px; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }
  .stat-label { color: var(--text-secondary); font-size: 13px; margin-top: 4px; line-height: 1.4; }

  /* Issue categories */
  .issue-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 24px; }
  .issue-card { padding: 24px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s; position: relative; }
  .issue-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(45,36,25,0.08); }

  /* Nav */
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 16px 0; transition: background 0.3s, padding 0.3s; }
  .nav.scrolled { background: rgba(10, 22, 40, 0.95); backdrop-filter: blur(12px); padding: 12px 0; }

  .nav-logo-ai { font-family: 'Source Sans 3', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,0.4); padding: 0; margin-left: 2px; }

  .nav-link:hover { color: rgba(255,255,255,0.9); }

  /* Hero — dark section, typography-driven */
  .hero { min-height: 100vh; display: flex; align-items: center; position: relative; padding-top: 80px; background: var(--navy); color: white; overflow: hidden; }
  .hero::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,117,51,0.2), transparent); }

  @media (max-width: 960px) {

  /* Features section — asymmetric grid */
  .features-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; gap: 20px; margin-top: 48px; }
  .features-grid .feature-card:first-child { grid-column: 1 / 3; grid-row: 1; display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: start; padding: 36px 32px; }

  .faq-list { max-width: 720px; margin: 40px auto 0; }
  .faq-item { border-bottom: 1px solid var(--border-subtle); }
  .faq-question { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; cursor: pointer; transition: color 200ms var(--ease-out); }
  .faq-question:hover { color: var(--accent); }
  .faq-question h3 { font-size: 16px; font-weight: 600; line-height: 1.4; flex: 1; padding-right: 16px; }
  .faq-chevron { flex-shrink: 0; transition: transform 0.3s; color: var(--gray-500); }
  .faq-chevron.open { transform: rotate(180deg); color: var(--accent); }
  .faq-answer { overflow: hidden; max-height: 0; transition: max-height 0.35s ease, padding 0.35s; padding: 0; }
  .faq-answer.open { max-height: 300px; padding: 0 0 20px 0; }
  .faq-answer p { color: var(--text-secondary); font-size: 15px; line-height: 1.7; }

  /* Disclaimer */
  .disclaimer { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 14px 18px; font-size: 13px; color: var(--gray-700); line-height: 1.6; margin-top: 24px; }
  .disclaimer strong { color: #92400e; }
  .disclaimer-dark { background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.15); color: rgba(255,255,255,0.6); }
  .disclaimer-dark strong { color: #fbbf24; }

  /* Chat area */
  .chat-area { max-height: 600px; overflow-y: auto; padding: 16px 0; }

  /* Round indicator */
  .round-indicator { text-align: center; padding: 12px; margin: 16px 0; }
  .round-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(200,117,51,0.1); border: 1px solid rgba(200,117,51,0.2); border-radius: 4px; padding: 6px 16px; font-size: 13px; color: var(--accent); font-weight: 600; }

  /* Final verdict */
  .verdict-card { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.25); border-radius: 12px; padding: 32px; margin-top: 24px; overflow: hidden; }
  .verdict-title { font-family: 'Crimson Pro', Georgia, serif; font-size: 22px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; color: white; letter-spacing: -0.01em; }

  /* Strength indicator */
  .strength-banner { padding: 24px; border-radius: 8px; margin-bottom: 24px; text-align: center; }
  .strength-banner.strong { background: rgba(22,163,74,0.1); border: 1px solid rgba(22,163,74,0.3); }
  .strength-banner.moderate { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
  .strength-banner.weak { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); }
  .strength-emoji { font-size: 40px; margin-bottom: 8px; }
  .strength-label { font-family: 'Crimson Pro', Georgia, serif; font-size: 24px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.01em; }
  .strength-label.strong { color: #22c55e; }
  .strength-label.moderate { color: #fbbf24; }
  .strength-label.weak { color: #f87171; }
  .strength-score { font-size: 14px; color: rgba(255,255,255,0.5); }

  /* Timeline */
  .timeline-section { margin-top: 40px; }
  .timeline-title { font-family: 'Crimson Pro', Georgia, serif; font-size: 22px; font-weight: 800; margin-bottom: 24px; color: white; letter-spacing: -0.01em; }
  .timeline { position: relative; padding-left: 32px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: rgba(200,117,51,0.3); }
  .timeline-step { margin-bottom: 20px; position: relative; }
  .timeline-dot { position: absolute; left: -29px; top: 8px; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid var(--navy); }
  .timeline-content { padding: 16px 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; transition: border-color 0.2s; cursor: pointer; }
  .timeline-content:hover { border-color: rgba(200,117,51,0.3); }
  .timeline-header { display: flex; justify-content: space-between; align-items: center; }
  .timeline-step-number { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: rgba(200,117,51,0.15); color: var(--accent); font-weight: 700; font-size: 13px; margin-right: 10px; }
  .timeline-step-title { font-weight: 600; font-size: 15px; flex-grow: 1; color: rgba(255,255,255,0.9); }
  .timeline-step-time { background: rgba(200,117,51,0.1); border: 1px solid rgba(200,117,51,0.2); border-radius: 4px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: var(--accent); margin-right: 10px; }
  .timeline-chevron { color: rgba(255,255,255,0.4); transition: transform 0.3s; }
  .timeline-chevron.open { transform: rotate(180deg); }
  .timeline-detail { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; display: none; margin-top: 12px; }
  .timeline-detail.show { display: block; }

  /* Help button */
  .help-button { position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: background 0.2s; }
  .help-button:hover { background: var(--accent-hover); }
  .help-panel { position: fixed; bottom: 80px; right: 24px; width: 320px; background: white; border: 1px solid var(--gray-200); border-radius: 8px; padding: 20px; z-index: 9999; max-height: 400px; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
  .help-header { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .help-content { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
  .help-suggestions { display: flex; flex-direction: column; gap: 8px; }
  .help-suggestion { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 6px; padding: 10px 12px; font-size: 13px; color: var(--text); cursor: pointer; transition: background 0.2s; }
  .help-suggestion:hover { background: var(--gray-100); }

  /* Share section — dark variant */
  .share-section { margin-top: 32px; padding: 28px; background: rgba(200,117,51,0.06); border: 1px solid rgba(200,117,51,0.2); border-radius: 8px; text-align: center; }
  .share-heading { font-family: 'Crimson Pro', Georgia, serif; font-size: 20px; font-weight: 800; margin-bottom: 8px; color: white; letter-spacing: -0.01em; }
  .share-subtext { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
  .share-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .share-button { background: rgba(200,117,51,0.1); border: 1px solid rgba(200,117,51,0.25); color: var(--accent); padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: inherit; }
  .share-button:hover { background: rgba(200,117,51,0.2); }

  /* Sticky status bar (mobile) */
  .sticky-status-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px; background: rgba(10, 22, 40, 0.95); border-top: 1px solid rgba(255,255,255,0.06); z-index: 500; display: flex; align-items: center; gap: 10px; }
  .sticky-status-bar .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
  .sticky-status-bar .status-text { flex-grow: 1; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); }
  .sticky-status-bar .status-progress { height: 3px; flex-shrink: 0; width: 80px; background: var(--navy-mid); border-radius: 2px; overflow: hidden; }
  .sticky-status-bar .status-progress-fill { height: 100%; background: var(--accent); width: 100%; }
  @media (min-width: 768px) { .sticky-status-bar { display: none; } }

  /* Signup card */
  .signup-card { max-width: 440px; margin: 0 auto; padding: 40px 36px; }
  .signup-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; color: var(--text); }
  .signup-card .subtitle { color: var(--text-secondary); text-align: center; margin-bottom: 28px; font-size: 15px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Footer — dark, clean */
  .footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 64px 0 32px; background: var(--navy-deep); color: white; }
  .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 48px; }
  .footer-brand-logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: white; }
  .footer-brand-logo span { color: var(--accent); }
  .footer-brand-desc { color: rgba(255,255,255,0.4); font-size: 14px; line-height: 1.6; max-width: 260px; }
  .footer-col-title { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
  .footer-links { display: flex; flex-direction: column; gap: 10px; }
  .footer-link { color: rgba(255,255,255,0.4); font-size: 14px; text-decoration: none; cursor: pointer; transition: color 0.2s; }
  .footer-link:hover { color: rgba(255,255,255,0.8); }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .footer-bottom-text { color: rgba(255,255,255,0.3); font-size: 13px; }
  .footer-bottom-links { display: flex; gap: 20px; }
  .footer-bottom-link { color: rgba(255,255,255,0.3); font-size: 13px; text-decoration: none; cursor: pointer; transition: color 0.2s; }
  .footer-bottom-link:hover { color: rgba(255,255,255,0.6); }

  /* Win Meter */
  .win-meter-container { margin-bottom: 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 16px 20px; }
  .win-meter-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .win-meter-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 8px; }
  .win-meter-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; transition: color 0.5s; }
  .win-meter-track { height: 8px; background: var(--navy-mid); border-radius: 4px; overflow: hidden; }
  .win-meter-fill { height: 100%; border-radius: 4px; transition: width 1s ease, background 0.5s; }
  .win-meter-zones { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: rgba(255,255,255,0.3); }

  /* Campaign section */
  .campaign-section { padding: 80px 0 100px; background: var(--navy); color: white; }
  .campaign-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 48px; }
  .campaign-card { border-radius: 8px; overflow: hidden; position: relative; min-height: 200px; display: flex; flex-direction: column; justify-content: flex-end; padding: 28px 24px; cursor: pointer; transition: border-color 250ms var(--ease-out); }
  .campaign-card:hover { border-color: rgba(200,117,51,0.5); }
  .campaign-card::before { display: none; }
  .campaign-card-1, .campaign-card-2, .campaign-card-3, .campaign-card-4 { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
  .campaign-card-content { position: relative; z-index: 2; }
  .campaign-card-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 20px; }
  .campaign-headline { font-family: 'Crimson Pro', Georgia, serif; font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; color: white; text-transform: none; letter-spacing: -0.01em; }
  .campaign-desc { color: rgba(255,255,255,0.45); font-size: 14px; line-height: 1.6; }
  .campaign-stat { font-family: 'Crimson Pro', Georgia, serif; font-size: 36px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
  @media (max-width: 960px) { .testimonial-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 900px) { .campaign-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .campaign-grid { grid-template-columns: 1fr; } .campaign-card { min-height: 260px; } }

  /* Pricing */
  .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 720px; overflow: visible; }
  .pricing-card { padding: 32px 28px; text-align: left; }
  .pricing-card.popular { border: 2px solid var(--accent); box-shadow: 0 8px 32px rgba(200,117,51,0.12); position: relative; overflow: visible; }
  .pricing-card.popular::before { content: 'Coming Soon'; position: absolute; top: -14px; left: 24px; background: var(--accent); color: #faf7f4; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; padding: 5px 14px; border-radius: 4px; text-transform: uppercase; z-index: 1; box-shadow: 0 2px 8px rgba(200,117,51,0.25); }

  /* ─── Mobile hamburger menu ─── */
  .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: white; z-index: 201; }
  .mobile-menu-btn svg { display: block; }
  .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(10,22,40,0.97); backdrop-filter: blur(16px); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
  .mobile-overlay.open { display: flex; }
  .mobile-overlay a { color: rgba(255,255,255,0.7); font-size: 20px; font-weight: 500; text-decoration: none; cursor: pointer; transition: color 200ms; }
  .mobile-overlay a:hover { color: white; }
  .mobile-overlay .btn-primary { margin-top: 16px; font-size: 18px; padding: 16px 40px; }
  .mobile-close-btn { position: absolute; top: 20px; right: 24px; background: none; border: none; color: white; cursor: pointer; padding: 8px; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .mobile-menu-btn { display: block; }
    .nav-links { display: none; }
    .features-grid { grid-template-columns: 1fr; }
    .features-grid .feature-card:first-child { grid-column: auto; grid-template-columns: 1fr; }
    .testimonial-grid { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .hero { min-height: auto; padding: 120px 0 64px; }
    .hero h1 { font-size: clamp(32px, 8vw, 52px); margin-bottom: 20px; }
    .hero p { font-size: 16px; margin-bottom: 32px; }
    .hero-badge { margin-bottom: 24px; }
    .hero-buttons { flex-direction: column; }
    .hero-buttons .btn-cta { width: 100%; justify-content: center; }
    .hero-buttons button { width: 100%; justify-content: center; }
    .hero-proof { gap: 12px; flex-direction: column; margin-top: 40px; padding-top: 24px; }
    .section { padding: 64px 0 72px; }
    .pricing-card.popular::before { top: -11px; left: 16px; }
    .section-title { font-size: clamp(24px, 6vw, 32px); }
    .section-subtitle { font-size: 15px; }
    .trust-logos { gap: 24px; }
    .trust-logo { font-size: 12px; }
    .footer-grid { grid-template-columns: 1fr 1fr; }
    .footer-brand { grid-column: 1 / -1; }
    .footer-bottom { flex-direction: column; text-align: center; gap: 12px; }
    .pricing-grid { grid-template-columns: 1fr; max-width: 100%; }
    .pricing-card { padding: 24px 20px; }
    .counter-number { font-size: 36px; }
    .container { padding: 0 20px; }
    .campaign-grid { grid-template-columns: 1fr; }
    .campaign-card { min-height: auto; padding: 24px 20px; }
    .campaign-stat { font-size: 28px; }
    .faq-list { margin: 24px auto 0; }
  }
  @media (max-width: 640px) {
    .issue-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .signup-card { padding: 24px 16px; }
    .share-buttons { flex-direction: column; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .stat-card { padding: 16px 14px; }
    .stat-number { font-size: 28px; }
    .feature-card { padding: 20px 16px; }
    .testimonial-card { padding: 20px 16px; }
    .agent-card { padding: 20px; }
  }
  @media (max-width: 480px) {
    .footer-grid { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 28px; }
    .hero-proof { gap: 10px; }
    .hero-proof-item { font-size: 12px; }
    .container { padding: 0 16px; }
    .btn-cta { font-size: 15px; padding: 14px 24px; }
    .btn-primary { font-size: 15px; padding: 12px 24px; }
  }

  .wizard-option { transition: all 0.2s var(--ease-out); }
  .wizard-option:hover { border-color: var(--accent) !important; background: var(--accent-subtle) !important; }
  .font-serif { font-family: 'Crimson Pro', Georgia, serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* ─── Page transitions ─── */
  @keyframes pageEnter { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes heroReveal { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInUp { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes verdictPulse { 0% { box-shadow: 0 0 0 0 rgba(124,58,237,0.3); } 70% { box-shadow: 0 0 0 16px rgba(124,58,237,0); } 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0); } }
  @keyframes scoreReveal { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes agentPrepare { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }

  .page-enter { animation: pageEnter 0.45s var(--ease-out) forwards; }
  .hero-reveal { animation: heroReveal 0.6s var(--ease-out) forwards; }
  .slide-in-up { animation: slideInUp 0.5s var(--ease-out) forwards; }
  .verdict-card-dramatic { animation: slideInUp 0.6s var(--ease-out) forwards, verdictPulse 2s ease 0.8s; }
  .score-reveal { animation: scoreReveal 0.8s var(--ease-out) forwards; animation-delay: 0.3s; opacity: 0; }
  .agent-loading-shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 2s infinite; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
  .agent-prepare-text { animation: agentPrepare 2s infinite; color: rgba(255,255,255,0.5); font-size: 14px; }

  /* Data protection expandable */
  .data-protection { background: rgba(22,163,74,0.06); border: 1px solid rgba(22,163,74,0.15); border-radius: 8px; margin-top: 12px; overflow: hidden; }
  .data-protection-toggle { display: flex; align-items: center; gap: 8px; padding: 14px 16px; cursor: pointer; font-size: 13px; font-weight: 600; color: #16a34a; transition: background 0.2s; min-height: 48px; }
  .data-protection-toggle:hover { background: rgba(22,163,74,0.08); }
  .data-protection-content { padding: 0 16px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
  .data-protection-dark { background: rgba(22,163,74,0.06); border-color: rgba(22,163,74,0.15); }
  .data-protection-dark .data-protection-toggle { color: #22c55e; }
  .data-protection-dark .data-protection-content { color: rgba(255,255,255,0.5); }

  /* Screenshot-worthy verdict */
  .verdict-screenshot { background: linear-gradient(135deg, rgba(124,58,237,0.12) 0%, rgba(200,117,51,0.08) 100%); border: 1px solid rgba(124,58,237,0.35); border-radius: 16px; padding: 36px; margin-top: 24px; position: relative; overflow: hidden; }
  .verdict-screenshot::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #7c3aed, #C87533, #22c55e); }
  .verdict-branding { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .verdict-branding-text { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); }
  .verdict-score-hero { text-align: center; margin-bottom: 24px; }
  .verdict-score-number { font-family: 'Crimson Pro', Georgia, serif; font-size: 72px; font-weight: 900; letter-spacing: -0.04em; line-height: 1; }
  .verdict-score-label-big { font-size: 18px; font-weight: 700; margin-top: 8px; }
  .verdict-score-sublabel { font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* Share result card */
  .share-result-card { background: rgba(200,117,51,0.08); border: 1px solid rgba(200,117,51,0.25); border-radius: 12px; padding: 28px; margin-top: 24px; }
  .share-result-header { font-size: 17px; font-weight: 700; color: white; margin-bottom: 4px; }
  .share-result-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
  .share-result-preview { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .share-result-preview-text { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; }

  /* Disclaimer as feature */
  .disclaimer-feature { background: linear-gradient(135deg, #fefce8 0%, #faf7f4 100%); border: 1px solid #fde68a; border-radius: 10px; padding: 18px 20px; font-size: 13px; color: var(--gray-700); line-height: 1.6; position: relative; }
  .disclaimer-feature::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #fbbf24, #C87533); border-radius: 10px 10px 0 0; }

function buildCaseDetailsFromAnswers(issueId, answers, flow) {

  flow.forEach(function(q) {
    const a = answers[q.id];
    if (a) {
      const val = Array.isArray(a) ? a.join(", ") : a;
      parts.push(q.q.replace("?", "") + ": " + val);
    }
  });
  return parts.join(". ") + ".";
}

function generateDefenseArgument(issue, details, round) {
  const responses = {
    repairs: {
      1: `**YOUR LANDLORD IS BREAKING THE LAW**\n\nHere's the deal: In New York, your landlord MUST keep your apartment livable. That's not optional — it's the law. (Real Property Law §235-b)\n\nThe problems you're dealing with? Your landlord has a legal duty to fix them. It doesn't matter what your lease says. It doesn't matter if the landlord says it's "not that bad." The law says your apartment must be safe and livable. Period.\n\nYour landlord also has to follow NYC housing code, which sets specific rules — like keeping heat at 68°F during the day and 62°F at night from October through May. (NYC Admin Code §27-2005)\n\n**WHAT THIS MEANS FOR YOU:**\n• You can file a complaint and force your landlord to make repairs through Housing Court\n• You may be owed money back on your rent for the time you've been dealing with this\n• Call 311 to get an inspector out — once violations are on record, your landlord can't ignore them`,
      2: `**LET'S SHUT DOWN THEIR ARGUMENTS**\n\nThe other side says you need written proof you complained. Here's the truth: NY law does NOT require you to complain in writing first. If your landlord or super knew about the problem — even from a verbal conversation — that counts. (Solow v. Wellner)\n\nThey also try to scare you about withholding rent. Nobody is telling you to stop paying rent on your own. Here's the smart move:\n1. File an HP Action in Housing Court — this is designed exactly for your situation\n2. Ask the court to put your rent in escrow (a safe holding account)\n3. Let the JUDGE decide how much your rent should be reduced\n\nThe bottom line: it doesn't matter if other apartments have it worse. The only question is whether YOUR apartment meets the legal standard.\n\n**WHAT THIS MEANS FOR YOU:**\n• File the HP Action AND call 311 for an inspection at the same time — double the pressure\n• You don't need a lawyer for this — Housing Court is designed for tenants to represent themselves\n• Every day without repairs is another day the judge can count against your landlord`
    },
    eviction: {
      1: `**YOUR LANDLORD CANNOT DO THIS**\n\nLet me be very clear: In New York, a landlord CANNOT kick you out without going to court first. No exceptions. It doesn't matter if you owe rent. It doesn't matter if your lease is up. The ONLY way to legally evict someone is through Housing Court. (RPAPL Article 7)\n\nIf your landlord changed the locks, removed your stuff, or shut off your utilities to force you out — that's a CRIME, not just a civil matter.\n\nOn top of that, if you complained about problems in your apartment recently, this could be retaliation — which is also illegal. (RPL §227-a, RPL §235-e)\n\n**WHAT THIS MEANS FOR YOU:**\n• If you're locked out RIGHT NOW: Call 911. This is a criminal offense.\n• Take photos of everything — changed locks, missing belongings, any texts or messages from your landlord\n• You can go to Housing Court and get an order to be let back in, sometimes the same day\n• You can sue for money damages on top of getting back in`,
      2: `**THEIR EXCUSES DON'T HOLD UP**\n\nThe other side might say you "abandoned" the apartment. Here's the thing: your landlord has to PROVE abandonment — you don't have to prove you didn't. If your stuff is in there, if you're getting mail there, if neighbors saw you recently — the abandonment argument falls apart. (Cornfeld v. Nizzari)\n\nThey might say your lease expired. So what? In NYC, when your lease ends, you automatically become a month-to-month tenant. Your landlord STILL has to go through court to remove you.\n\nEven if you did break a lease rule, even if you owe rent — the landlord's only option is to take you to court. Changing locks or cutting services is ALWAYS illegal.\n\n**WHAT THIS MEANS FOR YOU:**\n• Go to Housing Court for an order to restore possession AND file a separate claim for damages\n• The illegal lockout IS your best evidence — it shows your landlord acted in bad faith\n• Many tenant lawyers take these cases for free because the damages can be significant`
    },
    deposit: {
      1: `**YOUR LANDLORD OWES YOU YOUR MONEY BACK**\n\nNew York law changed in 2019 and it's now very clear about security deposits (HSTPA):\n\n• Your deposit can only be 1 month's rent. If they charged more, that's already illegal.\n• They MUST return it within 14 days after you move out.\n• They have to keep it in a separate bank account (not mix it with their money).\n• If they're keeping any of it, they must give you an itemized list with receipts showing why.\n\nHere's the big one: "Normal wear and tear" is NOT a reason to keep your money. Scuff marks, faded paint, minor nail holes from hanging pictures — that's all normal.\n\n**WHAT THIS MEANS FOR YOU:**\n• Send your landlord a letter (certified mail) demanding your deposit back within 14 days\n• If they don't respond, file in Small Claims Court — it costs almost nothing and you don't need a lawyer\n• If they charged you more than 1 month's rent as a deposit, you can get that extra money back right now`,
      2: `**THEIR "DAMAGE" CLAIMS WON'T HOLD UP**\n\nThe other side will say there was damage beyond normal wear. Here's why that usually fails:\n\nIf your landlord didn't do a move-in inspection and document what the place looked like BEFORE you moved in, they can't prove you caused any damage. That's their problem, not yours.\n\nNY courts have been very clear about what's "normal":\n- Paint that needs refreshing = normal\n- Small nail holes = normal\n- Worn carpeting = normal\n- The longer you lived there, the MORE wear is considered normal\n\nAnd that 14-day deadline? It's a hard deadline. Miss the deadline, and many judges will award you the full deposit back automatically.\n\n**WHAT THIS MEANS FOR YOU:**\n• If you have move-in photos, bring them to court — game over\n• If you DON'T have photos, focus on the landlord's failure to document and their missed deadline\n• Small Claims Court in NYC heavily favors tenants on deposit disputes`
    },
    rent: {
      1: `**YOU MIGHT BE GETTING RIPPED OFF ON RENT**\n\nIn New York, if your apartment is rent-stabilized, there's a legal limit on what your landlord can charge. And a LOT of apartments are stabilized — any building with 6+ units built before 1974 likely qualifies.\n\nHere's how landlords overcharge:\n• They claim they did major renovations to justify big rent increases — but the work was never actually done\n• They improperly removed the apartment from rent stabilization\n• They just charge more than the legal limit and hope nobody checks\n\nThe good news: NY law now lets you look back 6 YEARS for overcharges. (CPLR §213-a) And if the overcharge was intentional? You could get back THREE TIMES what you were overcharged.\n\n**WHAT THIS MEANS FOR YOU:**\n• Request your apartment's rent history from HCR — it's free and it's your right\n• If the numbers don't add up, file an overcharge complaint with DHCR (also free)\n• Many tenant lawyers take these cases on contingency — they only get paid if you win`,
      2: `**THEIR JUSTIFICATIONS DON'T ADD UP**\n\nThe other side says the rent increases were for "legitimate improvements." Under the new law (HSTPA), apartment improvements are capped at $15,000 over 15 years — AND the landlord must show receipts. No receipts? The increases get thrown out.\n\nThey might say "that's the market rate." Irrelevant. For stabilized apartments, the legal rent is based on official Rent Guidelines Board increases.\n\nAnd the best part: the law now lets DHCR look at your apartment's ENTIRE rent history to find the correct base rent.\n\n**WHAT THIS MEANS FOR YOU:**\n• If you've been overcharged $500/month for 6 years, that's $36,000 in overcharges — or $108,000 with triple damages\n• This is why landlords almost always settle these cases\n• Get your rent history first, then talk to a tenant lawyer — most offer free consultations`
    },
    harassment: {
      1: `**YOUR LANDLORD IS HARASSING YOU — AND THAT'S ILLEGAL**\n\nIn NYC, landlord harassment is a real legal offense. (NYC Admin Code §27-2005(d))\n\nIt covers a lot of ground:\n• Shutting off your heat, hot water, or electricity\n• Doing construction specifically to make your life miserable\n• Threatening you or pressuring you to move\n• Making repeated buyout offers after you've said no\n• Filing fake court cases against you\n\nIf you complained about problems and THEN the harassment started, that's retaliation — which makes your case even stronger. (RPL §227-a)\n\n**WHAT THIS MEANS FOR YOU:**\n• Start a written log TODAY — date, time, what happened, any witnesses\n• Save every text, email, voicemail, and letter from your landlord\n• File complaints with HPD for any conditions issues — this creates an official record\n• You can sue for real money — courts have fined landlords over $1 million for systematic harassment`,
      2: `**IT'S A PATTERN — AND THAT'S WHAT MATTERS**\n\nThe other side will try to explain away each incident separately. But the law doesn't look at each incident alone — it looks at the PATTERN.\n\nA boiler that "breaks" right after you complain + construction that drags on for months + a buyout offer = a pattern of harassment. Courts are smart about this.\n\nOn buyout pressure: after you say no in writing, your landlord must wait 180 DAYS before bringing it up again. If they keep pushing, that's evidence of harassment.\n\n**WHAT THIS MEANS FOR YOU:**\n• File with HPD AND pursue a private lawsuit — the HPD complaint creates an official record, the lawsuit gets you money\n• Your dated log of incidents is your most powerful weapon\n• Talk to a tenant rights organization — they've seen these patterns before and can help`
    },
    lease: {
      1: `**YOU HAVE MORE RIGHTS THAN YOUR LEASE SAYS**\n\nHere's something most tenants don't know: just because something is in your lease doesn't mean it's legal. New York law overrides unfair lease terms.\n\nYour key rights:\n• **Subletting:** In buildings with 4+ units, you have the RIGHT to sublet. If your landlord doesn't respond within 30 days, their silence counts as a yes. (RPL §226-b)\n• **Roommates:** You can have one additional person living with you no matter what your lease says. (RPL §235-f)\n• **Lease renewal:** If rent-stabilized, your landlord MUST offer you a renewal lease.\n• **Unfair terms:** Courts regularly throw out lease clauses that are unfair.\n\n**WHAT THIS MEANS FOR YOU:**\n• If your landlord denied your sublet request, check if they responded within 30 days — if not, you can sublet anyway\n• If they're blocking a roommate, the Roommate Law is on your side regardless of what the lease says\n• If any lease clause tries to waive your right to a safe apartment, that clause is automatically void`,
      2: `**"YOU SIGNED IT" DOESN'T MEAN IT'S ENFORCEABLE**\n\nThe other side loves to say "well, you signed the lease." Here's the reality: signing an unfair clause doesn't make it legal. NY courts throw out unfair lease terms all the time.\n\nThe warranty of habitability — your right to a safe, livable apartment — CANNOT be waived by any lease. (Park West Management v. Mitchell)\n\nOn subletting: the 30-day clock is strict. If your landlord didn't respond within 30 days, they've lost their chance to say no.\n\nOn roommates: the Roommate Law says one additional person, period. Your lease saying "no additional occupants" doesn't matter — the statute overrides the lease.\n\n**WHAT THIS MEANS FOR YOU:**\n• Don't be intimidated by lease language — many standard lease clauses are legally unenforceable\n• For subletting, make sure your request was in writing with the subtenant's info — that starts the 30-day clock\n• Talk to a tenant rights org if your landlord is refusing a renewal lease`
    },
    lease_review: {
      1: `**LEASE RED-LINE ANALYSIS — HERE'S WHAT WE FOUND**\n\nWe've reviewed your lease against New York tenant protection laws. Here are the clauses you need to watch out for:\n\n**🔴 RED FLAGS (Potentially Illegal or Unenforceable):**\n• Any clause waiving your right to a habitable apartment — void under RPL §235-b\n• Security deposit exceeding 1 month's rent — illegal under HSTPA (2019)\n• Late fees exceeding $50 or 5% of monthly rent — courts regularly strike these\n• Clauses requiring you to pay landlord's attorney fees without reciprocity\n• Any clause preventing you from calling 311 or filing complaints\n\n**🟡 CAUTION (Legal but Unfavorable):**\n• Early termination penalties — check if they're proportional to actual damages\n• Subletting restrictions — in 4+ unit buildings, you have a statutory right to sublet (RPL §226-b)\n• Renovation clauses requiring landlord approval for ANY changes, even minor ones\n• Auto-renewal clauses that lock you in without proper notice periods\n\n**WHAT THIS MEANS FOR YOU:**\n• Red flag clauses are unenforceable even if you sign them — NY law overrides the lease\n• For caution items, try to negotiate before signing\n• If this is a rent-stabilized apartment, you have additional protections on renewal terms`,
      2: `**DEEP DIVE — CLAUSE-BY-CLAUSE RECOMMENDATIONS**\n\nLet's go through the most important sections:\n\n**RENT & PAYMENT TERMS:**\n• Verify the rent amount matches DHCR records if rent-stabilized\n• Grace period must be at least 5 days for rent-stabilized units\n• Check how rent increases are calculated — RGB percentages only for stabilized\n\n**MAINTENANCE & REPAIRS:**\n• Landlord is ALWAYS responsible for structural, plumbing, heating, and building-wide systems\n• Clauses making you responsible for "all repairs" are void\n• Check if there's a process for requesting repairs in writing\n\n**MOVE-OUT & SECURITY DEPOSIT:**\n• Deposit must be returned within 14 days with itemized deductions (HSTPA)\n• "Normal wear and tear" cannot be charged against your deposit\n• Move-out inspection clause should be mutual, not one-sided\n\n**WHAT THIS MEANS FOR YOU:**\n• Before signing, cross out or initial any red-flag clauses and note "void under NY law"\n• Request all modifications in writing\n• Keep a copy of the original AND the marked-up version\n• Consider having a tenant rights org review if you're in a rent-stabilized building`

  };
  const issueResponses = responses[issue] || responses.repairs;
  return issueResponses[round] || issueResponses[1];
}

function generateOpposingArgument(issue, details, round) {
  const responses = {
    repairs: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nYour landlord's lawyer is going to hit you with three main arguments. Here's what to expect:\n\n**"You never told us in writing."** They'll say verbal complaints don't count. This is their favorite move — make you look like you never reported it properly.\n\n**"You wouldn't let us in to fix it."** They'll claim they tried to schedule repairs but you weren't available. Even if that's only partly true, they'll use it.\n\n**"It's not that bad."** They'll argue the apartment is still "livable" even if it's uncomfortable. A leaky faucet isn't the same as no heat, in their eyes.\n\n**The scare tactic:** They'll warn that if you withhold rent without a court order, they can start eviction proceedings against YOU. This is actually true — which is why you should go through Housing Court, not just stop paying.\n\nDon't panic. These arguments sound scary but they have weaknesses. That's why Round 2 exists — we'll break each one apart.`,
      2: `**HERE'S WHY THEIR ARGUMENTS FALL SHORT**\n\nRemember what they said? Let's go through it:\n\n**"No written notice"** — Even if true, the law says your landlord should have known about the problem. If your super saw it, if it's visible in common areas, if you told anyone in management — that counts as notice.\n\n**"You blocked repairs"** — If your landlord can't show specific dates they tried to schedule repairs AND evidence you refused, this argument goes nowhere. A vague claim isn't proof.\n\n**"It's livable"** — The court decides this, not the landlord. And judges take things like mold, pest infestations, and lack of heat very seriously.\n\n**Their real fear:** A Housing Court judge ordering repairs AND reducing your rent. That's expensive for them. This is why many landlords settle once you file — it's cheaper to fix the problem than fight in court.`

    eviction: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nIf your landlord is trying to evict you or already locked you out, here's how their lawyer will spin it:\n\n**"The tenant owes rent."** They'll try to make the eviction about money, even if it's really about something else (like retaliation for complaints).\n\n**"The lease expired."** They'll argue you have no right to stay. This sounds scary but it's mostly wrong in NYC — you have protections even after your lease ends.\n\n**"It wasn't a lockout — there was a misunderstanding."** If your locks were changed, they might claim it was a security upgrade, a mistake, or that you abandoned the apartment.\n\n**"The tenant broke lease rules."** They'll dig through your lease looking for anything — unauthorized pets, guests staying too long, noise complaints — to justify their actions.\n\nNone of these excuses make a self-help eviction legal. But you should know they're coming so you're not caught off guard.`,
      2: `**WHY THEIR EXCUSES DON'T WORK**\n\nLet's be real about what the other side is doing:\n\n**On "abandonment":** This is a Hail Mary. If your stuff is in the apartment, if you have recent mail there, if any neighbor saw you recently — the abandonment claim is dead on arrival. Your landlord has to PROVE you left, not just say it.\n\n**On "expired lease":** In NYC, this doesn't mean what landlords want it to mean. Your lease ending doesn't mean you have to leave. You automatically become month-to-month. They STILL have to take you to court properly.\n\n**On "it was a mistake":** Changed locks don't change themselves. Courts don't buy this unless the landlord has very strong evidence of a genuine error.\n\n**The truth:** Even if you owed every penny of rent, even if you broke every lease rule — the landlord's ONLY legal option was to go to court. They chose not to. That's on them.`

    deposit: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nLandlords LOVE to keep security deposits. Here's their playbook:\n\n**"There was damage beyond normal wear."** This is the #1 excuse. They'll point to every scuff, mark, and worn spot and call it "damage" — even if you lived there for years and it's totally normal.\n\n**"You didn't give us a forwarding address."** They'll claim the 14-day clock never started because you didn't tell them where to send the check. Even if you did tell them.\n\n**"We need more time to assess."** They'll say 14 days isn't enough to figure out the damage. The law says otherwise, but they'll try.\n\n**"The repairs cost more than the deposit."** They might claim you actually owe THEM money on top of keeping your deposit. This is usually a bluff to scare you out of fighting.\n\nThe good news: these defenses are well-known and judges see through them all the time. Small Claims Court judges in NYC deal with deposit disputes constantly and tend to side with tenants.`,
      2: `**WHY THEIR "DAMAGE" CLAIMS USUALLY FAIL**\n\nHere's the reality check on their arguments:\n\n**No move-in inspection?** That's the landlord's problem. If they didn't document what the apartment looked like before you moved in, they can't prove you caused any damage. End of story.\n\n**"Beyond normal wear"?** Judges know what normal looks like. You lived there — things get worn. Paint fades, carpets show paths, walls get minor marks. The longer you lived there, the more of this is expected.\n\n**Missed the 14-day deadline?** Many judges will give you the full deposit back automatically if the landlord blew past 14 days without providing an itemized statement. They don't get a do-over.\n\n**No receipts?** If the landlord can't show receipts for actual repairs they claim to have made, the judge will be skeptical. "I think it cost $500" isn't evidence.`
    },
    rent: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nOvercharging landlords always have excuses. Here are the big ones:\n\n**"The apartment isn't rent-stabilized."** This is their first line of defense. They'll argue the apartment was legally removed from stabilization — through high-rent deregulation, substantial renovation, or some other loophole.\n\n**"We made legitimate improvements."** They'll claim they spent big money on renovations that justify the rent increase. Sometimes this is true. Often it's inflated or fabricated.\n\n**"That's just the market rate."** They'll try to argue that what they're charging is fair because comparable apartments go for similar amounts. This is irrelevant for stabilized apartments, but they'll say it anyway.\n\n**"The statute of limitations protects us."** They'll argue you waited too long to complain, so some or all of the overcharges are time-barred.\n\nThese arguments have varying strength depending on your specific situation. But the new law (HSTPA) has closed many of the loopholes landlords used to rely on.`,
      2: `**WHY THEIR DEFENSES ARE WEAKER THAN THEY SOUND**\n\nLet's break down the reality:\n\n**On "legitimate improvements":** The new law caps these at $15,000 over 15 years AND requires receipts. No receipts = no increases. Period. Many landlords padded renovation costs or claimed work that was never done. DHCR doesn't just take their word for it.\n\n**On "not stabilized":** HSTPA made it much harder to deregulate apartments. If your landlord claims deregulation happened before 2019, there are ways to challenge that. If it happened after, the law likely prevents it entirely.\n\n**On the statute of limitations:** Landlords used to love this defense, but HSTPA expanded the lookback to 6 full years AND now DHCR can dig deeper into the rent history. The old tricks don't work like they used to.\n\n**The bottom line:** Landlords settle overcharge cases because they know the math is against them. If you've been overcharged even $300/month for 6 years, that's $21,600 minimum — up to $64,800 with triple damages. Fighting is expensive for them.`

    harassment: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nLandlords accused of harassment always play the same cards:\n\n**"It was legitimate maintenance."** Turned off the heat? "Boiler repair." Constant construction? "Necessary renovations." They'll frame every disruption as normal business.\n\n**"We only made one buyout offer."** They'll downplay the pressure, saying it was a single polite offer that the tenant was free to refuse.\n\n**"There's no pattern."** Their lawyer will isolate each incident and explain them separately, trying to prevent you from connecting the dots.\n\n**"The tenant is exaggerating."** They'll suggest you're being overly sensitive or that your expectations are unreasonable.\n\nThe key thing to understand: harassment cases are about the PATTERN, not individual incidents. Their strategy is to break the pattern apart and make each piece look innocent. Your strategy should be the opposite — show how everything fits together.`,
      2: `**WHY THEIR "INNOCENT" EXPLANATIONS DON'T ADD UP**\n\nLet's connect the dots:\n\n**"Legitimate maintenance" + "one buyout offer" + "necessary construction"** — any one of these alone might be innocent. All three together, especially if they started after you complained about something? That's a pattern. Courts are smart enough to see this.\n\n**On the buyout:** After you say no in writing, your landlord has to wait 180 days before bringing it up again. If they keep pushing, that IS evidence of harassment. It doesn't matter how "politely" they ask.\n\n**On construction timing:** If the "necessary" construction happens to be at 7 AM, happens to drag on for months, and happens to coincide with buyout pressure — a judge will notice.\n\n**On "no pattern":** You build the pattern with your incident log. Date, time, what happened, who saw it. Do this consistently and the pattern tells itself. Judges read these logs and draw their own conclusions.`

    lease: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nIn lease disputes, landlords lean hard on one argument:\n\n**"You signed the lease. Deal with it."** This is the big one. They'll say you agreed to the terms and now you have to live with them. Sounds logical, but it's not always how the law works.\n\n**On subletting:** "We said no and we have that right." They'll claim their denial was reasonable, even if they can't explain why.\n\n**On roommates:** "The lease says no additional occupants." They'll point to the lease language and expect that to be the end of it.\n\n**On renewal:** "We're not required to renew." For market-rate apartments, this might actually be true. For stabilized apartments, it's dead wrong.\n\n**On unfair terms:** "Standard lease, everyone signs it." They'll argue that because the lease is used industry-wide, it can't be unfair.\n\nHere's what they don't want you to know: New York law overrides many lease provisions. Just because you signed something doesn't make it enforceable.`,
      2: `**WHY "YOU SIGNED IT" ISN'T THE END OF THE STORY**\n\nThe other side keeps saying "the lease is the lease." Here's reality:\n\n**Your right to a livable apartment can NEVER be waived.** It doesn't matter what the lease says. Courts have been clear on this — you can't sign away your basic tenant rights.\n\n**On subletting:** If your landlord didn't respond to your written request within 30 days, they've automatically given consent. That's the law, not the lease. They can't retroactively say no.\n\n**On roommates:** The state Roommate Law says you get one additional occupant. Your lease says otherwise? The law wins. Every time.\n\n**On "standard" lease terms:** Just because every landlord uses the same unfair clause doesn't make it legal. Courts regularly strike down "standard" provisions that cross the line.\n\n**The real issue:** Most tenants don't fight because they think the lease is set in stone. It's not. If your landlord is relying on a lease clause to deny your rights, there's a good chance that clause doesn't hold up in court.`

    lease_review: {
      1: `**WHAT A LANDLORD'S LAWYER WOULD SAY ABOUT THIS LEASE**\n\nLet's be honest about how the other side sees things:\n\n**"This is a standard lease."** They'll argue that the lease uses industry-standard language that thousands of tenants have signed without issue. In some cases, they're right — not every clause you dislike is illegal.\n\n**"The terms are clearly stated."** They'll say you had every opportunity to read the lease before signing and could have negotiated or walked away. This is the "freedom of contract" argument.\n\n**"The law allows these provisions."** For market-rate apartments, landlords have MORE flexibility in what they can include. Not everything is overridden by statute.\n\n**"Renovations justify the terms."** If the lease includes higher-than-expected rent or fees, they'll point to improvements made to the unit.\n\nUnderstanding their perspective helps you negotiate smarter. Not every lease clause is a red flag — knowing the difference is what gives you leverage.`,
      2: `**DISTINGUISHING REAL PROBLEMS FROM STANDARD TERMS**\n\nBeing fair-minded here:\n\n**Some clauses ARE enforceable:** Reasonable late fees, standard maintenance obligations for tenants (like keeping the unit clean), and normal lease termination procedures are all legal.\n\n**Market-rate vs. stabilized matters hugely:** If your apartment is NOT rent-stabilized, the landlord has significantly more freedom in setting lease terms. Not all "unfavorable" terms are "illegal."\n\n**Negotiation ≠ litigation:** Many lease concerns are better handled by negotiating before signing than by fighting after the fact. If you haven't signed yet, you have more leverage than you think.\n\n**The honest assessment:** Focus your energy on the clauses that are clearly illegal under NY law (deposit violations, habitability waivers, retaliation clauses). For everything else, negotiate firmly but know which battles to pick.`
    }
  };
  const issueResponses = responses[issue] || responses.repairs;
  return issueResponses[round] || issueResponses[1];
}

function generateJudgeVerdict(issue) {
  const verdicts = {
    repairs: { score: 82, summary: `**You have a strong case.**\n\nThe law is clearly on your side here. New York requires your landlord to keep your apartment livable, and they're not doing that.\n\nThe other side raised some fair points about documentation — but those are speed bumps, not roadblocks. Even without perfect records, your claim has solid legal backing.\n\n**Here's exactly what to do next:**\n\n1. **Take photos and videos of everything** — with timestamps. Do this today.\n2. **Send your landlord a written complaint** — email or certified letter. This creates a paper trail.\n3. **Call 311** to request an HPD inspection. Once violations are on record, your landlord can't pretend the problem doesn't exist.\n4. **File an HP Action in Housing Court** — this forces your landlord to make repairs. You don't need a lawyer for this.\n5. **Keep paying rent** — but ask the court about putting it in escrow so you're protected.\n\nExpect the process to take 30-60 days if the violations are real. Most landlords start making repairs once they get the court papers.` },
    eviction: { score: 88, summary: `**You have a very strong case.**\n\nIf your landlord locked you out or tried to evict you without going to court, they broke the law. It's that simple. New York doesn't allow shortcuts on evictions — period.\n\nIf you also complained about apartment problems before this happened, you likely have a retaliation claim on top of the eviction claim. That makes your case even stronger.\n\n**Here's exactly what to do next:**\n\n1. **If you're locked out right now:** Call 911. This is a crime, not just a civil dispute.\n2. **Go to Housing Court** and file for an emergency order to get back into your apartment. Courts can issue these quickly.\n3. **File a police report** — this creates an official record of what happened.\n4. **Document everything:** Photos of changed locks, screenshots of texts from your landlord, names of witnesses.\n5. **Consider suing for damages** — courts award real money for illegal lockouts, including for the stress and disruption.\n6. **Contact a tenant rights organization** — many provide free lawyers for cases like this.\n\nIllegal eviction cases rarely fail when properly documented. The law is strongly in your favor.` },
    deposit: { score: 78, summary: `**You have a good case — especially if your landlord missed the 14-day deadline.**\n\nThe law is pretty clear here: your landlord had 14 days to return your deposit with an itemized list of any deductions. If they missed that window, your case gets a lot stronger.\n\nHow strong your case is depends on your documentation. If you have move-in/move-out photos, you're in great shape. Even without them, the burden is on your landlord to prove damage.\n\n**Here's exactly what to do next:**\n\n1. **Send a demand letter** via certified mail requesting your full deposit back within 14 days. Keep the receipt.\n2. **Wait 14 days.** If no response, move to step 3.\n3. **File in Small Claims Court** — filing costs almost nothing and you don't need a lawyer.\n4. **Gather your evidence:** Lease, move-in/move-out photos, any texts or emails about the deposit, your demand letter receipt.\n5. **At court:** Emphasize the landlord's missed deadline and lack of itemized deductions. Judges take the 14-day rule seriously.\n\nMost landlords settle once they see you've filed. It's cheaper than going to court and losing.` },
    rent: { score: 85, summary: `**You likely have a strong case — but it depends on one key question: is your apartment rent-stabilized?**\n\nIf yes, the math is on your side. The new law (HSTPA) gives you powerful tools to recover overcharges going back 6 years, plus potential triple damages.\n\nIf you're not sure whether you're stabilized, finding out is step one — and it's free.\n\n**Here's exactly what to do next:**\n\n1. **Request your rent history from HCR** — this is free and you have a right to it. Call (718) 739-6400 or go to hcr.ny.gov.\n2. **Compare your rent history to what you've been paying.** If the numbers don't match, you may have an overcharge.\n3. **File a complaint with DHCR** if the numbers show an overcharge. Also free.\n4. **Talk to a tenant lawyer** — many take overcharge cases on contingency (they only get paid if you win), because the potential recovery is large.\n5. **Keep paying your current rent** while the case is pending. Don't stop paying.\n\nThese cases take time (1-2 years) but the payoff can be significant. Even a $200/month overcharge over 6 years is $14,400 — or $43,200 with triple damages.` },
    harassment: { score: 70, summary: `**You have a decent case, but it needs strong documentation to win.**\n\nHarassment cases come down to proving a PATTERN of behavior. One bad incident usually isn't enough. But multiple incidents over time — especially if they started after you complained about something — paint a powerful picture.\n\nThe other side will try to explain each incident separately. Your job is to show they're connected.\n\n**Here's exactly what to do next:**\n\n1. **Start an incident log TODAY** — date, time, what happened, who saw it. Be specific and factual. This is your most important weapon.\n2. **Save every text, email, voicemail, and letter** from your landlord. Screenshot everything.\n3. **If you've declined a buyout, do it in writing.** This starts a 180-day clock where they can't bring it up again.\n4. **File complaints with HPD** for any conditions issues — each complaint creates an official record.\n5. **Talk to your neighbors** — if they're experiencing similar treatment, their testimony strengthens your case.\n6. **Contact a tenant rights organization** — harassment cases benefit from professional help.\n\nBuild the paper trail consistently and the pattern will speak for itself.` },
    lease: { score: 72, summary: `**Your case strength depends on the specific issue, but the law is generally tenant-friendly in NY.**\n\nFor subletting and roommate disputes, your statutory rights are strong and well-defined. For disputes about specific lease clauses, it depends on what the clause says and whether it conflicts with NY law.\n\nThe good news: New York courts regularly side with tenants when lease terms conflict with statutory protections.\n\n**Here's exactly what to do next:**\n\n1. **Figure out if your apartment is rent-stabilized** — this dramatically affects your rights (especially for lease renewals). Check at hcr.ny.gov or call (718) 739-6400.\n2. **For subletting:** Send a formal written request to your landlord with the proposed subtenant's info. This starts the 30-day clock.\n3. **For roommate issues:** Send written notice of the additional occupant. The Roommate Law is on your side.\n4. **For unfair lease terms:** Identify the specific clause and check if it conflicts with NY tenant protection laws.\n5. **For lease renewal:** If you're stabilized and weren't offered a renewal, file a complaint with DHCR.\n6. **Get everything in writing** — verbal agreements are hard to enforce.\n\nMost lease disputes can be resolved with a clear understanding of your rights and a formal written communication to your landlord.` },
    lease_review: { score: 75, summary: `**LEASE REVIEW COMPLETE — Here's our assessment.**\n\nWe've analyzed your lease against current New York tenant protection laws including RPL, HSTPA (2019), and NYC Admin Code. Overall, most standard NYC leases contain a mix of enforceable and questionable provisions.\n\n**Key findings:**\n• Several common clauses in standard leases are unenforceable under NY law — even if you sign them\n• Rent-stabilized tenants have additional protections that override many lease terms\n• Security deposit terms must comply with HSTPA limits (max 1 month)\n\n**Here's exactly what to do next:**\n\n1. **Review the red-flagged clauses above** — these are the ones most likely to cause problems\n2. **If you haven't signed yet:** Negotiate the red-flag items before signing. Cross out unacceptable terms and initial changes.\n3. **If you already signed:** Know that illegal clauses are void regardless — you can't sign away statutory rights\n4. **Request your rent history from HCR** if rent-stabilized — verify the legal rent matches your lease\n5. **Keep a copy of your marked-up lease** with all notes for your records\n6. **Consider a free consultation** with a tenant rights organization for complex issues\n\nRemember: your lease is a starting point for negotiation, not a final word. NY law gives tenants strong baseline protections that no lease can take away.` }
  };
  return verdicts[issue] || verdicts.repairs;
}

/* ─── Help Button Component ─── */
function HelpButton({ page, isProcessing, showVerdict }) {
  const [helpOpen, setHelpOpen] = useState(false);

  const getHelpContent = () => {
    if (page === "landing") {
      return {
        text: "Welcome! This tool helps you understand your rights as a NY tenant. Click 'Get Started' to begin exploring your case.",
        suggestions: [
          { label: "How does the AI analysis work?", action: () => { document.getElementById("how-it-works")?.scrollIntoView({behavior:"smooth"}); setHelpOpen(false); } },
          { label: "See what others say", action: () => { document.getElementById("testimonials")?.scrollIntoView({behavior:"smooth"}); setHelpOpen(false); } },
          { label: "Check pricing", action: () => { document.getElementById("pricing")?.scrollIntoView({behavior:"smooth"}); setHelpOpen(false); } }
        ]
      };
    } else if (page === "signup") {
      return {
        text: "Fill in your basic info. We need this to personalize your analysis. Your data stays private and is never shared.",
        suggestions: [
          { label: "Why do you need my info?", action: () => { alert("We use your name and borough to personalize the legal analysis to your specific jurisdiction. Your data is never shared or sold."); } },
          { label: "Is this really free?", action: () => { alert("Yes! Your first complete case analysis is 100% free. No credit card required."); } },
          { label: "Go back to home", action: () => { window.scrollTo({top:0, behavior:"smooth"}); setHelpOpen(false); } }
        ]
      };
    } else if (page === "intake") {
      return {
        text: "Pick the issue that best matches your situation, then describe what happened in your own words. The more detail, the better our analysis.",
        suggestions: [
          { label: "What details should I include?", action: () => { alert("Include: when the issue started, what you've told your landlord, any written communication, how it affects your daily life, and any evidence you have (photos, emails, texts)."); } },
          { label: "What issues do you cover?", action: () => { alert("We cover: repairs & habitability, rent overcharges, lease disputes, harassment & retaliation, eviction defense, security deposits, and more under NYC and NY State housing law."); } },
          { label: "Is my info confidential?", action: () => { alert("Your case details are processed in real-time and not stored on any server. This is not an attorney-client relationship."); } }
        ]
      };
    } else if (page === "analysis") {
      return {
        text: isProcessing ? "Our AI agents are debating your case — just like real lawyers would. Hang tight!" : "Your analysis is complete! Scroll down to see what to do next and your action plan.",
        suggestions: isProcessing ? [
          { label: "How long does this take?", action: () => { alert("The full analysis takes about 30-60 seconds. Three AI agents debate your case from different perspectives."); } },
          { label: "What are the 3 agents?", action: () => { alert("1) Your Defense Attorney — argues your strongest case\n2) Landlord's Attorney — anticipates opposing arguments\n3) Neutral Judge — gives an impartial assessment and case strength score"); } }
        ] : [
          { label: "Download my report", action: () => { document.querySelector("[class*='btn-cta']")?.click(); } },
          { label: "Find a lawyer", action: () => { window.open("https://www.nycbar.org/get-legal-help/", "_blank", "noopener"); setHelpOpen(false); } },
          { label: "Start a new analysis", action: () => { window.scrollTo({top:0}); setHelpOpen(false); } }
        ]
      };
    }
    return { text: "How can we help?", suggestions: [] };
  };

  const content = getHelpContent();

  return (
    <>
      <button className="help-button" onClick={() => setHelpOpen(!helpOpen)} title="Get help">?</button>
      {helpOpen && (
        <div className="help-panel">
          <div className="help-header">Need Help?</div>
          <div className="help-content">{content.text}</div>
          {content.suggestions.length > 0 && (
            <div className="help-suggestions">
              {content.suggestions.map((suggestion, i) => (
                <div key={i} className="help-suggestion" onClick={suggestion.action}>{suggestion.label}</div>
              ))}
            </div>
          )}
        </div>
      )}
    </>
  );
}

/* ─── Win Meter Component ─── */
function WinMeter({ score, isAnimating, label }) {
  const [displayScore, setDisplayScore] = useState(0);
  const [prevScore, setPrevScore] = useState(0);

  useEffect(() => {
    if (score !== prevScore) {
      setPrevScore(score);
      const duration = 1000;
      const start = prevScore;
      const diff = score - start;
      const startTime = Date.now();
      const animate = () => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        setDisplayScore(Math.round(start + diff * eased));
        if (progress < 1) requestAnimationFrame(animate);
      };
      requestAnimationFrame(animate);
    }
  }, [score]);

  const getColor = (s) => {
    if (s >= 80) return { bg: "#22c55e", text: "#22c55e" };

/* ─── Streaming Text Component ─── */
function StreamingText({ text, speed }) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);

  useEffect(() => {
    setDisplayed("");
    setDone(false);
    let i = 0;
    const interval = setInterval(() => {
      i += 3;
      if (i >= text.length) {
        setDisplayed(text);
        setDone(true);
        clearInterval(interval);
      } else {
        setDisplayed(text.substring(0, i));
      }
    }, speed || 8);
    return () => clearInterval(interval);
  }, [text]);

  const html = displayed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
  return (
    <div className="agent-text">
      <span dangerouslySetInnerHTML={{__html: html}} />
      {!done && <span style={{display:"inline-block",width:2,height:16,background:"var(--accent)",marginLeft:2,animation:"pulse 0.8s infinite"}}></span>}
    </div>
  );
}

/* ─── Animated Counter Component ─── */
function AnimatedCounter({ target, duration }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started.current) {
        started.current = true;
        const startTime = Date.now();
        const animate = () => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / (duration || 2000), 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setCount(Math.round(target * eased));
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }
    }, { threshold: 0.3 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target]);

  return <span ref={ref}>{count.toLocaleString()}</span>;
}

                  <a className="footer-link" href="tel:311">Call 311</a>

              <div className="footer-bottom-links">

              </div>

        <HelpButton page={page} />

  }

  /* ─── SIGNUP PAGE (Light) ─── */
  if (page === "signup") {
    return (
      <div className="page-enter" style={{minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: "var(--gray-50)"}}>
        {overlays}
        <div className="card signup-card">
          <div style={{textAlign: "center", marginBottom: 8}}>
            <div style={{color: "var(--accent)"}}><ShieldIcon /></div>
          </div>
          <h2>{isPro ? "Start Your Pro Analysis" : "Start Your Free Analysis"}</h2>
          <p className="subtitle">Takes 3 minutes. No credit card. No strings.</p>
          <form onSubmit={handleSignup}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label" htmlFor="signup-first">First Name *</label>
                <input className="input-field" id="signup-first" type="text" placeholder="John" value={signupData.firstName} onChange={e => setSignupData({...signupData, firstName: e.target.value})} required autoComplete="given-name" />
              </div>
              <div className="form-group">
                <label className="form-label" htmlFor="signup-last">Last Name</label>
                <input className="input-field" id="signup-last" type="text" placeholder="Doe" value={signupData.lastName} onChange={e => setSignupData({...signupData, lastName: e.target.value})} autoComplete="family-name" />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label" htmlFor="signup-email">Email *</label>
              <input className="input-field" id="signup-email" type="email" placeholder="john@example.com" value={signupData.email} onChange={e => setSignupData({...signupData, email: e.target.value})} required autoComplete="email" />
            </div>
            <div className="form-group">
              <label className="form-label" htmlFor="signup-phone">Phone</label>
              <input className="input-field" id="signup-phone" type="tel" placeholder="(212) 555-0123" value={signupData.phone} onChange={e => setSignupData({...signupData, phone: e.target.value})} autoComplete="tel" />
            </div>
            <div className="form-group">
              <label className="form-label" htmlFor="signup-borough">Borough</label>
              <select className="input-field" id="signup-borough" value={signupData.borough} onChange={e => setSignupData({...signupData, borough: e.target.value})}>
                <option>Manhattan</option>
                <option>Brooklyn</option>
                <option>Queens</option>
                <option>Bronx</option>
                <option>Staten Island</option>
                <option>Other NY</option>
