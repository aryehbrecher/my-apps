<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TenantShield AI — Fight Back Against Your Landlord</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0a1628;
    --navy-light: #111d35;
    --navy-mid: #162544;
    --navy-deep: #060f1d;
    --blue: #3b82f6;
    --blue-bright: #60a5fa;
    --blue-subtle: #2563eb;
    --gold: #f59e0b;
    --gold-light: #fbbf24;
    --green: #10b981;
    --red: #ef4444;
    --red-soft: #fca5a5;
    --purple: #8b5cf6;
    --white: #f8fafc;
    --gray: #94a3b8;
    --gray-light: #cbd5e1;
    --gray-dark: #64748b;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--navy); color: var(--white); overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--navy-mid); border-radius: 3px; }

  /* Animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes typewriter { from { width: 0; } to { width: 100%; } }
  @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(59,130,246,0.3); } 50% { box-shadow: 0 0 40px rgba(59,130,246,0.6); } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes countUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes subtleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes logoScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  .fade-up { animation: fadeUp 0.6s ease-out forwards; }
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  .slide-in { animation: slideIn 0.5s ease-out forwards; }
  .scale-in { animation: scaleIn 0.4s ease-out forwards; }

  /* Glass morphism */
  .glass { background: rgba(17, 29, 53, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.12); border-radius: 16px; }
  .glass-hover:hover { border-color: rgba(59, 130, 246, 0.4); transform: translateY(-2px); transition: all 0.3s; }

  /* Buttons */
  .btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-subtle)); color: white; border: none; padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; min-height: 48px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .btn-primary::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); opacity: 0; transition: opacity 0.25s; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.4); }
  .btn-primary:hover::after { opacity: 1; }
  .btn-primary:active { transform: translateY(0) scale(0.98); box-shadow: 0 2px 10px rgba(59,130,246,0.3); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: transparent; color: var(--blue-bright); border: 1.5px solid rgba(59,130,246,0.3); padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; min-height: 48px; display: flex; align-items: center; justify-content: center; }
  .btn-secondary:hover { background: rgba(59,130,246,0.08); transform: translateY(-2px); border-color: rgba(59,130,246,0.5); }
  .btn-secondary:active { transform: translateY(0) scale(0.98); }
  .btn-gold { background: linear-gradient(135deg, var(--gold), #d97706); color: var(--navy); border: none; padding: 16px 40px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; min-height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
  .btn-gold::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent); opacity: 0; transition: opacity 0.25s; }
  .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(245,158,11,0.4); }
  .btn-gold:hover::after { opacity: 1; }
  .btn-gold:active { transform: translateY(0) scale(0.98); }

  /* Input */
  .input-field { background: var(--navy); border: 1.5px solid rgba(59,130,246,0.2); border-radius: 12px; padding: 14px 18px; color: var(--white); font-size: 16px; width: 100%; font-family: inherit; transition: all 0.3s; min-height: 48px; }
  .input-field:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .input-field::placeholder { color: var(--gray); }
  textarea.input-field { resize: vertical; min-height: 120px; line-height: 1.6; padding: 16px 18px; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 100px 0; }
  .section-label { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--blue-bright); margin-bottom: 16px; }
  .section-title { font-size: clamp(32px, 4vw, 44px); font-weight: 800; line-height: 1.15; margin-bottom: 16px; letter-spacing: -0.02em; }
  .section-subtitle { color: var(--gray); font-size: 18px; line-height: 1.6; max-width: 600px; }

  /* Agent cards */
  .agent-card { border-radius: 16px; padding: 24px; margin-bottom: 16px; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .agent-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .agent-defense { background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(16,185,129,0.05)); border: 1px solid rgba(16,185,129,0.3); }
  .agent-opposing { background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(239,68,68,0.05)); border: 1px solid rgba(239,68,68,0.3); }
  .agent-judge { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(139,92,246,0.05)); border: 1px solid rgba(139,92,246,0.3); }

  .agent-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .badge-defense { background: rgba(16,185,129,0.2); color: #34d399; }
  .badge-opposing { background: rgba(239,68,68,0.2); color: #fca5a5; }
  .badge-judge { background: rgba(139,92,246,0.2); color: #c4b5fd; }

  .agent-text { color: var(--gray-light); line-height: 1.7; font-size: 16px; }
  .agent-text strong { color: var(--white); }

  /* Typing indicator */
  .typing-dots { display: inline-flex; gap: 4px; padding: 8px 0; }
  .typing-dots span { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1.4s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* Progress bar */
  .progress-bar { height: 4px; background: var(--navy-mid); border-radius: 2px; overflow: hidden; margin: 20px 0; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-top: 48px; }
  .stat-card { text-align: center; padding: 40px 20px; transition: transform 0.3s, border-color 0.3s; }
  .stat-card:hover { transform: translateY(-4px); border-color: rgba(59,130,246,0.3); }
  .stat-number { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, var(--blue-bright), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.02em; }
  .stat-label { color: var(--gray); font-size: 14px; margin-top: 10px; line-height: 1.5; }

  /* Issue categories */
  .issue-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
  .issue-card { padding: 28px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .issue-card:hover { border-color: var(--blue); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(59,130,246,0.15); }
  .issue-card.selected { border-color: var(--gold); background: rgba(245,158,11,0.05); }
  .issue-icon { font-size: 32px; margin-bottom: 12px; }
  .issue-title { font-weight: 600; font-size: 16px; margin-bottom: 6px; }
  .issue-desc { color: var(--gray); font-size: 13px; line-height: 1.5; }

  /* Nav */
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 16px 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .nav.scrolled { background: rgba(10, 22, 40, 0.92); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(59,130,246,0.08); padding: 12px 0; }
  .nav-inner { display: flex; justify-content: space-between; align-items: center; }
  .nav-logo { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .nav-logo span { background: linear-gradient(135deg, var(--blue-bright), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-link { color: var(--gray); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; cursor: pointer; position: relative; }
  .nav-link:hover { color: var(--white); }
  .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--blue-bright); transition: width 0.3s; border-radius: 1px; }
  .nav-link:hover::after { width: 100%; }

  /* Hero */
  .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 80px; }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.12) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(245,158,11,0.06) 0%, transparent 50%); }
  .hero-bg::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .hero-content { position: relative; z-index: 1; max-width: 800px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 50px; padding: 10px 22px; font-size: 13px; color: var(--blue-bright); font-weight: 500; margin-bottom: 36px; }
  .hero h1 { font-size: clamp(44px, 7vw, 80px); font-weight: 900; line-height: 1.05; margin-bottom: 28px; letter-spacing: -0.03em; }
  .hero h1 .highlight { background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { font-size: 20px; color: var(--gray-light); line-height: 1.7; margin-bottom: 44px; max-width: 600px; }
  .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; }
  .hero-proof { margin-top: 64px; display: flex; gap: 40px; flex-wrap: wrap; }
  .hero-proof-item { display: flex; align-items: center; gap: 10px; color: var(--gray); font-size: 14px; }
  .hero-proof-item svg { color: var(--green); flex-shrink: 0; }

  /* Trust bar / As seen in */
  .trust-bar { padding: 60px 0; border-top: 1px solid rgba(59,130,246,0.06); border-bottom: 1px solid rgba(59,130,246,0.06); background: rgba(10,22,40,0.5); overflow: hidden; }
  .trust-bar-label { text-align: center; font-size: 12px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gray-dark); margin-bottom: 32px; }
  .trust-logos { display: flex; align-items: center; justify-content: center; gap: 60px; flex-wrap: wrap; opacity: 0.4; }
  .trust-logo { font-size: 18px; font-weight: 700; color: var(--gray-light); white-space: nowrap; transition: opacity 0.3s; letter-spacing: -0.01em; }
  .trust-logo:hover { opacity: 1; }

  /* Features section */
  .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
  @media (max-width: 768px) { .features-grid { grid-template-columns: 1fr; } .hero-buttons { flex-direction: column; } .nav-links { display: none; } }
  .feature-card { padding: 40px 28px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .feature-card:hover { transform: translateY(-6px); border-color: rgba(59,130,246,0.3); box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
  .feature-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 24px; }
  .feature-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .feature-desc { color: var(--gray); font-size: 14px; line-height: 1.7; }

  /* Testimonial section */
  .testimonials-section { padding: 100px 0; background: linear-gradient(180deg, var(--navy) 0%, rgba(17,29,53,0.5) 50%, var(--navy) 100%); }
  .testimonial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
  .testimonial-card { padding: 36px 28px; display: flex; flex-direction: column; transition: all 0.3s; }
  .testimonial-card:hover { transform: translateY(-4px); border-color: rgba(59,130,246,0.3); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
  .testimonial-stars { color: var(--gold); font-size: 16px; letter-spacing: 2px; margin-bottom: 16px; }
  .testimonial-quote { font-size: 15px; line-height: 1.7; color: var(--gray-light); flex-grow: 1; margin-bottom: 20px; font-style: italic; }
  .testimonial-author { display: flex; align-items: center; gap: 12px; padding-top: 16px; border-top: 1px solid rgba(59,130,246,0.1); }
  .testimonial-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
  .testimonial-name { font-weight: 600; font-size: 14px; }
  .testimonial-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .tenant-counter { text-align: center; margin-top: 48px; }
  .counter-number { font-size: 56px; font-weight: 900; background: linear-gradient(135deg, var(--blue-bright), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }
  .counter-label { font-size: 16px; color: var(--gray); margin-top: 4px; }
  @media (max-width: 768px) { .testimonial-grid { grid-template-columns: 1fr; } }

  /* FAQ section */
  .faq-section { padding: 100px 0; }
  .faq-list { max-width: 740px; margin: 48px auto 0; }
  .faq-item { border-bottom: 1px solid rgba(59,130,246,0.1); }
  .faq-question { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; cursor: pointer; transition: color 0.2s; }
  .faq-question:hover { color: var(--blue-bright); }
  .faq-question h3 { font-size: 17px; font-weight: 600; line-height: 1.4; flex: 1; padding-right: 16px; }
  .faq-chevron { flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: var(--gray); }
  .faq-chevron.open { transform: rotate(180deg); color: var(--blue-bright); }
  .faq-answer { overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s; padding: 0 0; }
  .faq-answer.open { max-height: 300px; padding: 0 0 24px 0; }
  .faq-answer p { color: var(--gray-light); font-size: 15px; line-height: 1.7; }

  /* Disclaimer */
  .disclaimer { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.15); border-radius: 12px; padding: 16px 20px; font-size: 13px; color: var(--gray); line-height: 1.6; margin-top: 32px; }
  .disclaimer strong { color: var(--gold); }

  /* Chat area */
  .chat-area { max-height: 600px; overflow-y: auto; padding: 20px 0; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--navy-mid); border-radius: 2px; }

  /* Round indicator */
  .round-indicator { text-align: center; padding: 12px; margin: 16px 0; }
  .round-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); border-radius: 50px; padding: 8px 20px; font-size: 13px; color: var(--blue-bright); font-weight: 600; }

  /* Final verdict */
  .verdict-card { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1)); border: 2px solid rgba(139,92,246,0.4); border-radius: 20px; padding: 32px; margin-top: 24px; animation: glow 3s infinite; }
  .verdict-title { font-size: 22px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .verdict-score { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 50px; font-size: 14px; font-weight: 700; }
  .score-strong { background: rgba(16,185,129,0.2); color: #34d399; }
  .score-moderate { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .score-weak { background: rgba(239,68,68,0.2); color: #fca5a5; }

  /* Strength indicator banner */
  .strength-banner { padding: 24px; border-radius: 16px; margin-bottom: 24px; text-align: center; }
  .strength-banner.strong { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.05)); border: 1px solid rgba(16,185,129,0.3); }
  .strength-banner.moderate { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.05)); border: 1px solid rgba(245,158,11,0.3); }
  .strength-banner.weak { background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.05)); border: 1px solid rgba(239,68,68,0.3); }
  .strength-emoji { font-size: 48px; margin-bottom: 12px; }
  .strength-label { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .strength-label.strong { color: #34d399; }
  .strength-label.moderate { color: #fbbf24; }
  .strength-label.weak { color: #fca5a5; }
  .strength-score { font-size: 14px; color: var(--gray); }

  /* Timeline */
  .timeline-section { margin-top: 40px; }
  .timeline-title { font-size: 24px; font-weight: 800; margin-bottom: 32px; }
  .timeline { position: relative; padding-left: 40px; }
  .timeline::before { content: ''; position: absolute; left: 12px; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--blue), var(--purple)); }
  .timeline-step { margin-bottom: 24px; position: relative; cursor: pointer; }
  .timeline-dot { position: absolute; left: -35px; top: 8px; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--purple)); border: 3px solid var(--navy); }
  .timeline-content { padding: 20px; background: rgba(17, 29, 53, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 12px; transition: all 0.3s; cursor: pointer; }
  .timeline-content:hover { border-color: rgba(59, 130, 246, 0.4); }
  .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0; }
  .timeline-header.collapsed { margin-bottom: 0; }
  .timeline-header.expanded { margin-bottom: 16px; }
  .timeline-step-number { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: rgba(59,130,246,0.2); color: var(--blue-bright); font-weight: 700; margin-right: 12px; }
  .timeline-step-title { font-weight: 700; font-size: 16px; flex-grow: 1; }
  .timeline-step-time { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--blue-bright); margin-right: 12px; }
  .timeline-chevron { color: var(--gray); transition: transform 0.3s; }
  .timeline-chevron.open { transform: rotate(180deg); }
  .timeline-detail { color: var(--gray-light); font-size: 14px; line-height: 1.6; display: none; }
  .timeline-detail.show { display: block; animation: slideInUp 0.3s ease-out; }

  /* Help button and panel */

      2: `**LET'S SHUT DOWN THEIR ARGUMENTS**\n\nThe other side says you need written proof you complained. Here's the truth: NY law does NOT require you to complain in writing first. If your landlord or super knew about the problem — even from a verbal conversation — that counts. (Solow v. Wellner)\n\nThey also try to scare you about withholding rent. Nobody is telling you to stop paying rent on your own. Here's the smart move:\n1. File an HP Action in Housing Court — this is designed exactly for your situation\n2. Ask the court to put your rent in escrow (a safe holding account)\n3. Let the JUDGE decide how much your rent should be reduced\n\nThe bottom line: it doesn't matter if other apartments have it worse. The only question is whether YOUR apartment meets the legal standard.\n\n**WHAT THIS MEANS FOR YOU:**\n• File the HP Action AND call 311 for an inspection at the same time — double the pressure\n• You don't need a lawyer for this — Housing Court is designed for tenants to represent themselves\n• Every day without repairs is another day the judge can count against your landlord`
    },
    eviction: {
      1: `**YOUR LANDLORD CANNOT DO THIS**\n\nLet me be very clear: In New York, a landlord CANNOT kick you out without going to court first. No exceptions. It doesn't matter if you owe rent. It doesn't matter if your lease is up. The ONLY way to legally evict someone is through Housing Court. (RPAPL Article 7)\n\nIf your landlord changed the locks, removed your stuff, or shut off your utilities to force you out — that's a CRIME, not just a civil matter.\n\nOn top of that, if you complained about problems in your apartment recently, this could be retaliation — which is also illegal. (RPL §227-a, RPL §235-e)\n\n**WHAT THIS MEANS FOR YOU:**\n• If you're locked out RIGHT NOW: Call 911. This is a criminal offense.\n• Take photos of everything — changed locks, missing belongings, any texts or messages from your landlord\n• You can go to Housing Court and get an order to be let back in, sometimes the same day\n• You can sue for money damages on top of getting back in`,
      2: `**THEIR EXCUSES DON'T HOLD UP**\n\nThe other side might say you "abandoned" the apartment. Here's the thing: your landlord has to PROVE abandonment — you don't have to prove you didn't. If your stuff is in there, if you're getting mail there, if neighbors saw you recently — the abandonment argument falls apart. (Cornfeld v. Nizzari)\n\nThey might say your lease expired. So what? In NYC, when your lease ends, you automatically become a month-to-month tenant. Your landlord STILL has to go through court to remove you.\n\nEven if you did break a lease rule, even if you owe rent — the landlord's only option is to take you to court. Changing locks or cutting services is ALWAYS illegal.\n\n**WHAT THIS MEANS FOR YOU:**\n• Go to Housing Court for an order to restore possession AND file a separate claim for damages\n• The illegal lockout IS your best evidence — it shows your landlord acted in bad faith\n• Many tenant lawyers take these cases for free because the damages can be significant`
    },
    deposit: {
      1: `**YOUR LANDLORD OWES YOU YOUR MONEY BACK**\n\nNew York law changed in 2019 and it's now very clear about security deposits (HSTPA):\n\n• Your deposit can only be 1 month's rent. If they charged more, that's already illegal.\n• They MUST return it within 14 days after you move out.\n• They have to keep it in a separate bank account (not mix it with their money).\n• If they're keeping any of it, they must give you an itemized list with receipts showing why.\n\nHere's the big one: "Normal wear and tear" is NOT a reason to keep your money. Scuff marks, faded paint, minor nail holes from hanging pictures — that's all normal.\n\n**WHAT THIS MEANS FOR YOU:**\n• Send your landlord a letter (certified mail) demanding your deposit back within 14 days\n• If they don't respond, file in Small Claims Court — it costs almost nothing and you don't need a lawyer\n• If they charged you more than 1 month's rent as a deposit, you can get that extra money back right now`,
      2: `**THEIR "DAMAGE" CLAIMS WON'T HOLD UP**\n\nThe other side will say there was damage beyond normal wear. Here's why that usually fails:\n\nIf your landlord didn't do a move-in inspection and document what the place looked like BEFORE you moved in, they can't prove you caused any damage. That's their problem, not yours.\n\nNY courts have been very clear about what's "normal":\n- Paint that needs refreshing = normal\n- Small nail holes = normal\n- Worn carpeting = normal\n- The longer you lived there, the MORE wear is considered normal\n\nAnd that 14-day deadline? It's a hard deadline. Miss the deadline, and many judges will award you the full deposit back automatically.\n\n**WHAT THIS MEANS FOR YOU:**\n• If you have move-in photos, bring them to court — game over\n• If you DON'T have photos, focus on the landlord's failure to document and their missed deadline\n• Small Claims Court in NYC heavily favors tenants on deposit disputes`
    },
    rent: {
      1: `**YOU MIGHT BE GETTING RIPPED OFF ON RENT**\n\nIn New York, if your apartment is rent-stabilized, there's a legal limit on what your landlord can charge. And a LOT of apartments are stabilized — any building with 6+ units built before 1974 likely qualifies.\n\nHere's how landlords overcharge:\n• They claim they did major renovations to justify big rent increases — but the work was never actually done\n• They improperly removed the apartment from rent stabilization\n• They just charge more than the legal limit and hope nobody checks\n\nThe good news: NY law now lets you look back 6 YEARS for overcharges. (CPLR §213-a) And if the overcharge was intentional? You could get back THREE TIMES what you were overcharged.\n\n**WHAT THIS MEANS FOR YOU:**\n• Request your apartment's rent history from HCR — it's free and it's your right\n• If the numbers don't add up, file an overcharge complaint with DHCR (also free)\n• Many tenant lawyers take these cases on contingency — they only get paid if you win`,
      2: `**THEIR JUSTIFICATIONS DON'T ADD UP**\n\nThe other side says the rent increases were for "legitimate improvements." Under the new law (HSTPA), apartment improvements are capped at $15,000 over 15 years — AND the landlord must show receipts. No receipts? The increases get thrown out.\n\nThey might say "that's the market rate." Irrelevant. For stabilized apartments, the legal rent is based on official Rent Guidelines Board increases.\n\nAnd the best part: the law now lets DHCR look at your apartment's ENTIRE rent history to find the correct base rent.\n\n**WHAT THIS MEANS FOR YOU:**\n• If you've been overcharged $500/month for 6 years, that's $36,000 in overcharges — or $108,000 with triple damages\n• This is why landlords almost always settle these cases\n• Get your rent history first, then talk to a tenant lawyer — most offer free consultations`
    },
    harassment: {
      1: `**YOUR LANDLORD IS HARASSING YOU — AND THAT'S ILLEGAL**\n\nIn NYC, landlord harassment is a real legal offense. (NYC Admin Code §27-2005(d))\n\nIt covers a lot of ground:\n• Shutting off your heat, hot water, or electricity\n• Doing construction specifically to make your life miserable\n• Threatening you or pressuring you to move\n• Making repeated buyout offers after you've said no\n• Filing fake court cases against you\n\nIf you complained about problems and THEN the harassment started, that's retaliation — which makes your case even stronger. (RPL §227-a)\n\n**WHAT THIS MEANS FOR YOU:**\n• Start a written log TODAY — date, time, what happened, any witnesses\n• Save every text, email, voicemail, and letter from your landlord\n• File complaints with HPD for any conditions issues — this creates an official record\n• You can sue for real money — courts have fined landlords over $1 million for systematic harassment`,
      2: `**IT'S A PATTERN — AND THAT'S WHAT MATTERS**\n\nThe other side will try to explain away each incident separately. But the law doesn't look at each incident alone — it looks at the PATTERN.\n\nA boiler that "breaks" right after you complain + construction that drags on for months + a buyout offer = a pattern of harassment. Courts are smart about this.\n\nOn buyout pressure: after you say no in writing, your landlord must wait 180 DAYS before bringing it up again. If they keep pushing, that's evidence of harassment.\n\n**WHAT THIS MEANS FOR YOU:**\n• File with HPD AND pursue a private lawsuit — the HPD complaint creates an official record, the lawsuit gets you money\n• Your dated log of incidents is your most powerful weapon\n• Talk to a tenant rights organization — they've seen these patterns before and can help`
    },
    lease: {
      1: `**YOU HAVE MORE RIGHTS THAN YOUR LEASE SAYS**\n\nHere's something most tenants don't know: just because something is in your lease doesn't mean it's legal. New York law overrides unfair lease terms.\n\nYour key rights:\n• **Subletting:** In buildings with 4+ units, you have the RIGHT to sublet. If your landlord doesn't respond within 30 days, their silence counts as a yes. (RPL §226-b)\n• **Roommates:** You can have one additional person living with you no matter what your lease says. (RPL §235-f)\n• **Lease renewal:** If rent-stabilized, your landlord MUST offer you a renewal lease.\n• **Unfair terms:** Courts regularly throw out lease clauses that are unfair.\n\n**WHAT THIS MEANS FOR YOU:**\n• If your landlord denied your sublet request, check if they responded within 30 days — if not, you can sublet anyway\n• If they're blocking a roommate, the Roommate Law is on your side regardless of what the lease says\n• If any lease clause tries to waive your right to a safe apartment, that clause is automatically void`,
      2: `**"YOU SIGNED IT" DOESN'T MEAN IT'S ENFORCEABLE**\n\nThe other side loves to say "well, you signed the lease." Here's the reality: signing an unfair clause doesn't make it legal. NY courts throw out unfair lease terms all the time.\n\nThe warranty of habitability — your right to a safe, livable apartment — CANNOT be waived by any lease. (Park West Management v. Mitchell)\n\nOn subletting: the 30-day clock is strict. If your landlord didn't respond within 30 days, they've lost their chance to say no.\n\nOn roommates: the Roommate Law says one additional person, period. Your lease saying "no additional occupants" doesn't matter — the statute overrides the lease.\n\n**WHAT THIS MEANS FOR YOU:**\n• Don't be intimidated by lease language — many standard lease clauses are legally unenforceable\n• For subletting, make sure your request was in writing with the subtenant's info — that starts the 30-day clock\n• Talk to a tenant rights org if your landlord is refusing a renewal lease`
    }
  };
  const issueResponses = responses[issue] || responses.repairs;
  return issueResponses[round] || issueResponses[1];
}

function generateOpposingArgument(issue, details, round) {

    repairs: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nYour landlord's lawyer is going to hit you with three main arguments. Here's what to expect:\n\n**"You never told us in writing."** They'll say verbal complaints don't count. This is their favorite move — make you look like you never reported it properly.\n\n**"You wouldn't let us in to fix it."** They'll claim they tried to schedule repairs but you weren't available. Even if that's only partly true, they'll use it.\n\n**"It's not that bad."** They'll argue the apartment is still "livable" even if it's uncomfortable. A leaky faucet isn't the same as no heat, in their eyes.\n\n**The scare tactic:** They'll warn that if you withhold rent without a court order, they can start eviction proceedings against YOU. This is actually true — which is why you should go through Housing Court, not just stop paying.\n\nDon't panic. These arguments sound scary but they have weaknesses. That's why Round 2 exists — we'll break each one apart.`,

      2: `**WHY THEIR EXCUSES DON'T WORK**\n\nLet's be real about what the other side is doing:\n\n**On "abandonment":** This is a Hail Mary. If your stuff is in the apartment, if you have recent mail there, if any neighbor saw you recently — the abandonment claim is dead on arrival. Your landlord has to PROVE you left, not just say it.\n\n**On "expired lease":** In NYC, this doesn't mean what landlords want it to mean. Your lease ending doesn't mean you have to leave. You automatically become month-to-month. They STILL have to take you to court properly.\n\n**On "it was a mistake":** Changed locks don't change themselves. Courts don't buy this unless the landlord has very strong evidence of a genuine error.\n\n**The truth:** Even if you owed every penny of rent, even if you broke every lease rule — the landlord's ONLY legal option was to go to court. They chose not to. That's on them.`
    },
    deposit: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nLandlords LOVE to keep security deposits. Here's their playbook:\n\n**"There was damage beyond normal wear."** This is the #1 excuse. They'll point to every scuff, mark, and worn spot and call it "damage" — even if you lived there for years and it's totally normal.\n\n**"You didn't give us a forwarding address."** They'll claim the 14-day clock never started because you didn't tell them where to send the check. Even if you did tell them.\n\n**"We need more time to assess."** They'll say 14 days isn't enough to figure out the damage. The law says otherwise, but they'll try.\n\n**"The repairs cost more than the deposit."** They might claim you actually owe THEM money on top of keeping your deposit. This is usually a bluff to scare you out of fighting.\n\nThe good news: these defenses are well-known and judges see through them all the time. Small Claims Court judges in NYC deal with deposit disputes constantly and tend to side with tenants.`,
      2: `**WHY THEIR "DAMAGE" CLAIMS USUALLY FAIL**\n\nHere's the reality check on their arguments:\n\n**No move-in inspection?** That's the landlord's problem. If they didn't document what the apartment looked like before you moved in, they can't prove you caused any damage. End of story.\n\n**"Beyond normal wear"?** Judges know what normal looks like. You lived there — things get worn. Paint fades, carpets show paths, walls get minor marks. The longer you lived there, the more of this is expected.\n\n**Missed the 14-day deadline?** Many judges will give you the full deposit back automatically if the landlord blew past 14 days without providing an itemized statement. They don't get a do-over.\n\n**No receipts?** If the landlord can't show receipts for actual repairs they claim to have made, the judge will be skeptical. "I think it cost $500" isn't evidence.`

    rent: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nOvercharging landlords always have excuses. Here are the big ones:\n\n**"The apartment isn't rent-stabilized."** This is their first line of defense. They'll argue the apartment was legally removed from stabilization — through high-rent deregulation, substantial renovation, or some other loophole.\n\n**"We made legitimate improvements."** They'll claim they spent big money on renovations that justify the rent increase. Sometimes this is true. Often it's inflated or fabricated.\n\n**"That's just the market rate."** They'll try to argue that what they're charging is fair because comparable apartments go for similar amounts. This is irrelevant for stabilized apartments, but they'll say it anyway.\n\n**"The statute of limitations protects us."** They'll argue you waited too long to complain, so some or all of the overcharges are time-barred.\n\nThese arguments have varying strength depending on your specific situation. But the new law (HSTPA) has closed many of the loopholes landlords used to rely on.`,
      2: `**WHY THEIR DEFENSES ARE WEAKER THAN THEY SOUND**\n\nLet's break down the reality:\n\n**On "legitimate improvements":** The new law caps these at $15,000 over 15 years AND requires receipts. No receipts = no increases. Period. Many landlords padded renovation costs or claimed work that was never done. DHCR doesn't just take their word for it.\n\n**On "not stabilized":** HSTPA made it much harder to deregulate apartments. If your landlord claims deregulation happened before 2019, there are ways to challenge that. If it happened after, the law likely prevents it entirely.\n\n**On the statute of limitations:** Landlords used to love this defense, but HSTPA expanded the lookback to 6 full years AND now DHCR can dig deeper into the rent history. The old tricks don't work like they used to.\n\n**The bottom line:** Landlords settle overcharge cases because they know the math is against them. If you've been overcharged even $300/month for 6 years, that's $21,600 minimum — up to $64,800 with triple damages. Fighting is expensive for them.`
    },
    harassment: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nLandlords accused of harassment always play the same cards:\n\n**"It was legitimate maintenance."** Turned off the heat? "Boiler repair." Constant construction? "Necessary renovations." They'll frame every disruption as normal business.\n\n**"We only made one buyout offer."** They'll downplay the pressure, saying it was a single polite offer that the tenant was free to refuse.\n\n**"There's no pattern."** Their lawyer will isolate each incident and explain them separately, trying to prevent you from connecting the dots.\n\n**"The tenant is exaggerating."** They'll suggest you're being overly sensitive or that your expectations are unreasonable.\n\nThe key thing to understand: harassment cases are about the PATTERN, not individual incidents. Their strategy is to break the pattern apart and make each piece look innocent. Your strategy should be the opposite — show how everything fits together.`,
      2: `**WHY THEIR "INNOCENT" EXPLANATIONS DON'T ADD UP**\n\nLet's connect the dots:\n\n**"Legitimate maintenance" + "one buyout offer" + "necessary construction"** — any one of these alone might be innocent. All three together, especially if they started after you complained about something? That's a pattern. Courts are smart enough to see this.\n\n**On the buyout:** After you say no in writing, your landlord has to wait 180 days before bringing it up again. If they keep pushing, that IS evidence of harassment. It doesn't matter how "politely" they ask.\n\n**On construction timing:** If the "necessary" construction happens to be at 7 AM, happens to drag on for months, and happens to coincide with buyout pressure — a judge will notice.\n\n**On "no pattern":** You build the pattern with your incident log. Date, time, what happened, who saw it. Do this consistently and the pattern tells itself. Judges read these logs and draw their own conclusions.`
    },
    lease: {
      1: `**HEADS UP — HERE'S WHAT YOUR LANDLORD WILL TRY**\n\nIn lease disputes, landlords lean hard on one argument:\n\n**"You signed the lease. Deal with it."** This is the big one. They'll say you agreed to the terms and now you have to live with them. Sounds logical, but it's not always how the law works.\n\n**On subletting:** "We said no and we have that right." They'll claim their denial was reasonable, even if they can't explain why.\n\n**On roommates:** "The lease says no additional occupants." They'll point to the lease language and expect that to be the end of it.\n\n**On renewal:** "We're not required to renew." For market-rate apartments, this might actually be true. For stabilized apartments, it's dead wrong.\n\n**On unfair terms:** "Standard lease, everyone signs it." They'll argue that because the lease is used industry-wide, it can't be unfair.\n\nHere's what they don't want you to know: New York law overrides many lease provisions. Just because you signed something doesn't make it enforceable.`,
      2: `**WHY "YOU SIGNED IT" ISN'T THE END OF THE STORY**\n\nThe other side keeps saying "the lease is the lease." Here's reality:\n\n**Your right to a livable apartment can NEVER be waived.** It doesn't matter what the lease says. Courts have been clear on this — you can't sign away your basic tenant rights.\n\n**On subletting:** If your landlord didn't respond to your written request within 30 days, they've automatically given consent. That's the law, not the lease. They can't retroactively say no.\n\n**On roommates:** The state Roommate Law says you get one additional occupant. Your lease says otherwise? The law wins. Every time.\n\n**On "standard" lease terms:** Just because every landlord uses the same unfair clause doesn't make it legal. Courts regularly strike down "standard" provisions that cross the line.\n\n**The real issue:** Most tenants don't fight because they think the lease is set in stone. It's not. If your landlord is relying on a lease clause to deny your rights, there's a good chance that clause doesn't hold up in court.`
    }
  };

function generateJudgeVerdict(issue) {

    eviction: { score: 88, summary: `**You have a very strong case.**\n\nIf your landlord locked you out or tried to evict you without going to court, they broke the law. It's that simple. New York doesn't allow shortcuts on evictions — period.\n\nIf you also complained about apartment problems before this happened, you likely have a retaliation claim on top of the eviction claim. That makes your case even stronger.\n\n**Here's exactly what to do next:**\n\n1. **If you're locked out right now:** Call 911. This is a crime, not just a civil dispute.\n2. **Go to Housing Court** and file for an emergency order to get back into your apartment. Courts can issue these quickly.\n3. **File a police report** — this creates an official record of what happened.\n4. **Document everything:** Photos of changed locks, screenshots of texts from your landlord, names of witnesses.\n5. **Consider suing for damages** — courts award real money for illegal lockouts, including for the stress and disruption.\n6. **Contact a tenant rights organization** — many provide free lawyers for cases like this.\n\nIllegal eviction cases rarely fail when properly documented. The law is strongly in your favor.` },
    deposit: { score: 78, summary: `**You have a good case — especially if your landlord missed the 14-day deadline.**\n\nThe law is pretty clear here: your landlord had 14 days to return your deposit with an itemized list of any deductions. If they missed that window, your case gets a lot stronger.\n\nHow strong your case is depends on your documentation. If you have move-in/move-out photos, you're in great shape. Even without them, the burden is on your landlord to prove damage.\n\n**Here's exactly what to do next:**\n\n1. **Send a demand letter** via certified mail requesting your full deposit back within 14 days. Keep the receipt.\n2. **Wait 14 days.** If no response, move to step 3.\n3. **File in Small Claims Court** — filing costs almost nothing and you don't need a lawyer.\n4. **Gather your evidence:** Lease, move-in/move-out photos, any texts or emails about the deposit, your demand letter receipt.\n5. **At court:** Emphasize the landlord's missed deadline and lack of itemized deductions. Judges take the 14-day rule seriously.\n\nMost landlords settle once they see you've filed. It's cheaper than going to court and losing.` },
    rent: { score: 85, summary: `**You likely have a strong case — but it depends on one key question: is your apartment rent-stabilized?**\n\nIf yes, the math is on your side. The new law (HSTPA) gives you powerful tools to recover overcharges going back 6 years, plus potential triple damages.\n\nIf you're not sure whether you're stabilized, finding out is step one — and it's free.\n\n**Here's exactly what to do next:**\n\n1. **Request your rent history from HCR** — this is free and you have a right to it. Call (718) 739-6400 or go to hcr.ny.gov.\n2. **Compare your rent history to what you've been paying.** If the numbers don't match, you may have an overcharge.\n3. **File a complaint with DHCR** if the numbers show an overcharge. Also free.\n4. **Talk to a tenant lawyer** — many take overcharge cases on contingency (they only get paid if you win), because the potential recovery is large.\n5. **Keep paying your current rent** while the case is pending. Don't stop paying.\n\nThese cases take time (1-2 years) but the payoff can be significant. Even a $200/month overcharge over 6 years is $14,400 — or $43,200 with triple damages.` },
    harassment: { score: 70, summary: `**You have a decent case, but it needs strong documentation to win.**\n\nHarassment cases come down to proving a PATTERN of behavior. One bad incident usually isn't enough. But multiple incidents over time — especially if they started after you complained about something — paint a powerful picture.\n\nThe other side will try to explain each incident separately. Your job is to show they're connected.\n\n**Here's exactly what to do next:**\n\n1. **Start an incident log TODAY** — date, time, what happened, who saw it. Be specific and factual. This is your most important weapon.\n2. **Save every text, email, voicemail, and letter** from your landlord. Screenshot everything.\n3. **If you've declined a buyout, do it in writing.** This starts a 180-day clock where they can't bring it up again.\n4. **File complaints with HPD** for any conditions issues — each complaint creates an official record.\n5. **Talk to your neighbors** — if they're experiencing similar treatment, their testimony strengthens your case.\n6. **Contact a tenant rights organization** — harassment cases benefit from professional help.\n\nBuild the paper trail consistently and the pattern will speak for itself.` },
    lease: { score: 72, summary: `**Your case strength depends on the specific issue, but the law is generally tenant-friendly in NY.**\n\nFor subletting and roommate disputes, your statutory rights are strong and well-defined. For disputes about specific lease clauses, it depends on what the clause says and whether it conflicts with NY law.\n\nThe good news: New York courts regularly side with tenants when lease terms conflict with statutory protections.\n\n**Here's exactly what to do next:**\n\n1. **Figure out if your apartment is rent-stabilized** — this dramatically affects your rights (especially for lease renewals). Check at hcr.ny.gov or call (718) 739-6400.\n2. **For subletting:** Send a formal written request to your landlord with the proposed subtenant's info. This starts the 30-day clock.\n3. **For roommate issues:** Send written notice of the additional occupant. The Roommate Law is on your side.\n4. **For unfair lease terms:** Identify the specific clause and check if it conflicts with NY tenant protection laws.\n5. **For lease renewal:** If you're stabilized and weren't offered a renewal, file a complaint with DHCR.\n6. **Get everything in writing** — verbal agreements are hard to enforce.\n\nMost lease disputes can be resolved with a clear understanding of your rights and a formal written communication to your landlord.` }

function HelpButton({ page, isProcessing, showVerdict }) {
  const [helpOpen, setHelpOpen] = useState(false);

  const getHelpContent = () => {

      return {
        text: "Welcome! This tool helps you understand your rights as a NY tenant. Click 'Get Started' to begin exploring your case.",
        suggestions: ["Learn about your issue", "See how the AI analysis works", "Check pricing options"]
      };
    } else if (page === "signup") {
      return {
        text: "Fill in your basic info. We need this to personalize your analysis. Your data stays private and secure.",
        suggestions: ["Choose your borough", "Create your account", "Next: describe your issue"]
      };

/* ─── Win Meter Component ─── */
function WinMeter({ score, isAnimating, label }) {
  const [displayScore, setDisplayScore] = useState(0);
  const [prevScore, setPrevScore] = useState(0);

  useEffect(() => {
    if (score !== prevScore) {
      setPrevScore(score);
      const duration = 1200;
      const start = prevScore;
      const diff = score - start;
      const startTime = Date.now();
      const animate = () => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        setDisplayScore(Math.round(start + diff * eased));
        if (progress < 1) requestAnimationFrame(animate);
      };
      requestAnimationFrame(animate);
    }
  }, [score]);

  const getColor = (s) => {
    if (s >= 80) return { bg: "linear-gradient(90deg, #10b981, #34d399)", text: "#34d399", emoji: "💪" };
    if (s >= 60) return { bg: "linear-gradient(90deg, #f59e0b, #fbbf24)", text: "#fbbf24", emoji: "👍" };
    return { bg: "linear-gradient(90deg, #ef4444, #fca5a5)", text: "#fca5a5", emoji: "⚠️" };
  };
  const colors = getColor(displayScore);

  return (
    <div className="win-meter-container glass" style={{padding: "20px 24px"}}>
      <div className="win-meter-label">
        <div className="win-meter-title">{isAnimating && <span className="win-meter-pulse" style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:colors.text}}></span>} {label || "Win Probability"}</div>
        <div className="win-meter-value" style={{color: colors.text}}>{colors.emoji} {displayScore}%</div>
      </div>
      <div className="win-meter-track">
        <div className="win-meter-fill" style={{width: `${displayScore}%`, background: colors.bg}}></div>
      </div>
      <div className="win-meter-zones">
        <span>Tough Case</span>
        <span>Decent</span>
        <span>Strong Case</span>
      </div>
    </div>
  );
}

/* ─── Streaming Text Component ─── */
function StreamingText({ text, speed }) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);

  useEffect(() => {
    setDisplayed("");
    setDone(false);
    let i = 0;
    const interval = setInterval(() => {
      i += 3;
      if (i >= text.length) {
        setDisplayed(text);
        setDone(true);
        clearInterval(interval);
      } else {
        setDisplayed(text.substring(0, i));
      }
    }, speed || 8);
    return () => clearInterval(interval);
  }, [text]);

  const html = displayed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
  return (
    <div className="agent-text">
      <span dangerouslySetInnerHTML={{__html: html}} />
      {!done && <span style={{display:"inline-block",width:2,height:16,background:"var(--blue-bright)",marginLeft:2,animation:"pulse 0.8s infinite"}}></span>}
    </div>
  );
}

/* ─── Animated Counter Component ─── */
function AnimatedCounter({ target, duration }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started.current) {
        started.current = true;
        const startTime = Date.now();
        const animate = () => {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / (duration || 2000), 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setCount(Math.round(target * eased));
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }
    }, { threshold: 0.3 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target]);

  return <span ref={ref}>{count.toLocaleString()}</span>;
}

                  <div style={{display: "flex", alignItems: "center", gap: 10, color: "var(--gray-light)", fontSize: 14}}><CheckIcon /> Court filing templates</div>
                  <div style={{display: "flex", alignItems: "center", gap: 10, color: "var(--gray-light)", fontSize: 14}}><CheckIcon /> Case history tracking</div>
                  <div style={{display: "flex", alignItems: "center", gap: 10, color: "var(--gray-light)", fontSize: 14}}><CheckIcon /> Priority support</div>
                </div>
                <button className="btn-gold" style={{width: "100%", marginTop: 32}} onClick={() => setPage("signup")}>Start Fighting</button>
              </div>
            </div>
          </div>
        </section>

        {/* ─── FAQ Section ─── */}
        <section className="faq-section" id="faq">
          <div className="container" style={{textAlign: "center"}}>
            <div className="section-label">FAQ</div>
            <h2 className="section-title" style={{margin: "0 auto 16px"}}>Frequently Asked Questions</h2>
            <p className="section-subtitle" style={{margin: "0 auto"}}>Everything you need to know before getting started.</p>
            <div className="faq-list" style={{textAlign: "left"}}>
              {faqData.map((item, i) => (
                <FAQItem key={i} question={item.q} answer={item.a} />
              ))}
            </div>
          </div>
        </section>

        <section className="section">
          <div className="container" style={{textAlign: "center"}}>
            <div className="glass" style={{padding: "72px 40px", maxWidth: 740, margin: "0 auto", background: "linear-gradient(135deg, rgba(59,130,246,0.08), rgba(245,158,11,0.04))", borderColor: "rgba(59,130,246,0.15)"}}>
              <h2 style={{fontSize: "clamp(28px, 4vw, 36px)", fontWeight: 800, marginBottom: 16, letterSpacing: "-0.02em"}}>Stop Guessing. Start Fighting.</h2>
              <p style={{color: "var(--gray-light)", fontSize: 18, marginBottom: 36, lineHeight: 1.6}}>Your landlord's lawyers aren't guessing about the law. You shouldn't be either.</p>
              <button className="btn-gold" onClick={() => setPage("signup")}>Get Your Free Analysis <ArrowRight /></button>
            </div>
          </div>
        </section>

        <div className="container">
          <div className="disclaimer">
            <strong><AlertIcon /> Important Disclaimer:</strong> TenantShield AI provides legal information and analysis, not legal advice. This tool is designed to help you understand your rights under New York law, but it is not a substitute for consultation with a licensed attorney. For complex cases, we recommend consulting with a tenant rights attorney or contacting your local Legal Aid office.
          </div>
        </div>

        {/* ─── Professional Footer ─── */}
        <footer className="footer">
          <div className="container">
            <div className="footer-grid">
              <div className="footer-brand">
                <div className="footer-brand-logo">🛡️ <span>TenantShield AI</span></div>
                <div className="footer-brand-desc">AI-powered legal analysis built specifically for New York tenants. Know your rights. Fight back with confidence.</div>
              </div>
              <div>
                <div className="footer-col-title">Company</div>
                <div className="footer-links">
                  <a className="footer-link">About Us</a>
                  <a className="footer-link">Careers</a>
                  <a className="footer-link">Press</a>
                  <a className="footer-link">Contact</a>
                </div>
              </div>
              <div>
                <div className="footer-col-title">Legal</div>
                <div className="footer-links">
                  <a className="footer-link">Terms of Service</a>
                  <a className="footer-link">Privacy Policy</a>
                  <a className="footer-link">Disclaimer</a>
                  <a className="footer-link">Cookie Policy</a>
                </div>
              </div>
              <div>
                <div className="footer-col-title">Resources</div>
                <div className="footer-links">
                  <a className="footer-link">Blog</a>
                  <a className="footer-link">FAQ</a>
                  <a className="footer-link">Know Your Rights</a>
                  <a className="footer-link">Tenant Handbook</a>
                </div>
              </div>
              <div>
                <div className="footer-col-title">Support</div>
                <div className="footer-links">
                  <a className="footer-link">Help Center</a>
                  <a className="footer-link">Community</a>
                  <a className="footer-link">Status</a>
                  <a className="footer-link">hello@tenantshield.ai</a>
                </div>
              </div>
            </div>
            <div className="footer-bottom">
              <div className="footer-bottom-text">© 2026 TenantShield AI. All rights reserved. Not a law firm. Not legal advice.</div>
              <div className="footer-bottom-links">
                <a className="footer-bottom-link">Terms</a>
                <a className="footer-bottom-link">Privacy</a>
                <a className="footer-bottom-link">Cookies</a>
              </div>
            </div>
          </div>
        </footer>

        <HelpButton page={page} />
      </div>
    );
  }

  /* ─── SIGNUP PAGE ─── */
  if (page === "signup") {
    return (
      <div style={{minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, background: "radial-gradient(ellipse at 50% 30%, rgba(59,130,246,0.1) 0%, transparent 60%)"}}>
        <div className="glass signup-card scale-in">
          <div style={{textAlign: "center", marginBottom: 8}}>
            <span style={{fontSize: 40}}>🛡️</span>
          </div>
          <h2>Create Your Account</h2>
          <p className="subtitle">Get your free case analysis in minutes</p>
          <form onSubmit={handleSignup}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">First Name *</label>
                <input className="input-field" type="text" placeholder="John" value={signupData.firstName} onChange={e => setSignupData({...signupData, firstName: e.target.value})} required />
              </div>
              <div className="form-group">
                <label className="form-label">Last Name</label>
                <input className="input-field" type="text" placeholder="Doe" value={signupData.lastName} onChange={e => setSignupData({...signupData, lastName: e.target.value})} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Email *</label>
              <input className="input-field" type="email" placeholder="john@example.com" value={signupData.email} onChange={e => setSignupData({...signupData, email: e.target.value})} required />
            </div>
            <div className="form-group">
              <label className="form-label">Phone</label>
              <input className="input-field" type="tel" placeholder="(212) 555-0123" value={signupData.phone} onChange={e => setSignupData({...signupData, phone: e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">Borough</label>
              <select className="input-field" value={signupData.borough} onChange={e => setSignupData({...signupData, borough: e.target.value})}>
                <option>Manhattan</option>
                <option>Brooklyn</option>
                <option>Queens</option>
                <option>Bronx</option>
                <option>Staten Island</option>
                <option>Other NY</option>
              </select>
            </div>
            <button className="btn-gold" type="submit" style={{width: "100%", marginTop: 8}}>Create Account & Start <ArrowRight /></button>
          </form>
          <p style={{textAlign: "center", marginTop: 20, fontSize: 13, color: "var(--gray)"}}>Already have an account? <a style={{color: "var(--blue-bright)", cursor: "pointer"}}>Sign in</a></p>
          <p style={{textAlign: "center", marginTop: 12, fontSize: 12, color: "var(--gray)"}}>
            <a style={{color: "var(--gray)", cursor: "pointer"}} onClick={() => setPage("landing")}>← Back to home</a>
          </p>
        </div>
        <HelpButton page={page} />
      </div>
    );
  }

  /* ─── INTAKE PAGE ─── */
  if (page === "intake") {
    return (
      <div style={{minHeight: "100vh", padding: "100px 24px 60px", background: "radial-gradient(ellipse at 50% 10%, rgba(59,130,246,0.08) 0%, transparent 50%)"}}>
        <div className="container" style={{maxWidth: 900}}>
          <div style={{textAlign: "center", marginBottom: 48}} className="fade-up">
            <div style={{fontSize: 14, color: "var(--blue-bright)", fontWeight: 600, marginBottom: 8}}>STEP 1 OF 2</div>
            <h1 style={{fontSize: 36, fontWeight: 800, marginBottom: 12, letterSpacing: "-0.02em"}}>What's going on with your landlord?</h1>
            <p style={{color: "var(--gray)", fontSize: 16, lineHeight: 1.6}}>Select your issue, then tell us the details. Be as specific as you can.</p>
          </div>

          <div className="issue-grid">
            {NY_LAW.commonIssues.map((issue, i) => (
              <div key={issue.id} className={`glass issue-card ${selectedIssue === issue.id ? "selected" : ""}`} onClick={() => { setSelectedIssue(issue.id); setSignupData({...signupData, issueType: issue.id}); }} style={{animationDelay: `${i * 0.05}s`}}>
                <div className="issue-icon">{issue.icon}</div>
                <div className="issue-title">{issue.title}</div>
                <div className="issue-desc">{issue.desc}</div>
                {selectedIssue === issue.id && (
                  <div style={{position: "absolute", top: 12, right: 12, color: "var(--gold)"}}><CheckIcon /></div>
                )}
              </div>
            ))}
          </div>

          {selectedIssue && (
            <div className="fade-up" style={{marginTop: 40}}>
              <div className="glass" style={{padding: 32}}>
                <h3 style={{fontSize: 18, fontWeight: 700, marginBottom: 16}}>Tell us what happened</h3>
                <p style={{color: "var(--gray)", fontSize: 14, marginBottom: 16, lineHeight: 1.6}}>The more detail you provide, the better our AI agents can analyze your case. Include dates, communications, and specific incidents.</p>
                <textarea className="input-field" placeholder="Example: My landlord hasn't fixed the heating in my apartment since November 2025. I've called the super 5 times and sent 2 emails to management. The temperature drops to 55°F at night. I have photos and email records..." value={caseDetails} onChange={e => setCaseDetails(e.target.value)} style={{minHeight: 180}} />
                <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 20}}>
                  <span style={{fontSize: 13, color: "var(--gray)"}}>{caseDetails.length > 0 ? `${caseDetails.length} characters` : "Minimum 50 characters recommended"}</span>
                  <button className="btn-gold" onClick={startAnalysis} disabled={!caseDetails.trim() || caseDetails.length < 20}>Launch Analysis <ArrowRight /></button>
                </div>
              </div>
            </div>
          )}

          <div className="disclaimer" style={{marginTop: 32}}>
            <strong><AlertIcon /> Privacy Note:</strong> Your case details are processed securely and not shared with third parties. We do not store personally identifiable information beyond what's needed for your analysis.
          </div>
        </div>
        <HelpButton page={page} />
      </div>
    );
  }

  /* ─── ANALYSIS PAGE ─── */
  if (page === "analysis") {
    const progressPercent = showVerdict ? 100 : agentMessages.length * 20 + (currentAgent ? 10 : 0);
    const issueInfo = NY_LAW.commonIssues.find(i => i.id === selectedIssue);

    return (
      <div style={{minHeight: "100vh", padding: "40px 24px 60px", background: "radial-gradient(ellipse at 50% 10%, rgba(59,130,246,0.08) 0%, transparent 50%)", paddingBottom: !isProcessing && showVerdict ? "60px" : "60px"}}>
        <div className="container" style={{maxWidth: 900}}>
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24}}>
            <div>
              <div style={{display: "flex", alignItems: "center", gap: 12, marginBottom: 8}}>
                <span style={{fontSize: 24}}>{issueInfo ? issueInfo.icon : "📋"}</span>
                <h2 style={{fontSize: 24, fontWeight: 800, letterSpacing: "-0.02em"}}>Case Analysis: {issueInfo ? issueInfo.title : "Legal Issue"}</h2>
              </div>
              <p style={{color: "var(--gray)", fontSize: 14}}>New York State — {signupData.borough}</p>
            </div>
            {!isProcessing && showVerdict && (
              <button className="btn-secondary" style={{padding: "10px 20px", fontSize: 13}} onClick={() => { setPage("intake"); setAgentMessages([]); setVerdict(null); setShowVerdict(false); setCurrentRound(0); setSelectedIssue(null); setCaseDetails(""); }}>New Analysis</button>
            )}
          </div>

          {/* Win Meter */}
          <WinMeter score={winScore} isAnimating={isProcessing} label={winLabel} />

          {/* Progress */}
          <div className="glass" style={{padding: "16px 24px", marginBottom: 24}}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
              <span style={{fontSize: 13, fontWeight: 600, color: "var(--gray-light)"}}>
                {showVerdict ? "Analysis Complete" : isProcessing ? "Agents Deliberating..." : "Preparing..."}
              </span>
              <span style={{fontSize: 13, color: "var(--gray)"}}>{Math.round(progressPercent)}%</span>
            </div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width: `${progressPercent}%`, background: showVerdict ? "var(--green)" : "linear-gradient(90deg, var(--blue), var(--purple))"}}></div>
            </div>
          </div>

          <div className="chat-area" ref={chatRef}>
            {agentMessages.map((msg, i) => {
              const prevMsg = i > 0 ? agentMessages[i - 1] : null;
              const showRound1 = i === 0;
              const showRound2 = i === 2 && agentMessages.length > 2;

              return (
                <React.Fragment key={i}>
                  {showRound1 && (
                    <div className="round-indicator"><div className="round-badge">⚡ Round 1 — Opening Arguments</div></div>
                  )}
                  {showRound2 && (
                    <div className="round-indicator"><div className="round-badge">🔥 Round 2 — Rebuttals</div></div>
                  )}
                  <div className={`agent-card agent-${msg.agent} slide-in`} style={{animationDelay: "0.1s"}}>
                    <div className={`agent-badge badge-${msg.agent}`}>
                      {msg.agent === "defense" && "🛡️ Your Defense Counsel"}
                      {msg.agent === "opposing" && "⚔️ Opposing Counsel"}
                      {msg.agent === "judge" && "⚖️ The Judge"}
                    </div>
                    {i === agentMessages.length - 1 ? (
                      <StreamingText text={msg.content} speed={6} />
                    ) : (
                      <div className="agent-text" dangerouslySetInnerHTML={{__html: msg.content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>')}} />
                    )}
                  </div>
                </React.Fragment>
              );
            })}

            {currentAgent && (
              <div className={`agent-card agent-${currentAgent} fade-in`}>
                <div className={`agent-badge badge-${currentAgent}`}>
                  {currentAgent === "defense" && "🛡️ Your Defense Counsel"}
                  {currentAgent === "opposing" && "⚔️ Opposing Counsel"}
                  {currentAgent === "judge" && "⚖️ The Judge"}
                </div>
                <div className="typing-dots">
                  <span style={{background: currentAgent === "defense" ? "#34d399" : currentAgent === "opposing" ? "#fca5a5" : "#c4b5fd"}}></span>
                  <span style={{background: currentAgent === "defense" ? "#34d399" : currentAgent === "opposing" ? "#fca5a5" : "#c4b5fd"}}></span>
                  <span style={{background: currentAgent === "defense" ? "#34d399" : currentAgent === "opposing" ? "#fca5a5" : "#c4b5fd"}}></span>
                </div>
              </div>
            )}

            {showVerdict && verdict && (
              <div>
                <div className="round-indicator"><div className="round-badge">⚖️ Final Assessment</div></div>
                <div className="verdict-card scale-in">
                  <div className={`strength-banner ${verdict.score >= 80 ? 'strong' : verdict.score >= 60 ? 'moderate' : 'weak'}`}>
                    <div className="strength-emoji">
                      {verdict.score >= 80 ? '💪' : verdict.score >= 60 ? '👍' : '⚠️'}
                    </div>
                    <div className={`strength-label ${verdict.score >= 80 ? 'strong' : verdict.score >= 60 ? 'moderate' : 'weak'}`}>
                      {verdict.score >= 80 ? 'Strong Case' : verdict.score >= 60 ? 'Decent Case' : 'Tough Case'}
                    </div>
                    <div className="strength-score">Case Strength: {verdict.score}/100</div>
                  </div>

                  <div className="verdict-title">⚖️ Judicial Assessment</div>
                  <div className="agent-text" dangerouslySetInnerHTML={{__html: verdict.summary.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>')}} />
                  <div style={{marginTop: 24, display: "flex", gap: 12, flexWrap: "wrap"}}>
                    <button className="btn-gold" style={{padding: "12px 24px", fontSize: 14}}>Generate Demand Letter</button>
                    <button className="btn-secondary" style={{padding: "12px 24px", fontSize: 14}}>Download Full Report</button>
                    <button className="btn-secondary" style={{padding: "12px 24px", fontSize: 14}}>Find a Tenant Lawyer</button>
                  </div>
                </div>

                <div className="timeline-section">
                  <div className="timeline-title">📋 What Happens Next</div>
                  <div className="timeline">
                    <TimelineStep stepNumber="1" title="Send a Demand Letter" timeframe="This Week" detail="Write a formal letter to your landlord documenting the issue and demanding action. Send it via certified mail so you have proof. Keep a copy for your records. We can help you generate one — click 'Generate Demand Letter' above." />
                    <TimelineStep stepNumber="2" title="File a Complaint with HPD/311" timeframe="This Week" detail="Call 311 or visit nyc.gov/311 to file a complaint. An inspector will be sent to verify conditions. This creates an official government record that strengthens your case significantly. Violations found by HPD carry major weight in Housing Court." />
                    <TimelineStep stepNumber="3" title="File in Housing Court (if no response)" timeframe="2-4 Weeks" detail="If your landlord ignores the demand letter and conditions persist, file an HP Action in Housing Court. You don't need a lawyer — the court has a Help Center. Bring all documentation: photos, demand letter receipt, HPD inspection report, and any communications." />
                  </div>
                </div>

                <div className="share-section">
                  <div className="share-heading">Know someone dealing with a bad landlord?</div>
                  <div className="share-subtext">Send them TenantShield AI — it's free for the first analysis.</div>
                  <div className="share-buttons">
                    <button className="share-button" onClick={handleShareCopy}>📋 {shareCopied ? "Copied!" : "Copy Link"}</button>
                    <button className="share-button" onClick={handleShareText}>💬 Text a Friend</button>
                    <button className="share-button" onClick={handleShareEmail}>📧 Send Email</button>
                  </div>
                </div>
              </div>
            )}
          </div>

          <div className="disclaimer" style={{marginTop: 24}}>
            <strong><AlertIcon /> Reminder:</strong> This analysis is based on New York State and NYC housing law as of 2026. Laws may change. For cases involving immediate safety concerns, contact 311 (NYC) or your local code enforcement. For legal emergencies, contact Legal Aid at (212) 577-3300.
          </div>
        </div>

        {!isProcessing && showVerdict && (
          <div className="sticky-status-bar">
            <div className="pulse-dot"></div>
            <div className="status-text">Analysis Complete ✓</div>
            <div className="status-progress"><div className="status-progress-fill"></div></div>
          </div>
        )}
        {isProcessing && (
          <div className="sticky-status-bar">
            <div className="pulse-dot"></div>
            <div className="status-text">Agents Deliberating...</div>
            <div className="status-progress"><div className="status-progress-fill"></div></div>
          </div>
        )}

        <HelpButton page={page} isProcessing={isProcessing} showVerdict={showVerdict} />
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
